POL_delenie_terr: "Разделение земель"
POL_delenie_terr_desc: "Наконец наступило желаемое перемирие и окончание войны, результаты которого стало приобретение огромных территорий и подчинение нескольких народов с правительствами. Поэтому только мы имеем право решать судьбу тех или иных земель, а некоторые, с преобладающим польским этническим большинством, мы будем не прочь присоединить даже против воли союзников."
