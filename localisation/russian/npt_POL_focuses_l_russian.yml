l_russian:

POL_konst_WGS: "Завершить конституирование ВГС"
POL_konst_WGS_desc: "Временный государственный совет, является первым правительством государства Польского. На основании Акта от 5 ноября 1916 года, было поручено создать этот самый совет."
POL_peregovors_ger: "Расширение прав"
POL_peregovors_ger_desc: "Если нам удастся договориться с немецким правительством об расширении нашей автономии и передаче большей власти в рамках самоуправления регионом, то мы сможем начать более разностороннюю политику во всех сферах."
POL_provedenie_merop: "Проведение мероприятий и торжеств"
POL_provedenie_merop_desc: "Начало года ознаменуется большими праздниками и множеством мероприятий в Варшаве. Организовав их, мы повысим свой авторитет и отвлечём народ от нынешних трудностей."
POL_organizovat_oficer_kurs: "Организовать офицерские курсы"
POL_organizovat_oficer_kurs_desc: "По инициативе Пилсудского и его Польской военной организации мы организуем новые офицерские курсы для будущих офицеров, которые, возможно, пополнят ряды офицерского состава."
POL_naladit_raboty_pocht: "Наладить работу почт"
POL_naladit_raboty_pocht_desc: "Варшавская сеть почт требует серьёзных изменений: некачественная работа сотрудников и сомнительные руководящие кадры вынуждают нас вмешаться и наладить её функционирование."
POL_form_regent: "Формирование регентства"
POL_form_regent_desc: "Государственный совет был распущен, вследствие чего управление и руководство Польским королевством должны перейти к новому органу — Совету Регентства."
POL_new_sovet: "Создание нового совета"
POL_new_sovet_desc: "С официальным образованием Регентства возросла необходимость создания также Совета, выполнявшего функции парламента, а также полноценного правительства."
POL_prisyaga_pol_chyastei: "Присяга Польских частей"
POL_prisyaga_pol_chyastei_desc: "Германское правительство требует от польских вооружённых формирований провести церемонию присяги непосредственно кайзеру Германии Вильгельму II, чтобы показать всю покорность и принятие польского народа новой немецкой власти. Требование немецкого командования о присяге польских частей ясно и вполне обоснованно."
POL_prinyatie_const: "Принятие конституции"
POL_prinyatie_const_desc: "Новая польская конституция была главной задачей для нового совета, чтобы продемонстрировать свою самостояельность и суверенитет в делах Польского королевства. Это, безусловно, должно было благотворно сказаться на дальнейшем проведении собственной политики в польских землях, находящихся под их контролем."
POL_peregovor_berlin: "Переговоры с Берлином"
POL_peregovor_berlin_desc: "Польско-немецкие отношения никогда не выходили за рамки простых обязательств, напоминая отношения колонии со стороны Польши и её покровителя — Германии. Но времена меняются, и всё чаще ведутся разговоры о тесном сотрудничестве двух стран, о новых выгодах и политических перспективах."
POL_peregovor_vena: "Переговоры с Веной"
POL_peregovor_vena_desc: "Отношения с Австрией по сути оставались формальностью; о более тесных и искренних дружеских связях в разговоре явно не шла речь. Однако рост польской национальной идеи всё больше меняет отношение австрийского общества к польскому народу."
POL_obr_auh_hoz: "Обращение к Австрийским хозяевам"
POL_obr_auh_hoz_desc: "Австро-венгерская империя, наряду с Германией, долгое время контролировала основные органы управления Польши, не желая делить свою власть с местным правительством. Однако возникают очевидные проблемы: необходимость поддержки гарнизонов и многое другое. Передача больших полномочий и власти, могла бы решить эти убыточные траты."
POL_obr_ger_hoz: "Обращение к Немецким хозяевам"
POL_obr_ger_hoz_desc: "Германское государство уже длительное время контролирует основные органы управления Польши, и всё чаще звучат разговоры о передаче больших полномочий польскому регентскому совету. Если действительно удастся приобрести больше влияния и власти на желанных польских землях, это станет очевидной дипломатической победой."
POL_peredyacha_adm_vlast: "Передача административной власти"
POL_peredyacha_adm_vlast_desc: "На протяжении долгого времени польские дипломаты предпринимали попытки поднять вопрос о передаче реальной территориальной власти в наши руки. Их присутствие на этих землях могло бы значительно улучшить положение местных гарнизонов и оккупационной власти, содержание которой требует существенных денежных и материальных затрат."
POL_new_Ministry_prosve: "Новое министерство просвещения"
POL_new_Ministry_prosve_desc: "Польское национальное просвещение в прошлом стояло перед своими проблемами: оккупационные власти не поддерживали польскую национальную идею и пытались мешать её распространению среди народа. Сейчас же появилась возможность реализовать развитие народного просвещения через проведение различных мероприятий и инициатив."
POL_support_pol_shols: "Поддержка польских школ"
POL_support_pol_shols_desc: "Польские школы неоднократно в прошлом подавлялись и закрывались, что, безусловно, негативно влияло на польское самосознание и развитие польского языка. В настоящий же момент существует реальная возможность поддержать польские школы и способствовать продвижению польской культуры."
POL_rezvit_nolog_set: "Развитие налоговой сети"
POL_rezvit_nolog_set_desc: "Налоговая система на территории Польши неспособна эффективно функционировать и не была должным образом организована. Основная часть финансовых поступлений шла через мелкие сделки и поддержку немецких и австрийских властей. Если же мы стремимся укрепить финансовую стабильность и увеличить доходы, необходимо начать с реорганизации налоговой системы."
POL_norm_post: "Нормализовать поставки"
POL_norm_post_desc: "Поддержание нормальной и насыщенной жизни в Польше с каждым годом становится всё труднее. Перебои в поставках транспорта не дают польскому населению возможности довольствоваться продуктами первой необходимости, включая питание. И без того скудные запасы угрожают превращением ситуации в настоящий коллапс."
POL_prinyatie_soc_zakon: "Принятие социального законодательства"
POL_prinyatie_soc_zakon_desc: "Одной из важных программ нового регентского совета и правительства было улучшение положения рабочих на фабриках и предприятиях, внедрение основных социальных свобод и смягчение условий труда. Очевидно, что такие меры пойдут на пользу простому польскому рабочему."
POL_vozzvan_k_narod_pol: "Воззвание «К польскому народу»"
POL_vozzvan_k_narod_pol_desc: "Предшествующий строй рушится на глазах. Основные правила, по которым жила вся Польша, утратили свою важность. Потерялся смысл жить по чужим правилам и законам, навязанным против польской воли. Отныне у Польши будет свой собственный путь в будущее."
POL_pol_obrsh: "Польское обращение"
POL_pol_obrsh_desc: "Важный конфликт для Польши и всего мира подошёл к концу. Начинается новое время и этап в мировой истории, а также в истории Польши. Вопрос заключается в том, как польский народ сумеет приспособиться к этому переходу и продолжить развиваться дальше."
POL_podshinenie_pol_wermacht: "Подчинение Польского вермахта"
POL_podshinenie_pol_wermacht_desc: "Нам необходимо как можно скорее официально заявить о взятии под своё командование Польского вермахта и внести изменения в текст присяги, что станет важным шагом на пути к консолидации польского политического класса. Таким образом будет заблокировано использование данного воинского формирования в интересах Германии и во вред польскому делу."
POL_naznschenie_kom: "Назначение правительственных комиссаров"
POL_naznschenie_kom_desc: "Власть меняется, однако во многих местных государственных органах до сих пор продолжают действовать немецкие и австрийские подчинённые. Назначение правительственных комиссаров сможет частично решить эту проблему и способствовать развитию польской военной силы."
POL_rasorush_auh_garr: "Разоружение австрийских гарнизонов"
POL_rasorush_auh_garr_desc: "Австрийские гарнизоны спокойно действуют и дислоцируются на Польских землях и Кракове частности, если и правда хотим освободить нашу страну, и построить крепкое правительство, разоружение и отправка австрийских солдатов на родину, будет главным решением."
POL_rasorush_ger_garr: "Разоружение немецких гарнизонов"
POL_rasorush_ger_garr_desc: "Немецкие гарнизоны спокойно действуют и дислоцируются на польских землях. Если мы действительно хотим освободить нашу страну и построить крепкое правительство, то разоружение и отправка немецких солдатов на родину станут главным решением."
POL_nazn_pil_glav_army: "Назначение Пилсудского главкомом армией"
POL_nazn_pil_glav_army_desc: "Прибытие Юзефа Пилсудского и его вооружённых отрядов не может радовать иначе, как с надеждой. Некогда заключённый в тюрьму за свою борьбу, Пилсудский вновь готов отстаивать польские интересы. Никто другой, кроме него, с его богатым командным и военным опытом, так хорошо не подходит на роль главнокомандующего польскими вооружёнными силами."
POL_smestit_bezeler: "Сместить Безелера"
POL_smestit_bezeler_desc: "Немецкий подчинённый и командующий военной администрацией губернатор Ганс Белезер в первую очередь должен покинуть пределы новой Польши, поскольку больше не будет охотно и смиренно слушаться немецких хозяев. Ошибка, допущенная ранее, больше не будет допущена вновь."


POL_form_prav: "Формирование правительства"
POL_form_prav_desc: "С завершением разоружения немецких гарнизонов и установлением собственной власти над землями Польского королевства, следующим шагом должно стать формирование и строительство нового польского правительства под руководством Юзефа Пилсудского, чья харизма и умения помогут отобрать лучших кандидатов и создать вокруг себя сильное правительство."
POL_polsk_nota: "Польская нота"
POL_polsk_nota_desc: "Польша возрождается, и все страны должны знать об этом и признавать новосозданное государство, чьи интересы выходят далеко за пределы национальных польских границ — вплоть до Днепра и Вильнюса, Познани и Смоленска. Если, разумеется, они не пожелают противодействовать нам."
POL_peregovor_s_pnk: "Переговоры с ПНК"
POL_peregovor_s_pnk_desc: "Польский национальный комитет Романа Дмовского стал первым правительством, признанным западными державами. Очевидно, возникла ситуация, когда два правительства претендовали на звание законного правительства: правительство Дмовского в Париже и Пилсудского в Варшаве. Вопрос в том, смогут ли два разных по своим идеям правительства наладить сотрудничество."
POL_decret_marochevsk: "Декрет Марочесвского"
POL_decret_marochevsk_desc: "Енджей Марочевский и его декрет устанавливают диктаторскую и авторитарную власть Юзефа Пилсудского, чье правление над Польшей должно было бы быть временной мерой, до формирования основного, желанного президентского правительства с народным парламентом и выборами."
POL_social_zakon: "Введение социального законодательства"
POL_social_zakon_desc: "Внедрение нового и более прогрессивного социального законодательства могло бы укрепить доверие и улучшить отношения с левыми политическими силами. Их лояльность и поддержка снизили бы риск протестов и ухода фракций в оппозицию, что недопустимо для вновь рождающейся Польши."
POL_malya_const: ""Малая конституция""
POL_malya_const_desc: "Настало время определить дальнейшее устройство Польши. Временное назначение Начальника государства и авторитарные полномочия подходят к завершению, уступая место зарождающейся польской демократии, с сеймом, правами и свободами."
POL_support_velik_pol_vosst: "Поддержка великопольского восстания"
POL_support_velik_pol_vosst_desc: "Восставшие в Познани поляки вступят в тяжелые бои против немецкой армии, чей натиск с каждым днем усиливается. Важнейшим фактором, который может повлиять на исход всего восстания, станет прямая поддержка Великополья и её действующей армии."
POL_prod_na_vosst: "Продвижение на восток"
POL_prod_na_vosst_desc: "Бывшая российская империя потерпела крах. Некогда сильная империя рушится и падает в пучину. Гражданская война, охватившая всю страну, предоставила исключительный и редчайший шанс для реализации всех идей и планов Польши — на возрождение могущественной Речи Посполитой в её границах до первого раздела."
POL_inostran_supp: "Иностранная поддержка"
POL_inostran_supp_desc: "Для реализации и поддержки польских замыслов логичным шагом было бы искать средства, способные повысить боеспособность и силу польской армии. А завершение великой войны и переполненные до предела французские и английские склады могли бы послужить хорошей базой для пополнения уже в руках польских солдат."
POL_polsk_che_gran: "Польско-чешские границы"
POL_polsk_che_gran_desc: "Чешинская Силезия — богатый чешский регион, чья индустриальная мощь не вызывает желания к подчинению, несмотря на то, что этот район заселен польским населением, что создает этнические и национальные претензии. Присоединение Тешинской Силезии в крайнем случае может привести к конфликту или к добровольному плебисциту на данной территории."
POL_vzaim_s_lit: "Взаимодействие с Литвой"
POL_vzaim_s_lit_desc: "Литовское правительство, созданное в Вильнюсе, считается важным политическим и географическим соседом, чьи общие узы переплелись в едином союзе Речи Посполитой. Такая тесная история между двумя народами вызывает большой интерес в польском обществе и желание объединить свои силы."
POL_belarus_obrs: "Белорусское образование"
POL_belarus_obrs_desc: "Созданное белорусское государство, расположенное на территории Минска, претендует на своё этническое существование, хотя попытки его формирования пока не увенчались успехом. Подчинение или поддержка местного правительства могла бы сыграть важную роль в дальнейшем расширении вглубь России."
POL_davl_na_ukr: "Давление на Украину"
POL_davl_na_ukr_desc: "Украинское государство, образованное в годы революции и гражданской войны, прошло через многое, но новые трудности, с которыми приходится сталкиваться Украине, ставят под угрозу её дальнейшую жизнь. И выходит ситуация, в которой наше решение должно быть решительным, ведь потерять такого союзника или территорию, будет большой потерей."
POL_svyaz_s_rva: "Выйти на связь с ДА"
POL_svyaz_s_rva_desc: "Добровольческая армия на юге России продолжает свою борьбу. Возможный выход на связь с русским правительством, чье стремление — восстановить старый порядок, при успешных переговорах может легитимизировать наши будущие достижения от этой старой России, которую они пытаются воссоздать."
POL_support_rusk_form_pol: "Поддержать русские формирования в Польше"
POL_support_rusk_form_pol_desc: "На территории Польши осталось немало русских, и некоторые из них готовы к борьбе против большевизма даже у нас. Поддержка местных сил и организаций в ведении собственной борьбы может повысить доверие к белым и дать им базу для интервенции вглубь Советской России."
POL_priznan_rpk: "Признание РПК"
POL_priznan_rpk_desc: "Русский политический комитет уже начал свою борьбу на нашей территории. Он демонстрирует решительное желание вернуть свои земли, захваченные большевиками. Признание этого комитета могло бы способствовать более эффективным действиям русских политических сил и усилить их борьбу."
POL_priznan_pol_amb: "Признание Польских амбиций"
POL_priznan_pol_amb_desc: "В русских белогвардейских кругах сложилась в основном единая идея, предполагающая возвращение всех имперских земель, утраченных в ходе конфликтов и распада. Разумеется, о полном присоединении Польши к России говорить не стоит, но утрата всех присоединённых территорий и разрушение планов заставляют искать компромиссы и возможные решения."
POL_sovmest_borb: "Совместная борьба"
POL_sovmest_borb_desc: "Стало ясно, что русское правительство готово рассматривать польские планы о подчинении восточных территорий Беларуси и Украины. Взамен польские силы совместно с белогвардейцами должны будут разгромить усиливающуюся Красную армию и сломить большевиков, незаконно закрепившихся в Москве."

POL_vost_terr_polit: "Восточная территориальная политика"
POL_vost_terr_polit_desc: "Все преграды остались позади, новые приобретения на Востоке дали Польше возможность вновь выйти на арену и стать ключевой державой в Восточной Европе. Однако дальнейшая политика в отношении восточных территорий остается под вопросом."
POL_triumf_national: "Триумф национализма"
POL_triumf_national_desc: "Великая Польша возрождается. Территориальные приобретения, которые Польша получила в ходе конфликтов и войн, стали достойной наградой. Теперь мы готовы развернуть свою национальную идею и поделиться ею с малыми народами под властью Польши."
POL_union_meshdmorja: "Союз междуморья"
POL_union_meshdmorja_desc: "Идея великого союза долгое время занимала польские умы. Государство, которое могло бы простираться от моря до моря, будоражит воображение. Создание единого союза между народами Балкан, Восточной Европы и Прибалтики уже готово к реализации."
POL_evrei_vopros: "Евреи Польши"
POL_evrei_vopros_desc: "Немалый процент еврейского населения проживает на территории Польши. Отношения к ним остаются неопределёнными, что, конечно, требует ясной и точной позиции по этому вопросу, учитывая их значительную роль в польском государстве."
POL_voploshenie_promoteisma: "Реализация польского прометеизма"
POL_voploshenie_promoteisma_desc: "Политический проект «прометеизма» ставит целью ослабление и расчленение России путём поддержки национал-сепаратистских движений. В этом случае Польша, подобно Прометею, будет огнём, который дарит свободу угнетённым советской властью народам."
POL_rashirenie_pol_mesdumorya: "Расширение Междуморья"
POL_rashirenie_pol_mesdumorya_desc: "Союз междуморья подразумевает объединение всех государств, входящих в регионы Балкан, Прибалтики и другие. Цель — создать сильнейший оплот и могущественную региональную державу, способную противостоять не менее сильным соперникам."
POL_form_zeml_meshd_mor: "Объединение «земли между морями»"
POL_form_zeml_meshd_mor_desc: "Единый союз — вот что необходимо для создания самой сильной региональной державы, которая стала бы бастионом свободы и равенства для всех народов, населяющих её."
POL_severennyi_mesdumorye: "Сохранение Междуморья как альянс"
POL_severennyi_mesdumorye_desc: "Каждая нация и народ имеют право на свободное и исключительно добровольное присоединение к союзу, ожидая от других его участников защиты и взаимовыгодных отношений, способствующих развитию всех стран, входящих в него."
POL_polit_sohranenya_narod: "Развитие общих культур"
POL_polit_sohranenya_narod_desc: "Множество народов населяет союз, многие из них обладают сильными правительствами и богатой историей. Поддержка и развитие общих культурных традиций принесут лишь процветание каждой нации, входящей в союз."
POL_perestroyka_alliance: "Реформирование ключевых аспектов альянса"
POL_perestroyka_alliance_desc: "Созданный союз пока еще не прочен и остается шатким. Если мы действительно хотим стать достойным оплотом силы, необходимо укрепить его и ввести новые законы, закрепляющие основные положения для всех членов альянса."
POL_podshinenie_blr_ukr: "Подчинение «национальных швов» бывшей России"
POL_podshinenie_blr_ukr_desc: "Приобретения, которые мы смогли получить после войн и конфликтов, на сегодняшний день населяют местные псевдоправительства, слабые и шаткие по своей структуре, в отличие от уже устоявшегося польского руководства. Эти территории могут со временем стать частью польской державы."
POL_hard_polonization: "Жесткие меры полонизации"
POL_hard_polonization_desc: "Народы, населяющие восточные территории нашей страны, пока не отличаются высоким самосознанием. Пока им не удалось полностью осознать свою принадлежность или же отказаться от добровольного объедининения с польской культурой, следует начать полонизацию."
POL_war_partiz: "Контрмеры восточной партизанщине"
POL_war_partiz_desc: "Восточные народы начали национальную борьбу против нашего владычества. Их неорганизованные партизанские формирования сеют хаос в деревнях и безладие в городах. Необходимо подавить их, чтобы ситуация не вышла полностью из-под контроля."
POL_gal_avtonomy: "Пацификация «Восточной Малопольши»"
POL_gal_avtonomy_desc: "Галицкие украинцы давно проводят антипольскую политику, не желая признавать факт принадлежности Галиции как части Польши. Необходимо подавить этих националистов и утвердить свою принадлежность к Восточной Малопольше."
POL_supp_apostol_polinization: "Поддержка «Апостолов полонизации»"
POL_supp_apostol_polinization_desc: "Сильное католическое влияние на протяжении многих веков стало обыденным и всеобщепринятым фактом. Важную роль церкви в жизни поляка глупо отрицать. Поэтому она могла бы стать основным средством в подчинении и ассимиляции местных народов."
POL_rekvezition_west: "Реквизиции с колоний на востоке"
POL_rekvezition_west_desc: "Восточные территории богатые своими ресурсами: обширные леса и поля. Это не может не вызывать соблазна — вывести все эти богатства в Польшу для улучшения жизни, прежде всего, польского народа."

POL_sozd_fin_sistem: "Создание финансовой системы"
POL_sozd_fin_sistem_desc: "Новосозданная Польша сталкивается с первыми проблемами, одной из которых является нестабильная финансовая система, не обеспечивающая должной эффективности. Значительная часть средств просто исчезает, что негативно сказывается на финансовом состоянии республики и подрывает её экономическую стабильность."
POL_Polsky_malozemelye: "Польское малоземелье"
POL_Polsky_malozemelye_desc: "Главной проблемой в основном аграрной части Польши является нерешённая земельная реформа. Крестьянство — основной класс страны, однако у него недостаточно земли, а возможности переезда в город ограничены. Это создает серьёзные трудности с эффективностью всего сельскохозяйственного сектора в экономике."
POL_polon_gos_apparat: "Полонизация гос. аппарата"
POL_polon_gos_apparat_desc: "Польский аппарат кишит нелояльными и подозрительными личностями, чья роль в столь важном деле создает реальную угрозу и порождает недоверие. Очистка кабинета от вредных элементов могла бы улучшить ситуацию и работу государственного аппарата."
POL_vosst_prom: "Восстановление промышленности"
POL_vosst_prom_desc: "Польская экономика после многих лет войны, когда территория стала основным местом конфликта, пришла в упадок и разруху. Некогда процветавшие предприятия превратились в прах и были уничтожены. На полное восстановление страны потребуется немало ресурсов и средств, однако это станет необходимой мерой."
POL_resh_sydbi_sovet: "Решение судьбы рабочих советов"
POL_resh_sydbi_sovet_desc: "С первых дней существования Республики начали формироваться местные рабочие советы, целью которых было дестабилизация ситуации в стране и продвижение к формированию левого, радикального правительства, чьи интересы они точно отстаивали. Однако сейчас они вызывают лишь дополнительную нестабильность в уже и так непростой ситуации."
POL_borba_s_kommun: "Борьба с коммунистической угрозой"
POL_borba_s_kommun_desc: "Разгром рабочих советов не привёл к ожидаемым результатам — судя по всему, их поддержка среди левых фракций значительно усилилась. В результате создается реальная угроза со стороны коммунистов и других левых сил, чьи идеи и планы могут погубить страну."
POL_new_prom_centr: "Новый промышленный центр"
POL_new_prom_centr_desc: "Промышленный сектор Польши, хоть и остаётся самым серьёзным по сравнению с другими странами бывшей Российской империи, с точки зрения западного и европейского мнения считается недостаточно развитым и не очень серьёзным."
POL_create_arms_konglomirate: "Создание оружейных конгломератов"
POL_create_arms_konglomirate_desc: "Сложная ситуация, окружающая Польшу, требует выделения дополнительных средств на развитие оборонной промышленности. Одним из решений может стать создание дополнительных оружейных конгломератов, способных повысить боеспособность страны в военном секторе."
POL_reshit_transport: "Решить транспортные затруднения"
POL_reshit_transport_desc: "Подрывы и разрушения, которые вновь и вновь происходят на железнодорожных путях и станциях, требуют от нас первоочерёдных решений. Ведь полный коллапс, который может наступить в случае бездействия, приведёт к угрозе развала линий снабжения, а впоследствии и фронта."
POL_support_urbanization: "Поддержка урбанизации"
POL_support_urbanization_desc: "После отказа властей от проведения серьезных аграрных преобразований перед нами остаётся единственный путь как избежать проблем на селе: отправка лишних ртов в города."
POL_uglublenie_partilyation: "Углублённая парцелляция"
POL_uglublenie_partilyation_desc: "После проведения первого этапа парцелляции земель крупных помещиков многие крестьяне всё ещё не получили свой надел. Поэтому выкуп земли пройдёт в масштабах всей страны, что потребует больших затрат."
POL_kollectivization_selsk_hoz: "Коллективизация сельского хозяйства"
POL_kollectivization_selsk_hoz_desc: "После поддержки левых идей о проведении земельной реформы настало время для реализации планов. Их целью является преобразование мелких и неэффективных индивидуальных хозяйств в крупные общественные фермы."


POL_form_arm_ministr: "Формирование военного министерства"
POL_form_arm_ministr_desc: "Новосозданной республике необходима сильная армия, особенно в условиях, когда её соседи представляют прямую угрозу нашей безопасности и предпринимают попытки помешать нам и нашим планам о воссоздании Великой Польши. Одним из первых шагов в формировании армии станет создание Министерства обороны."
POL_create_pol_genstb: "Создание польского генштаба"
POL_create_pol_genstb_desc: "Следующим шагом в формировании дееспособной армии является создание и назначение Польского высшего командования, которое сможет обеспечить высокую боеспособность армии и руководить её частями на фронте."
POL_org_priziv: "Организация призыва"
POL_org_priziv_desc: "Все приготовления завершены, командование создано, военное министерство назначено, и остается лишь мобилизовать население и сформировать дивизии, которые смогут отстоять польские интересы и реализовать поставленные планы."
POL_general_okrug: "Генеральные округа"
POL_general_okrug_desc: "Польская армия нуждается в новых людских ресурсах и мобилизованных рекрутах для пополнения рядов, увеличения численности и, следовательно, повышения её силы."
POL_union_kzvo: "Объединение с КЗВО"
POL_union_kzvo_desc: "С отступлением немецких войск на покинутых ими территориях, стали формироваться польские пограничные силы самообороны. Политическое руководство над ними осуществлял Комитет обороны Восточных Кресов. Когда же восточные рубежи перестанут нуждаться в их поддержке, будет разумно интегрировать эти силы в общие вооружённые структуры."
POL_form_polk_new_priziv: "Формирование полков нового призыва"
POL_form_polk_new_priziv_desc: "Польше всё более остро необходимо наращивать силу своей армии. Новые вызовы и угрозы, с которыми она сталкивается, требуют проведения дополнительных волн мобилизации и формирования новых полков призыва."
POL_lit_bel_div: "Литовско-белорусские дивизии"
POL_lit_bel_div_desc: "В связи с возникшей необходимостью включения вооружённых частей Комитета обороны Восточных Кресов в состав регулярной польской армии было решено создать литовско-белорусские дивизии. Эти дивизии должны будут состоять из добровольцев с восточных рубежей, в первую очередь — из тех, кто уже сосредоточен в существующих рубежах самообороны."
POL_unification_arm_sil: "Унификация вооружённых сил"
POL_unification_arm_sil_desc: "Польская армия, собранная из множества полков и дивизий, воюющих по разные стороны великой войны и других конфликтов, была объединена в единое польское войско. Но такое решение привело лишь к новым проблемам, и даже общие цели польской нации не смогли сплотить эти части. Теперь же настало время исправить это."
POL_otlov_dizertiv: "Отлов дезертиров"
POL_otlov_dizertiv_desc: "Проблема бегства призывников и солдат становится всё более серьёзной и острой. Доходит до дезертирства целых военных частей, которые не желают бороться за планы польского государства. Не остаётся другого выхода, как вводить наказания и предпринимать меры по возвращению дезертиров на линию фронта."

