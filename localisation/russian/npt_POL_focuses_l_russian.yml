POL_rusk_form_in_poland: "Связь с русскими добровольческими формированиями"
POL_rusk_form_in_poland_desc: "\n\n£poland_white_army_support£\n\n\nЗахваченные территориями, оккупированными §YПольшей§!, создавали хорошую платформу для формирования разрозненных русских политических кругов и боевых отрядов, вплоть до организации и подчинения целых белых армий, целью которых была борьба с большевизмом. Поддержка этих сил могла бы повлиять на отношение деятелей бывшей имперской России к образовавшейся §YПольской республике§!, что в свою очередь могло сыграть решающую роль в борьбе против большевиков. А также, именно польская территория могла бы стать ключевым оплотом белых в их противостоянии."
POL_peregovor_s_savinkov: "Переговоры с Савинковым"
POL_peregovor_s_savinkov_desc: "Непосредственным политическим лицом, которое могло бы посодействовать и стать главным организатором формирования русских армий в Польше, никто лучше не подойдет, как Савинков — видный контрреволюционер, подрывник и эсер. Настоящий борец с большевизмом, да к тому же знакомый с самим Пилсудским."
POL_sodeistv_perehody_bredova: "Содействовать переходу Бредова"
POL_sodeistv_perehody_bredova_desc: "Многотысячная армия генерала Бредова вынуждена самостоятельно пробиваться к основной линии фронта Добровольческой армии после губительного отказа румынского правительства разрешить её переброску через свою территорию. Мы обязаны принять генерала Бредова, в противном случае последствия для его армии и фронта будут необратимы."

POL_pribirie_glazenapa: "Прибытие генерала Петра Глазенапа"
POL_pribirie_glazenapa_desc: "Русский генерал, что решил сражаться против большевизма, от имени Русского политического комитета."
POL_pribirie_permkina: "Прибытие генерала Бориса Пермикина"
POL_pribirie_permkina_desc: "Русский генерал, что решил сражаться против большевизма, от имени Русского политического комитета."
POL_form_russ_army: "Русский политический комитет формирует Русскую армию"
POL_form_russ_army_desc: "Наиболее важным аспектом работы РПК стало создание русских отрядов для совместных с поляками действий против Красной армии. Для этого политический комитет решил сформировать единую 3-ю Русскую армию в Польше. "
POL_rpk_form_divizion: "Русский политический комитет разворачивает пехотную дивизию"
POL_rpk_form_cav_divizion: "Русский политический комитет разворачивает кавалерийскую дивизию"
POL_rpk_form_divizion2: "Русский политический комитет разворачивает пехотную дивизию"
POL_rpk_form_cav_divizion2: "Русский политический комитет разворачивает кавалерийскую дивизию"
POL_pribirie_simansky: "Прибытие генерала Пантелеймона Симанского"
POL_pribirie_simansky_desc: "Русский генерал, что решил сражаться против большевизма, от имени Русского политического комитета."
POL_pribirie_Boboshko_and_Sobolevsky: "Прибытие генерала Соболевского и Бобошко"
POL_pribirie_Boboshko_and_Sobolevsky_desc: "Русские генералы, что решили сражаться против большевизма, от имени Русского политического комитета."
POL_pribirie_palen: "Прибытие генерала Алексея Палена"
POL_pribirie_palen_Desc: "Русский генерал, что решил сражаться против большевизма, от имени Русского политического комитета."
POL_support_form_army_rpk: "Поддержать РПК в формировании новых частей"
POL_support_form_army_rpk_desc: "Русский Политический комитет активно задействует свои силы для формирования новых подразделений и частей. Их финансовые возможности ограничены, поэтому, оказав им поддержку, они могли бы ускорить создание собственной армии."
POL_otkaz_support_form_army_rpk: "Приостановить поддержку для РПК"
POL_otkaz_support_form_army_rpk_desc: "Нехватка собственных средств сильно сказываются на нашей собственной армии."
POL_dogovor_s_kassak: "Договор с казаками Сальникова"
POL_dogovor_s_kassak_desc: "С массовым переходом бело-казаков на нашу сторону появлялись значительные силы, одерживающие крупные победы, преданные идеям борьбы с большевизмом, но не желавшие становиться подконтрольными Великороссам в Русском политическом комитете. Однако объединение представлялось гораздо более разумным и целесообразным с точки зрения логики и реализма."
POL_provedenie_sovmestn_podgotovk: "Проведение совместной подготовки войск"
POL_provedenie_sovmestn_podgotovk_desc: "Профессиональная подготовка войск, которые готовит комитет, остается весьма сомнительной. Низкий уровень боевой подготовки личного состава неизбежно приведёт к серьёзным проблемам в будущем. Поэтому следует заняться их подготовкой и оказать содействие в этом, совместно с нашим регулярным и хорошо подготовленным войском."
POL_ylyshenie_oficeer_korpus: "Увеличение офицерского состава комитета"
POL_ylyshenie_oficeer_korpus_desc: "Комплектование войск и офицерского состава, созданных комитетом, оставляет желать лучшего. Оно велось в основном за счёт вербовки офицеров, для которых война была профессиональной деятельностью. В то же время нижние чины набирались в основном в лагерях для военнопленных среди бывших красноармейцев. Такое распределение не может быть эффективным и грамотно управлять войсками."
