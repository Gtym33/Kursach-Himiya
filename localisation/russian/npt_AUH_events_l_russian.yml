l_russian:
 austro-hungarian.1.t: "Выборы в Рейхсрат"
 austro-hungarian.1.d: "В этом году состоятся очередные выборы в Рейхсрат Цислейтании, борьба на них будет разворачиваться между авторитаристами и социал-демократами. Кто же победит?"
 austro-hungarian.1.a: "Уверенно победят авторитаристы."
 austro-hungarian.1.b: "Победа социал-демократов!"
 AUH_authoritarists_win: "Победа авторитаристов"
 AUH_social_democracy_win: "Победа социал-демократов"
 AUH_declared_republic: "Провозглашена республика"
 austro-hungarian.2.t: "Судьба Сербии"
 austro-hungarian.2.d: "После продолжительных переговоров с сербским и черногорским правительствами в изгнании, оно наконец-то предожило заключить мир между нашими странами. Черногория согласилась стать коронной землёй в нашем составе. Какие условия мира мы поставим сербам? Надо учесть, что сербская сторона заявляет об отказе от подписания мира в случае если условия будут неприемлимыми для них."
 austro-hungarian.2.a: "Аннексиовать Северную Сербию, Македонию передать Болгарии."
 austro-hungarian.2.b: "Аннексировать юго-запад Сербии, Македонию передать Болгарии."
 austro-hungarian.3.t: "Бухарестский мирный договор"
 austro-hungarian.3.d: "После недолгой румынской кампании в конце 1916 года проедённой генералом фон Макензеном, большая часть Румынии оказалась под контролем Центральных Держав. Некоторое время румыны упорно не хотели заключить с нами мир, и вот наконец этот момент настал. Какие условия нам выдвинуть им?"
 austro-hungarian.3.a: "Потребовать Карпатские проходы и передать Болгарии Южную Добруджу."
 austro-hungarian.4.t: "Вопрос о польской короне"
 austro-hungarian.4.d: "После совещаний с императором Австро-Венгрии, мы решили, что пришло время попросить у Германской Империи право на коронацию австрийского аристократа в Польше. Но кому суждено стать королём Польским? С одной стороны, император хочет сам занять престол Польши и присоединить её в состав нашей империи, с другой — марионетка немцев эрцгерцог Карл Стефан Австрийский хочет занять престол Польши, что не понравится императору. И в-третьих — есть Карл Альбрехт, который угодит всем интересам."
 austro-hungarian.4.a: "Польским королём должен стать Карл I"
 austro-hungarian.4.b: "Придётся уступить престол Карлу Стефану"
 austro-hungarian.4.c: "Королём станет Карл Альбрехт"
 austro-hungarian.5.t: "Вопрос о польской короне"
 austro-hungarian.5.d: "Австрийцы заявили нам, что хотят видеть в Польше своего монарха. Разрешим ли мы посадить Габсбурга на польский престол?"
 austro-hungarian.5.a: "Ради дружественных отношений"
 austro-hungarian.5.b: "Мы найдём более подходящего монарха для Польши"
 austro-hungarian.6.t: "Германия оказывает"
 austro-hungarian.6.d: "После переговоров Германия отказала нам в коронации австрийского монарха в Польше."
 austro-hungarian.6.a: "Печально."


 austro-hungarian.100.t: "Венгрия разрывает унию с Австрией"
 austro-hungarian.100.d: "Распад старого порядка стал неизбежен. После месяцев политического хаоса, поражения на фронтах и давления со стороны национальных советов, будапештский парламент пошел на решительный разрыв. Последней каплей стало намерение императора Карла I спасти монархию через федерализацию. Венгерская элита, от либералов до консерваторов, движимая разными мотивами от нежелания быть в составе проигранной державы, до непримиримой позиции, отказывающейся от идеи федерализации, сошлась во мнении, что сохранение общей структуры с Австрией стало тормозом на пути к миру и внутренней стабильности. На фоне массовых демонстраций в Будапеште и требования президента Вильсона о самоопределении народов, парламент проголосовал за немедленное расторжение унии. Исторический компромисс 1867 года официально аннулирован. Ссылаясь на Прагматическую санкцию 1723 года и дух революции 1848 года, новое правительство объявило о роспуске общих министерств и создании независимого венгерского внешнеполитического ведомства. Цепь, скреплявшая две половины дунайской монархии, наконец, разорвана. Теперь Венгрия должна спасать себя сама — перед лицом наступающих армий Антанты и взбудораженных соседей, требующих своей доли наследства Габсбургов."
 austro-hungarian.100.a: "Пусть уходят"
 austro-hungarian.100.b: "Венгрия будет свободной!"
 austro-hungarian.112.t: "Поражение в войне"
 austro-hungarian.112.d: "Заседание Палаты представителей, нижней палаты парламента, началось с ожидаемого скандала. Граф Михай Каройи, лидер леволиберальной оппозиции, давний критик прогерманского курса и последовательный пацифист, обрушился на правительство с обвинениями в катастрофическом ведении войны и потребовал немедленного разрыва союза с Германией. “Я пришел похоронить Цезаря, а не хвалить его” - начал он. Он требовал независимости Венгрии и сепаратного мира с Антантой, признавая, что развязаная верхами война, проиграна.\n\nПосле него выступал Иштван Тиса — «железный премьер», человек, который четыре года назад втянул страну в войну, человек, который подавлял любые попытки мирных переговоров железной рукой, выстраивал жестойчашую вертикаль власти и блокировал все реформы, направляя силы на подготовку к войне. Он произнес совершенно не то, что от него ожидали депутаты:\n\n«Я не буду играть словами. Я должен признать правду того, что сказал в своей речи Михай Каройи. Мы проиграли войну».\n\nЭти слова обрушились на зал, как гром среди ясного неба. Большинство депутатов, еще вчера клеймивших Каройи как пораженца и предателя, сидели в оцепенении. Тиса, архитектор военного союза с Берлином, сломался под тяжестью собственной ответственности. Признание исходило от того, кто до последнего отрицал очевидное. В этот момент старый порядок, державшийся на отрицании реальности, рухнул. Теперь Каройи будет добиваться отставки всех реакционеров с министерских постов в намерении сформировать собственное демократическое правительство. Речь Тисы дает этому намерению зеленый свет."
 austro-hungarian.112.a: "Векерле будет искать соглашения с Каройи"