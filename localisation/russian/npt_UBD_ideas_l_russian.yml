l_russian:
 UBD_german_occupation_idea: "Немецкие гарнизоны"
 UBD_german_occupation_idea_desc: "Одной из многих проблем нашей страны является отсутствие собственных вооруженных сил. В данный момент их заменяет германский Рейхсхеер. Немецкие гарнизоны фактически являются реальной властью на местах и мало считаются с правительством герцогства. Эта ситуация ежедневно порождает все новые и новые конфликты и разжигает националистические настроения среди латышей и эстонцев. К тому же продовольственные проблемы в Германии вынуждают местные войска заниматься реквизицией продовольствия и материальных ценностей что наносит ущерб нашей экономике, которая и без того находится в печальном состоянии."
 UBD_financial_problem_2_idea: "Финансовые проблемы"
 UBD_financial_problem_2_idea_desc: "Казна Герцогства фактически пуста, а налоговая система только создается. Любые решения принимаемые правительством бессмыслены, если нечем финансировать их исполнение. Эта проблема должна быть решена до того как авторитет властей в глазах населения не упал до той степени, когда Совету перестанут подчинятся даже собственные секретари."
 UBD_financial_problem_1_idea: "Финансовые затруднения"
 UBD_financial_problem_1_idea_desc: "Принятые правительством меры по улучшению финансовой ситуации оказались весьма результативными, однако хронический дефецит бюджета продолжает чинить препятствия в государственном управлении."
 UBD_weak_state_apparatus_3_idea: "Слабый государственный аппарат"
 UBD_weak_state_apparatus_3_idea_desc: "В данный момент правительство опирается на местные собрания остзейских немцев - Ландраты. Однако их поддержки слишком мало для нормального функционирования государственного аппарата. Необходимо создать лояльные исключительно Совету исполнительные органы и судебную систему."
 UBD_ethnic_problem_idea: "Этнические конфликты"
 UBD_ethnic_problem_idea_desc: "Балтийское герцогство населяют три основных народа: остзейские немцы, латыши и эстонцы. Националистические движения и земельные притязания последних представляют собой угрозу власти крупных немецких землевлевладельцев и древних рыцарских орденов, которые в свою очередь стремятся к расширению своего экономического, политического и культурного влияния в регионе."
 UBD_landwehr_1_idea: "Балтийский Ландвер"
 UBD_landwehr_1_idea_desc: "Балтийский Ландвер - вооруженые силы Объединенного Балтийского Герцогства состоящие из остзейских немецких отрядов ополчения и национальных батальонов латышей и эстонцев согласившихся поступить на службу в Ландвер"
 UBD_landwehr_2_idea: "Остзейская Армия"
 UBD_landwehr_2_idea_desc: "Дальнейшее расширение Ландвера и улучшение его технического обеспечения позволило командованию реорганизовать отряды ополчения в полноценную регулярную армию способную на равных противостоять агрессивным соседям Герцогства."
 UBD_service_for_land_idea: "Земля за службу"
 UBD_service_for_land_idea_desc: "Правительство организовало программу по которой солдаты и офицеры Рейхсхеера могут перейти на службу в Балтийский Ландвер взамен получив надел из специально созданного для этих целей земельного фонда."