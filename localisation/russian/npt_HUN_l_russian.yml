l_russian:
 #event
 hungary.1.t: "Поражение в войне"
 hungary.1.d: "Заседание Палаты представителей, нижней палаты парламента, началось с ожидаемого скандала. Граф Михай Каройи, лидер леволиберальной оппозиции, давний критик прогерманского курса и последовательный пацифист, обрушился на правительство с обвинениями в катастрофическом ведении войны и потребовал немедленного разрыва союза с Германией. “Я пришел похоронить Цезаря, а не хвалить его” - начал он. Он требовал независимости Венгрии и сепаратного мира с Антантой, признавая, что развязаная верхами война, проиграна.\n\nПосле него выступал Иштван Тиса — «железный премьер», человек, который четыре года назад втянул страну в войну, человек, который подавлял любые попытки мирных переговоров железной рукой, выстраивал жестойчашую вертикаль власти и блокировал все реформы, направляя силы на подготовку к войне. Он произнес совершенно не то, что от него ожидали депутаты:\n\n«Я не буду играть словами. Я должен признать правду того, что сказал в своей речи Михай Каройи. Мы проиграли войну».\n\nЭти слова обрушились на зал, как гром среди ясного неба. Большинство депутатов, еще вчера клеймивших Каройи как пораженца и предателя, сидели в оцепенении. Тиса, архитектор военного союза с Берлином, сломался под тяжестью собственной ответственности. Признание исходило от того, кто до последнего отрицал очевидное. В этот момент старый порядок, державшийся на отрицании реальности, рухнул. Теперь Каройи будет добиваться отставки всех реакционеров с министерских постов в намерении сформировать собственное демократическое правительство. Речь Тисы дает этому намерению зеленый свет."
 hungary.1.a: "Векерле будет искать соглашения с Каройи"
 hungary.2.t: "Отставка Векерле"
 hungary.2.d: "Ободренный признанием Тисы о поражении, Каройи продолжает требовать бразды правления. Каройи видит желательность своего руководства не только потому, что это могло улучшить положение Венгрии по отношению к странам Антанты, где он популярен за счет своей антивоенной и прорузвельтовской позиции, но и считает, что если правительство не проведет значительных социальных реформ, в Венгрии произойдет революция большевистского типа. Он заявил в Палате Представителей:\n\n«Если мы не хотим здесь крайнего проявления санкюлотизма и большевизма, мы должны действовать сегодня. Если нет, то я буду считать вас, господин премьер-министр, ответственным за ту ситуацию, которая наступит, если вы немедленно не уйдете в отставку. … И если правительство не будет действовать, то я заявляю и, пожалуйста, примите к сведению, что буду действовать я!»\n\nСегодня премьер-министр Шандор Векерле, безуспешно пытавшийся достигнуть соглашения с Каройи о его вхождении в правительство, принял решение о своей отставке. Теперь остается ждать того, чтобы Император одобрил кандидатуру графа Каройи на пост премьер-министра."
 hungary.2.a: "Что скажет Карл?"
 hungary.3.t: "Независимость Хорватии"
 hungary.3.d: "Хорватский сабор в Загребе провозгласил государственную независимость Далмации, Хорватии и Славонии от Австрии и Венгрии «в соответствии с принципом самоопределения Вильсона”."
 hungary.3.a: "Доброй дороги."
 hungary.3.b: "Да здравствует независимость!"
 hungary.4.t: "Венгерский кабинет"
 hungary.4.d: "Кабинет правительства под руководством Шандора Векерле не смог добиться соглашения с оппозицией, а старые правительственные круги, реакционеры и консерваторы официально капитулировали после того, как Иштван Тиса, бывший премьер-министр и архитектор авторитарной системы Венгерского Королевства объявил, что война проиграна. \n\nЕго Величеству поступают запросы от венгерского графа Михая Каройи, критика войны в венгерском парламенте, сторонника Антанты и радикального реформатора. Он настаивает на том, чтобы Карл дал добро на его назначение премьер-министром для реализации его планов по федерализации Венгрии, проведении аграрной и избирательной реформы. Он не намерен договариваться с венгерским парламентом, который он намерен распустить, ибо там заседает лишь аристократия, которая будет блокировать его политику, а потому его действия и лозунг о том, что он будет опираться на “новые исторические классы”, звучит угрожающе и рискует привести к тому, что радикализм Каройи доведет до потери Карлом венгерской короны.\n\nВзамен мы можем назначить более умеренную персону на пост премьер-министра, чтобы она сформировала либеральный кабинет, однако Михай Каройи заявляет, что если Император не пойдет на уступки, то он будет действовать самостоятельно и провозгласит Венгерский национальный совет, создав ситуацию двоевластия."
 hungary.4.a: "Каройи нельзя. Назначим разбираться делами регента Иосифа Августа"
 hungary.4.b: "Нет выхода. Каройи назначается. Август отправится регентом"
 hungary.5.t: "Венгерский Национальный Совет"
 hungary.5.d: "После аудиенции Михая Каройи с Императором в замке Гёдёллё, он вернулся в Будапешт  с печальной вестью о том, что ему было отказано в назначении премьер-министром. Единственным назначением стал регент Венгрии Август Иосиф, которому было поручено назначить премьер-министра. Тогда Каройи направился к оппозиции и массам. Каройи стал президентом вновь сформированного контрправительства — Венгерского национального совета. Национальный совет представляет коалицию поддерживаемой тремя партиями: Социал-демократической партией, партией Каройи и Радикальной партией Оскара Яси. В тот же день Совет, расположившийся в отеле “Астория”, выпустил прокламацию, которая, подобно прокламации Венгерской революции марта 1848 года, содержит двенадцать пунктов. Она была написана Оскаром Яси и напечатана в нескольких ежедневных газетах, вышедших сегодня же. Прокламация включает требование изменения «коррумпированной парламентской и правительственной систем, в которых страна видит своих врагов, а не своих представителей». Эта программа Национального совета включает создание независимой Венгрии, немедленное завершение «безнадежной войны», отказ от «Германского союза» и всеобщее и тайное избирательное право. Она обещает гражданские свободы и амнистию для всех политических заключенных. Предполагаемые социальные реформы включают перераспределение земли и национализацию крупной промышленности. Последние три пункта касались внешнеполитической программы Национального совета. Пункт десятый призывал к признанию «недавно созданных украинского, польского, чешского, южнославянского и австрийского государств» и к тесному экономическому и политическому сотрудничеству с ними. Далее программа намечает создание посольств за границей во главе с известными венгерскими демократами. Их главной ролью было «подчеркивать связи между венграми и братскими народностями, исходя из соображений общности их интересов». Пункт двенадцатый говорит о необходимости направить на мирную конференцию представителей, которые выступали за всеобщее разоружение и поддерживали создание сильных международных организаций. Диктаторские мирные договоры в Бухаресте и Брест-Литовске отвергаются с требованием, чтобы «вопросы войны и мира решались представителями всех народов земного шара».\n\nПрокламация Национального совета завершается просьбой к иностранным правительствам признать Совет единственным законным правительством Венгрии:\n\n«Только Венгерский национальный совет может говорить или уполномочен действовать от имени венгерской нации, от крови и труда которой зависит Венгрия».\n\nЧтобы создать себе репутацию народного института, Национальный совет решил организовать мирное шествие к Королевскому дворцу. Демонстранты стремились выразить свое желание, чтобы король принял программу Национального совета. Шествие имело лишь символическую цель, так как короля не было в Будапеште. Демонстранты оставили национальное знамя, подаренное Каройи, развевающимся над Королевским дворцом. Когда упорядоченная манифестация уже собиралась покинуть дворцовую площадь, она была рассеяна конной полицией. В столкновении сорок демонстрантов были серьезно ранены, около двухсот получили легкие ранения."
 hungary.5.a: "Да здравствует Венгрия!"
 hungary.6.t: "Солдатский совет"
 hungary.6.d: "После провозглашения Национального совета, революционно ориентированные офицеры и солдаты подписали соглашение о формировании Солдатского совета, который должен будет организовывать солдатскую массу, защищать интересы революции и не допустить использования армии против народа."
 hungary.6.a: "Армия с нами или это небольшая кучка офицеров?"
 hungary.7.t: "Министерство Хадика"
 hungary.7.d: "Отвергнутый в своей попытке прийти к власти, Каройи имел последнюю возможность приобрести власть законными средствами. Он мог лично убедить императора-короля назначить его премьер-министром Венгрии. Однако король Карл отказался и вместо этого послал эрцгерцога Йозефа в Будапешт править в качестве регента, пока не будет найден приемлемый человек на этот пост.\n\nПо возвращении из Вены в венгерскую столицу, тысячи людей приветствовали Каройи и славили его как лидера теперь уже, казалось, неизбежной революции. Толпа приветствовала его, не исполняя ни гимн Монархии, ни Национальный гимн, а гимн революции: «Марсельезу». Человек, который менее двух недель назад предупреждал парламент об опасности санкюлотизма, принял поддержку масс.\n\nФиналом стало назначение регентом Иосифом Августом либерала Яноша Хадика, который искал соглашения с Каройи в деле формирования правительства. Однако бойня на “Цепном мосту” в Буде в результате которой демонстранты, подстрекаемые революционным агитатором Иштваном Фридрихом, пытаясь прорваться через полицейский кордон и были расстреляны, сорвала всякую надежду. Каройи и другие члены Национального совета приступили к организации силового захвата власти и агитации в городе и войсках за Национальный совет и революцию. Социал-демократическая партия издала революционный манифест."
 hungary.7.a: "Камень покатился, где он теперь остановится?"
 hungary.8.t: "Выступление солдатского совета"
 hungary.8.d: "К утру после публикации Манифеста власти приказали эвакуировать 32-ю пехотную бригаду из-за успешной революционной агитации среди её солдат. Днём правительственные войска совершили налёт на штаб Солдатского совета, но лидеры Совета, предупреждённые телефонисткой, избежали ареста. Вечером Совет собрался в новом месте. В казармах 32-й бригады солдаты отказались ехать на фронт, за что были разоружены и арестованы. Среди членов Совета возникли разногласия: одни призывали к немедленному восстанию, опасаясь, что революционные части выведут из Будапешта и заменят боснийскими войсками. Узнав о насильственной отправке двух рот 32-й бригады на фронт, Совет решил действовать. Десятитысячная толпа демонстрантов под руководством членов Совета направилась к Южному вокзалу. Охрана вокзала отказалась стрелять, часть солдат сдала оружие и присоединилась к демонстрантам. Освободив роты, повстанцы во главе с офицерами Совета двинулись к штабу коменданта. Солдаты сорвали с мундиров имперские знаки отличия, заменив их белыми астрами. Охрана штаба сначала отказалась открывать ворота, но после предупредительных выстрелов уступила. Комендант генерал Варконьи был арестован и доставлен в штаб Национального совета. Тем временем другие члены Совета вошли в казармы 1-й пехотной бригады, призвав военных присоединиться к революции. После взятия штаба коменданта Совет приказал занять ключевые общественные здания и установил контроль над полицией. Повстанцы также освободили заключённых членов Совета из Военной тюрьмы. Спонтанные действия Солдатского совета застали Национальный совет врасплох. Ситуация накалилась из-за слухов о вводе в город боснийских частей для подавления восстания. Из перехваченных сообщений стало известно, что генерал Лукачич намерен штурмовать город и запрашивает разрешение у Короля и регента, а также подкрепления с фронта. Предпримет ли Его Величество сохранить монархию силой в условиях полного распада его Империи?"
 hungary.8.a: "Хватит проливать кровь моих подданных."
 hungary.8.b: "Лукачичу будет оказана поддержка."
 hungary.9.t: "Отставка Хадика"
 hungary.9.d: "“Два часа спустя бледный и запыхавшийся посыльный принес тревожную новость о том, что на телефонной станции перехватили разговор между Лукачичем и королем, в котором генерал спрашивал разрешения атаковать «Асторию» своими войсками. Я немедленно позвонил эрцгерцогу, попросив его предотвратить осуществление этого намерения Лукачичем, и напомнил ему, что по всей Монархии независимые национальные государства были образованы без кровопролития. Он обещал немедленно поговорить с Лукачичем и сообщить мне о результате. Я поспешил обратно в «Асторию». Приближаясь к «Астории», мы попали под ружейный залп. Чем ближе мы подходили, тем сильнее становилась стрельба, и мы были убеждены, что началась та самая страшная атака. Темнота и густой туман не позволяли разобрать, что происходит на самом деле. Наверху оставшиеся члены Совета сидели в унынии и изнеможении, полные решимости держаться до конца. Профессор Яси, Лайош Хатвани и Кери объявили, что битва проиграна. Дождь лил не переставая; немногочисленный гарнизон постепенно таял, всё больше людей тайком уходили по домам. Мы молча сидели, ожидая рассвета. Внезапно зазвонил телефон. Премьер-министр был готов принять меня. Мы все вздохнули с облегчением. Было 7 часов утра, когда Хадик встретил меня в кабинете премьер-министра. Он проводил нас, не говоря ни слова, в дом эрцгерцога, находившийся неподалеку. Хадик начал с того, что желает подать в отставку. Эрцгерцог принял ее от имени короля и, обратившись ко мне, назначил меня премьер-министром, также от имени короля. Больше ничего не было сказано; не было никаких переговоров, это была полная и безоговорочная капитуляция. Я заверил эрцгерцога, что правительство будет сформировано непременно в течение дня. Кунфи поручился, что с помощью организованных рабочих порядок будет поддерживаться.”"
 hungary.9.a: "Победа революции?"
 hungary.10.t: "Присяга Иосифа Августа"
 hungary.10.d: "Эрцгерцог Иосиф Август и его сын явились в Национальный совет, чтобы принести там присягу Национальному совету и новому правительству Венгрии. В общие одобрительные возгласы, которыми присутствующие встретили присягу эрцгерцогов, вплелись и смущающие гостей приветствия республики."
 hungary.10.a: "Короли нам присягают"
 hungary.11.t: "Положение Советов"
 hungary.11.d: "В Будапеште Рабочий совет начал организовываться накануне революции при усилиях социал-демократической партии. Выборы в совет проводились профсоюзными чиновниками, которые позаботились о том, чтобы их кандидаты были приемлемы для социалистов и нового правительства. Он насчитывает триста шестьдесят пять членов, двести тридцать девять из которых были избраны непосредственно представителями заводов и фабрик, а сто двадцать шесть были делегированы руководством партии и профсоюзов. Совет действует как продолжение Социал-демократической партии, одобряя те правительственные меры, которые партия уже поддержала.\n\nПредседателем Рабочего совета назначен Деже Боканьи, старый социалист и опытный профсоюзный организатор, возглавлявший Союз каменщиков. Каройи также назначил его председателем Национального пропагандистского комитета — должности, для которой он хорошо подходил как самый способный и популярный оратор социал-демократов.\n\nЧто касается Солдатского совета, то он не находился под контролем какой-либо партии. Многие его члены, однако, симпатизируют умеренной или радикальной социал-демократии. Чтобы предотвратить угрозу власти с этой стороны, Солдатский совет был реорганизован в обоюдном соглашении. Его новым председателем стал Йожеф Погань, бывший военный корреспондент социалистической газеты «Непсава» и доверенный социал-демократ. Совет перешел под строгий надзор нового министра обороны, пацифиста Белы Линдера. Председатели Рабочего и Солдатского советов должны выступать в качестве связующего звена между своими организациями и Национальным советом. Однако, ни один из трех советов не обладает исполнительной или законодательной властью; их роль определяется как «совещательная»."
 hungary.11.a: "Нам удалось избежать двоевластия?"
 hungary.12.t: "Правительство революции"
 hungary.12.d: "Первой задачей Каройи на посту премьер-министра является формирование кабинета, который бы выполнил программу революции. Члены кабинета должны были быть выбраны из партий, входивших в Национальный совет. Утром 31-го числа Совет переехал из своей тесной штаб-квартиры в отеле «Астория» в зал заседаний в ратуше.  Скелетный кабинет, сформированный Каройи, включал другого его сторонника, графа Тивадара Баттьяни, в качестве министра внутренних дел и Мартона Ловаси в качестве министра образования. Социал-демократы получили два поста в кабинете: Жигмонд Кунфи стал министром благосостояния, а Эрнё Гарами — министром торговли. Хотя социал-демократы лишь меньшинство в этом кабинете, их влияние на политические вопросы подавляюще, ибо только у них есть массовая сила и организационные центры - профсоюзы, в которых уже около полумиллиона человек. Важный пост министра по делам национальностей был отдан известному европейскому социологу и теоретику федерализма Оскару Яси,  популярному также по своему эссе «Будущее Монархии, крах дуализма и Дунайские Соединенные Штаты», который представлял небольшую Радикальную партию, основанную им незадолго до начала войны. Как и социал-демократы, Радикальная партия не имела представительства в парламенте королевства, но в годы войны она приобрела все большую известность благодаря своей открыто пацифистской платформе. Это был тот принцип, который придавал единство партии, в остальном включавшей широкий спектр взглядов — от марксизма до либерализма laissez-faire.  Военным министром был назначен полковник от артиллерии Бела Линдер, занимающий яростную пацифисткую позицию и произнесший один из лозунгов революции на митинге перед солдатами Будапешта: «Тысячи лет традиций, тысячи лет рабства, тысячи лет тирании должны были быть уничтожены. Для этого потребовалась пятилетняя война, тысячи и тысячи погибших, чтобы подняться из неё в новую победоносную жизнь. Эта новая победоносная жизнь рождается в духе пацифизма.» и «Нам больше не нужна армия! Я больше никогда не хочу видеть солдат!»"
 hungary.12.a: "Собрались"
 hungary.13.t: "Дикая социализация"
 hungary.13.d: "Нетерпеливые рабочие завладели рядом заводов, где антагонизм между рабочими и владельцами был особенно сильным. Под лозунгом социализации производства, рабочие прогоняют директоров и руководителей и берут управление в свои руки. Профсоюзы решительно выступили против таких мер, заявляя, что спонтанный захват заводов дезорганизует производство, нанося урон революционной экономике и служит делу реакции. Профсоюзы и социал-демократы призывают к трудовой дисциплине и реализации программы социализации поэтапно, но анархия и классовый антагонизм диктуют свою логику, которая к возрастанию самоуверенности рабочих и дезорганизации хозяйства."
 hungary.13.a: "Ситуация накаляется."
 hungary.14.t: "Крестьянские самозахваты"
 hungary.14.d: "После развала государственного аппарата провинцию захлестнула анархия. Деревени наводнили демобилизованные солдаты, банды дезертиров и просто волна крестьянских выступлений, направленных на разграбление складов и реализацию их давней мечты - земельного передела. Инвентарь поместий разграбляется, крестьяне прогоняют помещиков и захватывают их земли. Помещики организуют свои дружины и самостоятельно защищают свои владения.\n\nСоциал-демократы настаивают на том, чтобы правительство организовало части Национальной и Рабочей гвардии для поддержания порядка в деревне и пресекло анархию в деревне, которая дискредитирует революцию и ставит под удар продовольственную ситуацию в городах, зависящих от поставок с поместий.\n\nОднако позиция социал-демократии вызывает опасения тем, что она является противником аграрной реформы, которой придерживаются наши буржуазные министры вроде Оскара Яси и Иштвана Сабо де Надьятада. Программа социал-демократов акцентируется на кооперативизации и национализации земли. Они выступают против передачи земли крестьянам в собственность. Возможно, что мирными средствами провести реформу не получится и ее разработка затянется в переговорах с левыми, поэтому может стоит крестьянам взять землю самим? Оборотной стороной этого может быть правительственный кризис и конфликт с социал-демократами."
 hungary.14.a: "Порядок в деревне должен быть восстановлен"
 hungary.14.b: "Помещики должны разоружиться."
 hungary.15.t: "Белградское перемирие"
 hungary.15.d: "Падуанское перемирие, заключенное на Итальянском фронте и которое официально прекратило военные действия для народов бывшей Австро-Венгерской империи, не исключает возможности будущих операций Антанты в Венгрии против немцев, которые все еще находились в состоянии войны. Кажется вероятным, что Союзная армия Востока под командованием генерала Франше д'Эспере на Балканах вскоре войдет в Венгрию для преследования немцев. За ней последуют югославские и румынские части, которые, навряд ли согласятся после покидать территорию не совершив ее аннексии. Это требует заключения отдельного перемирия с французами.\n\nКаройи, вместе с делегацией прибыл в Белград, где располагалась ставка Французского командования. В течение дня были достигнуты соглашения и подписана Конвенция о перемирии. Конвенция требовала демобилизации всех венгерских сил, за исключением шести пехотных дивизий и двух кавалерийских дивизий, предназначенных для поддержания внутреннего порядка. Предписанная демаркационная линия проходила по верхней долине реки Самош (Сомеш), шла через Бестерце (Бистрица) и Марошвашархей (Тыргу-Муреш) к реке Марош (Муреш), вдоль нее до ее слияния с рекой Тисой, через Бею, Печ и вдоль реки Драва, следуя границе Хорватии-Славонии. Территория к югу от демаркационной линии должна была быть эвакуирована венгерскими войсками в течение восьми дней и оккупирована союзниками, хотя она должна оставаться под венгерской администрацией.\n\nСоюзники сохраняли за собой право оккупировать все пункты и местности, которые главнокомандующий сочтет необходимыми в пределах этой зоны. Конвенция также предусматривала эвакуацию немецких войск из Венгрии и разрыв дипломатических отношений с Берлином. В статье 17 союзники согласились не вмешиваться во внутренние дела Венгрии, а статья 19, последняя, объявляла о прекращении всех военных действий между союзниками и Венгрией."
 hungary.15.a: "Можно полагать трения с Антантой устранены?"
 hungary.16.t: "Партия коммунистов Венгрии"
 hungary.16.d: "В Москве полгода назад была сформирована венгерская группа при РКП(б). Бела Кун, венгерский еврей, редактор социал-демократической газеты до войны и попавший в плен Царской России после мобилизации, а ныне поддержавший большевиков, стал её председателем. После буржуазно-демократической революции в Венгрии, венгерская группа сочла, что появилась благоприятная ситуация для возвращения домой для подготовки социалистической революции уже там. В скором времени они сядут на поезд и отправятся в Будапешт."
 hungary.16.a: "Передайте Бела Куну пару миллионов рублей"
 hungary.16.b: "Доброй дороги, товарищи!"
 hungary.17.t: "Прибытие Бела Куна"
 hungary.17.d: "Из России в Венгрию прибыл Бела Кун. До войны он был редактором социа-демократической газеты, а в годы войны был мобилизован и попал в русский плен, где под влиянием большевиков перешел на коммунистические позиции. В Москве Кун провозгласил создание Партии Коммунистов Венгрии в чьи задачи входит совершение социалистической революции в Венгрии. Вместе с ним вернулись проникнутые большевистским духом сопартийцы и военнопленные, которые практически сразу на конспиративной квартире стали издавать революционную газету “Красное знамя” в больших тиражах. Коммунистическая агитация началась."
 hungary.17.a: "Это начало больших изменений"
 hungary.18.t: "Вторая революция"
 hungary.18.d: "Всевозрастающая активность коммунистической агитации, экономический коллапс, правительственные кризисы, словом, всё, что случилось в посдние месяцы привело к тому, что контроль над массами, а в частности над рабочими и солдатами, выпал из рук правительства. Незначительный повод в Солдатском совете привел к перестрелкам с полицией и коммунисты оперативно бросили лозунг о социалистической революции. Разочарованные в правительстве рабочие, больше не подчинялись социал-демократам и выступили с многотысячными демонстрациями и забастовками. Солдаты и коммунистические активисты стали захватывать административные здания города практически без боев. Будапешт оказался парализован, а социал-демократы заявили, что надеются, что буржуазное правительство подаст в отставку оставив дальнейшую политику на Рабочего и Солдатского совета."
 hungary.18.a: "Мы вынуждены подать в отставку."
 hungary.19.t: "Коммунистический погром"
 hungary.19.d: "Коммунистическая партия Венгрии организовала манифестацию против социал-демократов, которая быстро переросла в погром редакторского отделения «Непсавы» — газеты социал-демократов. Впоследствии произошла стычка с полицией, в результате которой несколько человек с обеих сторон было убито и ранено. Социал-демократы заявили, что политический плюрализм допустим сугубо в рамках законной дискуссии, но терпеть разбойные нападения - недопустимо, а потому потребовали арестовать Бела Куна и верхушку коммунистической партии."
 hungary.19.a: "Мы не можем этого сделать."
 hungary.19.b: "Коммунисты будут арестованы."
 hungary.20.t: "Последствия ареста"
 hungary.20.d: "После ареста коммунистов социал-демократы организовали демонстрацию, собравшую 250 тысяч человек, которая выступила с заявлениями против коммунистического террора и красной контрреволюции.\n\nКоммунисты, в свою очередь, организовали свои солдатские и рабочие демонстрации, марши к полиции в результате чего несколько коммунистов были освобождены из под ареста. Русские большевики потребовали обращаться с коммунистами как с политическими заключенными, оказывая давление на венгерскую миссию по возврату венгерских военнопленных домой.\n\nВдобавок, после ареста Бела Куны, мстящие за смерть сотрудников, полицейские избили его и несколько других коммунистов, что быстро стало достоянием общественности и вся пресса, включая буржуазную, стала критиковать правительство и Каройи самолично пришлось посетить тюрьму и гарантировать, что с коммунистами будут обходиться надлежащим образом. В результате коммунисты, нисколько не дезорганизованные арестом верхушки, продолжили работу, а Бела Кун продолжил вести переписку со своими сопартийцами."
 hungary.20.a: "Тяжело"
 hungary.21.t: "Демобилизация гонведа"
 hungary.21.d: "Старое общее военное министерство, главное командование армии и венгерское министерство обороны еще во время войны, исключая общественность и заинтересованные стороны, вагонами производили документы по демобилизации армии, которая должна была последовать после окончания войны. Легион бюрократических демобилизационных проектов, естественно, был составлен только для шаблонного проведения демобилизации, следующей за победоносной войной. К тому, что надломленная монархия в случае войны непременно распадется на свои составные части и что из этой мировой войны монархия может выйти только как проигравшая сторона – к этому в штабных канцеляриях не подготовились.\n\nОднако события перечеркнули шаблонные расчеты штабных офицеров. На государства-преемники легла забота демобилизовать полутора  миллионную армию, отступавшую в беспорядке, среди анархических явлений, состоявшую из измотанных, голодных, озлобленных и жаждущих мести солдатских масс, и предотвратить, чтобы часть вооруженных масс не организовалась в грабительские банды.\n\nДля предотвращения хаоса Совет министров назначил социал-демократа Вильмоша Бема в военное министерство руководителем по вопросам демобилизации и он тут же приступил к работе в совместных усилиях со старой бюрократией, которая все больше отходила на второй план и активное участие демобилизации должны были организовывать социал-демократические ячейки и профсоюзные институции."
 hungary.21.a: "С этим ничего не поделать"
 hungary.22.t: "Восточный Банат"
 hungary.22.d: "Наши войска заняли Западный Банат после того как венгерское правительство подписало перемирие с французами управляющими нашим фронтом. Румынская армия, все еще слабая после австро-немецкого разгрома, теперь тоже подтягивает все силы в регион, претендуя на него целиком. Стоит ли нам отправить войска в Восточный Банат, чтобы предупредить их выступление в Западную часть?"
 hungary.22.a: "Занять Банат!"
 hungary.22.b: "Не будем портить отношения в Антанте."
 hungary.23.t: "Сербское вторжение в Банат"
 hungary.23.d: "Наши войска заняли Восточный Банат после того как венгерское правительство подписало перемирие с французами управляющими нашим фронтом. Теперь сербы начинают свое наступление в Восточный Банат, чтобы занять регион целиком."
 hungary.23.a: "Пусть Франция вмешается!"
 hungary.23.b: "Мы вышвырнем сербов из Баната!"
 hungary.24.t: "Запрос румын"
 hungary.24.d: "После Белградского перемирия Румыния и Сербия заняли Банат за который у них возник спор, который рискует обернуться войной. Румыны просят до решения Парижской мирной конференции оккупировать регион."
 hungary.24.a: "Мы так и поступим."
 hungary.24.b: "У нас нет на это сил. Пусть разбираются сами."
 hungary.25.t: "Немецкая эвакуация"
 hungary.25.d: "После поражения Центральных держав на Балканах немецкое присутствие в регионе потеряло для себя всякий смысл. Расквартированные по Бухарестскому договору в Румынии части немецкой армии приняли решение о выведении войск обратно в Германию и делать они будут это через Венгрию и Будапешт.\n\nПадуанское и Белградское перемирие устанавливают требования скорейшей демобилизации и интернирования немецких войск, однако это физически невыполнимая и опасная задача, поэтому скорейшей задачей революционного правительства остается скорейшая транспортировка немецких солдат на родину."
 hungary.25.a: "Доброй дороги"
 hungary.26.t: "Дивизия Хегедиша"
 hungary.26.d: "С Украины в Будапешт закрытым строем вернулась 11-ая кавалерийская дивизия под руководством генерал-лейтенанта Пала Хегедиша. Хегедиш известен своими роялистскими взглядами, равно как и офицерство дивизии, хотя нет сомнений, что её рядовой состав склонен доверять революционному правительству. Учитывая, что у нас нет боеспособных и организованных частей мы стоим перед выбором: разоружать и демобилизовывать эту дивизию или сохранить её, оставляя при себе потенциальных контрреволюционеров. Социал-демократы настаивают на разоружении дивизии и ее сохранение вызовет нажим на Каройи слева."
 hungary.26.a: "Хегедиш должен демобилизовать дивизию."
 hungary.26.b: "Нам нужны боеспособные силы."
 hungary.27.t: "Секейская дивизия"
 hungary.27.d: "В Трансильвании, где стоит риск наступления румын крайне велик, венгерское военное присутствие крайне шатко. Правительственные указания по ремобилизации запустили процесс реорганизации 38-ой пехотной дивизии Гонведа. Из добровольцев формировались полицейские части, но их еще нельзя было бросить в бой. Клуж-Напокский национальный совет направил вербовщиков в секейские комитаты. В результате начала формироваться трансильванская армия, первоначально называвшаяся Секейским отрядом, а теперь — Секейской дивизией, ее назначенным командиром, одновременно военным командующим Трансильвании, стал полковник Карой Картохвил.\n\nПод его руководством было сформировано патриотичное ядро с чуть более полутора тысячами солдат, в основном трансильванских венгров и секеев, венгерского субэтноса Трансильвании, которыми движет желание остаться в составе Венгрии и противостоять румынской агрессии. Такая мотивация и регионалистская ориентация позволили дивизии вернуть дисциплину и организацию, а вместе с тем и офицерство. Дивизия является единственной боеспособной силой в Трансильвании, которая готова противостоять румынам и что более важно она постоянно возрастает в своем количестве за счет трансильванских добровольцев. Картохвил запрашивает боеприпасов и артиллерии, заявляя, что без этого невозможно будет сформировать войска в Трансильвании и дорога румынам на Будапешт будет открыта. Социал-демократы, особенно левые вроде Йозефа Погани, склонны не доверять дивизии и считают ее реакционной силой из-за наводнивших ее офицеров королевской армии. Они полагают, что Картохвил поднимет мятеж против революционного правительства при первой возможности, а потому поддержки ему оказывать нельзя, отдавая приоритет более лояльным подразделениям."
 hungary.27.a: "Картховил получит поддержку "
 hungary.27.b: "Артиллерия нуждается на других фронтах"
 hungary.28.t: "Успехи Картохвила"
 hungary.28.d: "Дивизия Картохвила продолжает расти за счет прибывающих в нее офицеров и трансильванских перебежчиков."
 hungary.28.a: "Мы поддержим его усилия"
 hungary.28.b: "Приоритетнее помочь на других фронтах"
 hungary.29.t: "Социал-демократы выражают протест"
 hungary.29.d: "Социал-демократическая партия выразила протест Каройи из-за его бездействия в вопросе беспорядков на селе. Они немедленно требуют послать гвардию на поддержания порядка и восстановить работу поместий ориентированных на производство продовольствия в города. В ином случае они угрожают уйти в отставку."
 hungary.29.a: "Порядок будет восстановлен, но занятая земля останется у крестьян до принятия аграрного закона."
 hungary.30.t: "Секейское выступление"
 hungary.30.d: "Левый курс правительства вызвал раздражение в наиболее дисциплинированных войсках секейцев и они, не желая проливать кровь за социалистов, приняли решение свергнуть правительство. Карой Картохвил, возглавляющий дивизию, развернул свои войска на Будапешт. В этих условиях не остается варианта, кроме как раздать оружие рабочим и бросить все силы на защиту столицы революции."
