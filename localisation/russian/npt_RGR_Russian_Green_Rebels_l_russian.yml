 rcw_g.67.d: ""
 rcw_g.67.a: ""
 rcw_g.67.b: ""
 rcw_g.68.t: "Красные командиры бегут в лес"
 rcw_g.68.d: "Поражение красной армии оставило бывших краскомов не у дел. Более того, для победившей стороны они вне закона. И теперь, когда толпы дезертиров РККА валят в лес, у их бывших командиров как будто нет иного выбора. Многие из них уже присоединяются к повстанцам, а их выучка и организаторские способности позволяют заработать дополнительный авторитет у "зелёных". Единственно, что влияние "комиссаров", внезапно, но закономерно возросло. Это может дать почву для восстановления советской власти в той или иной форме."
 rcw_g.68.a: ""Зелёные" рады всем"
 rcw_g.69.t: "Обособление атамана"
 rcw_g.69.d: "Атаман Владимир Антонов-Овсеенко немало прославился в повстанческих кругах и среди местного крестьянства. Теперь он решил создать собственную власть и защищать её с помощью армии преданных соратников. Таким образом, атаман выделил свои силы из числа разношерстной и дикой зелённой массы."
 rcw_g.69.a: "Быть может он выстоит!"
 rcw_g.69.b: "Скатертью дорога"
 rcw_g.70.t: "Судьба революции"
 rcw_g.70.d: ""
 rcw_g.70.a: ""
 rcw_g.70.b: ""
 rcw_g.71.t: "Лидерство в РККА"
 rcw_g.71.d: "После разгрома основных республиканских органов и эвакуации части членов ВКП(б) за границу, после краха основных армейских структур и органов ВЧК, руководство над уцелевшими отрядами было потеряно. В этой обстановке три фигуры взялись за организацию сопротивления: Антонов-Овсеенко, Тухачевский и Блюхер.\n\nПервый являлся бывшим руководителем армий Южных республик: Донецко-криворожской, УНСР, Одесской и Крымской. Он хорошо разбирался в повстанческих действиях и имел непосредственный революционный опыт.\n\nТухачевский, напротив, бывший офицер, ему путь назад закрыт, и при всех своих талантах он уже успешно боролся как с белыми, так давил бандитские выступления зелёных повстанцев. Его части всё ещё сохраняют некоторую дисциплину.\n\nБлюхер прославился рейдом по тылам Дутова, успешно сражался в окружении белых войск. В последних боях он получил несколько повышений, пока не дошел до должности командарма в период самых тяжелый потерь РККА. Остатки частей Блюхера так же могут стать основой для продолжения борьбы. "
 rcw_g.71.a: "Антонов-Овсеенко"
 rcw_g.71.b: "Тухачевский"
 rcw_g.71.c: "Блюхер"
 rcw_g.72.t: "Агенты белой эмиграции"
 rcw_g.72.d: "Теперь когда основные белые армии оказались разгромлены их вожди ушли в изгнание. Оттуда они ищут возможности для возвращения на Родину и возобновления борьбы в любом виде. Конечно, далёкие таёжные деревни мало что слышали о неких “ эмигрантских белых центрах” тем не менее в приграничных регионах зелёные периодически сталкиваются с заброшенными извне агентами белогвардейцев, а иногда они даже возглавляют отдельные повстанческие отряды.\n\nВ этой обстановке белые и зелёные могут рассчитывать на взаимовыгодное сотрудничество, однако, нам необходимо выбрать какая из эмигрантских организаций получит предпочтение для связи с повстанческим руководством."
 rcw_g.72.a: "Братство русской правды"
 rcw_g.72.b: "РОВС"
 rcw_g.72.c: "Русский политический комитет"
