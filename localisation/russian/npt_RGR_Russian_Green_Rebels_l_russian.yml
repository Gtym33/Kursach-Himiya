 RGR_Fragmentation_of_the_green_forces: "Раздробленность зелёных сил"
 RGR_Fragmentation_of_the_green_forces_desc: "\n\n£Green_Chieftainship£\n\n\nОтряды зелёных с трудом можно назвать одной армией. Скорее это широкое крестьянское движение объединяющее недовольных налогами и продразверсткой, уклонистов от мобилизации и дезертиров, а также просто любителей вольной жизни. Над этой пёстрой публикой также стоят Атаманы, каждый из которых имеет авторитет и силу в своих родных краях. Как только атаманы станут слишком влиятельными они покинут ряды «зелёных», чтобы создать собственную власть. Но до этого момента, движение ещё может быть централизовано, и само переродиться в единую Российскую Крестьянскую Республику."
