 RGR_Communication_with_white_immigrants: "Связь с белоэмигрантами"
 RGR_Communication_with_white_immigrants_desc: "За границей действует множество белоэмигрантских организаций. Большинство из них надеется вернуться в Россию, чтобы продолжить борьбу с большевизмом. Эти люди располагают кое какими связями, возможностью доставки оружия и командным ресурсом. Повстанцы могут извлечь свои выгоды из сотрудничества с бывшими “золотопогонниками”."
 RGR_Get_guns_from_abroad: "Получить оружие из-за границы"
 RGR_Attract_Harbin_generals: "Привлечь харбинских генералов"




