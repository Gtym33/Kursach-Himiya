l_russian:
 
 RGR_consolidation_of_units: "Сплочение отрядов"
 RGR_consolidation_of_units_desc: "Всё больше крестьян и дезертиров уходит в леса. Здесь они сбиваются отряды для сопротивления разноцветным властям. Необходимо сплотить эти силы и придать им организованный вид."
 RGR_city_commandants_offices: "Городские комендатуры"
 RGR_city_commandants_offices_desc: "Отряды повстанцев постепенно занимают города. При этом управление в них совершенно исчезает. Если мы хотим использовать города в своих интересах, необходимо создать хотя бы подобие власти."
 RGR_fraternizing_with_proletariat: "Братание с пролетариатом"
 RGR_fraternizing_with_proletariat_desc: "Крестьянство, дезертиры и повстанчество вовсе не враги рабочим. Пролетариат также стал жертвой партийных властей как и все мы. Пришло время братания."
 RGR_red_banditry: "Красно-бандитизм"
 RGR_red_banditry_desc: "Убежденные революционеры и большевики все чаще замечают двурушничество коммунистических властей. Уже не секрет, что руководство партией захватили проходимцы, враги рабочих и буржуазия. Теперь мы рады принять прозревших красных товарищей в рядах повстанцев."
 RGR_councils_without_communists: "Советы без большевиков"
 RGR_councils_without_communists_desc: "Советская власть всё также пользуется популярностью среди крестьянства. Повстанцы должны поддерживать этот вид самодеятельности народа, но, конечно, не допуская к нему более агентов большевизма."
 RGR_working_peasantry_unions: "Союзы трудового крестьянства"
 RGR_working_peasantry_unions_desc: "Революционные власти пытались насадить гражданскую войну в деревни. Они её получили. Но это вовсе не то, что нужно крестьянству. Сельские труженики готовы объединиться на равных началах - середняк с бедняком, и даже с зажиточным хозяином. Если это пойдет на пользу всем."
 RGR_uprisings_coordination: "Координация восстаний"
 RGR_uprisings_coordination_desc: "Крестьянские и дезертирские мятежи продолжаются по всей России. При этом восстания носят хаотичный и непродуманный характер. Для победы повстанчества нужна координация и слаженность выступлений."
 RGR_peasant_gatherings: "Крестьянские сходы"
 RGR_peasant_gatherings_desc: "Издавна крестьяне собираются на сходы для решения насущных хозяйственных вопросов. Это одна из лучших форм общинной демократии."
 RGR_associations_of_veterans: "Союзы фронтовиков"
 RGR_associations_of_veterans_desc: "В селах и деревнях живет множество ветеранов емпириалистической войны. Это бравые солдаты и унтера, которые способны возглавить отряды крестьянской молодежи и лесного дезертирства."
 RGR_recruitment_officers: "Вербовка офицеров"
 RGR_recruitment_officers_desc: "В селах и деревнях живет множество ветеранов емпириалистической войны. Это бравые солдаты и унтера, которые способны возглавить отряды крестьянской молодежи и лесного дезертирства."
 RGR_single_headquarters: "Единый штаб"
 RGR_single_headquarters_desc: "Постепенно повстанцы создают собственные штабы и военную иерархию. Штабы устанавливают связь друг с другом. Время и борьба всё больше сподвигают нас к полному объединению повстанческого командования."
 RGR_peasant_army: "Крестьянская армия"
 RGR_peasant_army_desc: "Зелёные повстанцы выдержали тяжелые бои с врагами народа и крестьянства. У нас есть свои командиры, атаманы и вожди. Повстанцы создали собственные полки и бригады. Крестьянская армия России грядет."
 RGR_third_revolution: "Третья революция"
 RGR_third_revolution_desc: "Первой была буржуазная революция. Второй партийная большевистская. Третья будет народная и крестьянская."
 RGR_punitive_forces: "Карательные отряды"
 RGR_punitive_forces_desc: "Не все села и деревни поддерживают повстанческое движение. Среди крестьян находятся безалаберные лодыри, пьянь, сторонники большевизма, скрытые буржуи и куркули. Сопротивление этих антинародных элементов должно быть подавлено."
 RGR_forced_mobilization: "Принудительная мобилизация"
 RGR_forced_mobilization_desc: "Для победы над партийными властями, кадетами и большевиками, должно объединиться всё крестьянство и весь трудовой слой. Либо все погибнем, либо все победим. Так что у атаманов нет выбора, кроме как гнать пинками в армию уклоняющихся от борьбы."
 RGR_rural_counterrevolution: "Деревенская контрреволюция"
 RGR_rural_counterrevolution_desc: "Деревня долгое время наблюдала за революцией и даже поддерживала её. Всё что получило крестьянство - продразверстка, голод, грабежи и мобилизация. Такого не было при царском строе. И надо признать - раньше было лучше."
 RGR_atamanshina: "Атаманщина"
 RGR_atamanshina_desc: "Многие повстанцы объединены под руководством смелых и успешных атаманов. И это вовсе не плохо. Хороший атаман всегда выведет свой отряд из засады и сам неожиданно атакует врага. С таким атаманом не приходится тужить."
 RGR_forest_brothers: "Лесные братства"
 RGR_forest_brothers_desc: "Зелёным крестьянам и дезертирам приходится долгое время скрываться в лесах. У повстанцев возникают свои лесные “поселки”, заимки и базы. Здесь хранится продовольствие и боеприпасы для долгой войны. Со временем эти лесные крепости с постоянным гарнизоном превращаются в настоящие братства."
 RGR_deserters_collection: "Сбор дезертиров"
 RGR_deserters_collection_desc: "Дезертиры одна из главных сил зелёного повстанчества. За время войны разноцветные партийные правительства мобилизовали в армию сотни тысяч крестьян, но из них десятки тысяч бежали с оружием, и ещё большее количество уклонилось от поступления в армию уйдя в леса. Все они присоединились к зелёным."
 RGR_free_cossackship: "Вольное казачество"
 RGR_free_cossackship_desc: "Посадить повстанцев на коней значит выиграть в мобильности и внезапности действий. Теперь мы готовы создавать подобные конные отряды."
 RGR_cavalry_raiding: "Рейдирование конницы"
 RGR_cavalry_raiding_desc: "Конные повстанцы - гроза тылов. Однако, такие нападения требуют особого военного искусства. Чем больше рейдов мы проведем, тем удачнее они будут в будущем."
 RGR_voluntary_mobilization: "Добровольная мобилизация"
 RGR_voluntary_mobilization_desc: "Многие крестьяне сочувствуют повстанцам, но по тем или иным причинам ещё не вступили в наши отряды. Объявление добровольной мобилизации станет для них сигналом."
 RGR_cult_of_batyka: "Культ «Батьки»"
 RGR_cult_of_batyka_desc: "Среди атаманов есть наши главные атаманы, а среди них есть “батька”. Такой человек мог бы возглавить не только повстанцев, но и всю крестьянскую Россию!"
 RGR_purges_among_officers: "Чистки командиров"
 RGR_purges_among_officers_desc: "Среди зелёных командиров, к сожалению, затесались те, кто не хотят возвращения порядка и спокойствия в страну. Они привыкли жить на крестьянских харчах вылазками и военными рейдами. Их время прошло. Этот бандитский элемент пора вычищать."
 RGR_hierarchy_of_authority: "Иерархия властей"
 RGR_hierarchy_of_authority_desc: "Повстанчество всё ближе к победе. Крестьяне и трудовой слой ясно понимают, что пришла пора восстановить страну. Это видит руководство армией и её вождь. Теперь мы будем строить новое, народное государство."
 RGR_g_Red_Army_deserters: "Красноармейцы-дезертиры"
 RGR_g_Red_Army_deserters_desc: "Многие бойцы покинули красную армию. Некоторые из-за разочарования, другие потому что не хотят участвовать в войне. Так или иначе по обе стороны фронта они вне закона, а значит у идеалистов и прагматиков остаётся один путь - в зелёные."
 RGR_g_Looting_of_cities: "Разграбление городов"
 RGR_g_Looting_of_cities_desc: "Города породили всё зло, которое обрушилось на крестьян. Здесь всегда сидели чиновники, комиссары, даже рабочие прилипшие к своим заводам стали противниками крестьянства. Города поглотили богатства деревни. Настало время вернуть всё назад и уничтожить гнёзда насилия."
 RGR_g_Connection_with_white_emigration: "Связь с белой эмиграцией"
 RGR_g_Connection_with_white_emigration_desc: "Белогвардейцы не лучшие друзья крестьян, но теперь они выброшены за кордон и это их отрезвило. Белая эмиграция ищет связи с повстанчеством, обещая оружие и разнообразную поддержку."
 RGR_g_Recruitment_white_rebels: "Вербовка белоповстанцев"
 RGR_g_Recruitment_white_rebels_desc: "Солдаты разбитых белых армий не всегда бегут за границу. Многие из них остаются в своих родных краях продолжая свою борьбу уже без центрального руководства. Это очень мотивированные бойцы, но фактически они уже “белоповстанцы”. А значит наши."


