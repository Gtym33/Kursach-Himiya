 GER_AUH_POL_AUH_support: "Поддержка от Австрии против Германии"
 poland.1.t: "Польское обращение"
 poland.1.desc: "Несмотря на демонстративные протесты польской стороны против беззастенчивого распоряжения Центральных держав территориями, которые поляки считают своими, государственные деятели Польского королевства не прекращают сотрудничество с нами и австрийцами; однако новое польское правительство стремится добиться согласия с нашей стороны и со стороны Австро-Венгрии на передачу ему всей полноты административной власти в пределах Польского королевства. В настоящий момент административная власть в руках немецкого гражданского комиссара при Регентском совете графа Г. Лерхенфельд-Кёферинга и главы гражданского управления О. Штейнмейстера, военная — в руках Г. Безелера.\n\nНа данный момент не идёт речи о фактической передачи дел, и польские представители настаивают пока лишь на формальном обещании. Однако нам не следует выпускать из-под контроля Польское королевство, поскольку это может привести к серьёзным затруднениям в транспортном сообщении с восточными территориями, что в свою очередь поставит под угрозу всё снабжение фронта."
 poland.1.desc_1: "Несмотря на демонстративные протесты польской стороны против беззастенчивого распоряжения Центральных держав территориями, которые поляки считают своими, государственные деятели Польского королевства не прекращают сотрудничество с нами и немцами; однако новое польское правительство стремится добиться согласия с нашей стороны и со стороны Германии на передачу ему всей полноты административной власти в пределах Польского королевства. В настоящий момент административная власть в руках немецкого гражданского комиссара при Регентском совете графа Г. Лерхенфельд-Кёферинга и главы гражданского управления О. Штейнмейстера, военная — в руках Г. Безелера.\n\nНа данный момент не идёт речи о фактической передачи дел, и польские представители настаивают пока лишь на формальном обещании. Однако если дойдёт до дела, то если мы выпустим из-под контроля Польское королевство, это может привести к серьёзным затруднениям в транспортном сообщении с восточным фронтом для наших германских союзников."
 poland.1.a: "Польскими регионами будут руководить лишь наши структуры"
 poland.1.b: "Сейчас согласимся на эту формальность, а там посмотрим"
 
 poland.2.t: "Ответ Берлина"
 poland.2.t_1: "Ответ Вены"
 poland.2.desc: "Несмотря на наши сложные отношения с Центральными державами, мы не прекращали сотрудничать с немцами и рассчитывали на их благосклонность в деле передачи нам всей полноты административной власти в Польском королевстве: сейчас административная власть в руках немецкого гражданского комиссара при регентском совете графа Г. Лерхенфельд-Кёферинга и главы гражданского управления О. Штейнмейстера, военная — в руках Г. Безелера. Наши представители вернулись из Берлина, получив отказ даже на просьбу о формальном обещании."
 poland.2.desc_1: "Несмотря на наши сложные отношения с Центральными державами, мы не прекращали сотрудничать с австрийцами и рассчитывали на их благосклонность в деле передачи нам всей полноты административной власти в Польском королевстве: сейчас административная власть в руках немецкого гражданского комиссара при регентском совете графа Г. Лерхенфельд-Кёферинга и главы гражданского управления О. Штейнмейстера, военная — в руках Г. Безелера. Наши представители вернулись из Вены, получив отказ даже на просьбу о формальном обещании."
 poland.2.a: "Печально"
 
 poland.3.t: "Ответ Берлина"
 poland.3.t_1: "Ответ Вены"
 poland.3.desc: "Несмотря на наши сложные отношения с Центральными державами, мы не прекращали сотрудничать с немцами и рассчитывали на их благосклонность в деле передачи нам всей полноты административной власти в Польском королевстве: сейчас административная власть в руках немецкого гражданского комиссара при регентском совете графа Г. Лерхенфельд-Кёферинга и главы гражданского управления О. Штейнмейстера, военная — в руках Г. Безелера. Наши представители вернулись из Берлина, получив согласие на нашу нижайшую просьбу: нам формально обещали проработать вопрос о передачи администрации в будущем."
 poland.3.desc_1: "Несмотря на наши сложные отношения с Центральными державами, мы не прекращали сотрудничать с австрийцами и рассчитывали на их благосклонность в деле передачи нам всей полноты административной власти в Польском королевстве: сейчас административная власть в руках немецкого гражданского комиссара при регентском совете графа Г. Лерхенфельд-Кёферинга и главы гражданского управления О. Штейнмейстера, военная — в руках Г. Безелера. Наши представители вернулись из Вены, получив согласие на нашу нижайшую просьбу: нам формально обещали проработать вопрос о передачи администрации в будущем."
 poland.3.a: "Мы вас не подведём!"
 
 poland.4.t: "Вмешательство в польские дела"
 poland.4.desc: "На переговорах с польскими представителями наши ближайшие союзники из Берлина сообщили полякам, что готовы передать формальный контроль над польской территорией новому польскому правительству. Этот великодушный жест серьёзно меняет баланс политических симпатий в регионе. И вряд ли пойдёт нам на пользу."
 poland.4.desc_1: "На переговорах с польскими представителями наши ближайшие союзники из Вены сообщили полякам, что готовы передать формальный контроль над польской территорией новому польскому правительству. Этот великодушный жест серьёзно меняет баланс политических симпатий в регионе. И вряд ли пойдёт нам на пользу."
 poland.4.a: "Они совершают ошибку"
 poland.4.b: "Их жест можно приветствовать"
 
 poland.5.t: "Перераспределение полномочий в Польше"
 poland.5.desc: "Германия потеряла своё влияние в Польше: теперь польское правительство ориентируется на Австрию, а значит, Центральные державы находятся в кризисе борьбы за зоны влияния. Немцы точно не простят такого, но что будет дальше — неизвестно."
 poland.5.a: "Это серьёзный поворот"
 poland_5_autonomy_tt: "Конфликт в сфере влияния Центральных держав"
 
 poland.6.t: "Австро-польское требование"
 poland.6.desc: "Наша политика в Польше провалилась, и теперь Вена и Краков требуют от нас передачу остальных территорий бывшей русской Польши. Потеряв своё влияние, мы не можем продолжать оккупацию, однако теперь недобросовестность Австрии очевидна."
 poland.6.a: "Пусть сами разбираются в этом дерьме"
 poland.6.b: "Этому не бывать"
 
 poland.7.t: "Австро-польское требование"
 poland.7.desc: "Несмотря на все наши договоренности с немцами, они всё-таки решили разогнать наше правительство и перейти к прямой военной оккупации. Сейчас мы ничем не можем им помешать."
 poland.7.desc_1: "Несмотря на все наши договоренности с австрийцами, они всё-таки решили разогнать наше правительство и перейти к прямой военной оккупации. Сейчас мы ничем не можем им помешать."
 poland.7.a: "Мы сделали всё что можно"
 
 rus_poland_peace.11.t: "Мирное предложение от государства [FROM.GetName]"
 rus_poland_peace.11.desc: "Государство [FROM.GetName] предлагает заключить мир согласно которому польская граница пройдёт до пределов этнического расселения белорусов и украинцев."
 rus_poland_peace.11.a: "Возможности победить ещё не исчерпаны"
 rus_poland_peace.11.b: "Мы согласны"
 rus_poland_peace.12.t: "Мирное предложение от государства [FROM.GetName]"
 rus_poland_peace.12.desc: "Государство [FROM.GetName] предлагает заключить мир согласно которому польская граница пройдёт по ряду районов западной Украины и Белоруссии не включая Минск и Киев."
 rus_poland_peace.12.a: "Возможности победить ещё не исчерпаны"
 rus_poland_peace.12.b: "Мы согласны"
 rus_poland_peace.13.t: "Мирное предложение от государства [FROM.GetName]"
 rus_poland_peace.13.desc: "Государство [FROM.GetName] предлагает заключить мир согласно которому польская граница пройдёт до пределов бывшего Королевства Польского."
 rus_poland_peace.13.a: "Возможности победить ещё не исчерпаны"
 rus_poland_peace.13.b: "Мы согласны"
 rus_poland_peace.14.t: "Падение польского правительства"
 rus_poland_peace.14.desc: "Государственный аппарат панской Польши фактически распался вследствие военного поражения. Сопротивление немногочисленных, дезорганизованных, реакционных банд вскоре будет подавлено. Уже провозглашена советская власть и начато формирование Польской Красной Армии."
 rus_poland_peace.14.a: "Сегодня Варшава, завтра – Берлин!"
 rus_poland_peace.15.t: "Жестокий мир"
 rus_poland_peace.15.desc: "Вследствие полного военного поражения на польском фронте правительству России ничего не осталось как подписать любой кабальный договор, который будет предложен польской стороной. Он оправдал самые скорбные ожидания. Речь шла не только о границах до первого раздела, но и о ряде восточных районов по мирному договору 1635 года и даже тех территорий которые входили в состав Великого княжества Литовского."
 rus_poland_peace.15.a: "Этот мирный договор будет несмываемым позором"

