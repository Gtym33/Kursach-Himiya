 poland.86.a: "Они точно наши союзники?"
 poland.86.b: "Неожиданно приятно"
 poland.86.c: "Они точно наши союзники?"
 poland.87.t: "Поляки соглашаются на требования"
 poland.87.d: "Германия выдвинула условия для мира, требуя демобилизации Великой польской армии, признания своих притязаний на Великую Польшу и возмещения ущерба, нанесенного во время восстания. Эти требования вызвали бурные споры в польском обществе, так как они ставили под угрозу национальную безопасность и суверенитет страны.\n\nПервое требование о демобилизации армии Великой Польши, воспринималось как попытка ослабить Польшу, лишив ее возможности защищать свои интересы в Познани. Признание германских притязаний на Великую Польшу угрожало историческим достижениям и идентичности польского народа. Возмещение ущерба вызывало вопросы о справедливости, так как многие считали, что ответственность лежит не только на Польше./n/nНесмотря на эти трудности, польское руководство, стремясь избежать дальнейшего конфликта и разрушений, решило принять условия Германии. Это решение было продиктовано давлением международного сообщества и желанием сохранить мир."
 poland.87.de: "Германия выдвинула условия для мира, требуя демобилизации Великой польской армии, признания своих притязаний на Великую Польшу и возмещения ущерба, нанесенного во время восстания. Эти требования вызвали бурные споры в польском обществе, так как они ставили под угрозу национальную безопасность и суверенитет страны.\n\nПервое требование о демобилизации армии Великой Польши, воспринималось как попытка ослабить Польшу, лишив ее возможности защищать свои интересы в Познани. Признание германских притязаний на Великую Польшу угрожало историческим достижениям и идентичности польского народа. Возмещение ущерба вызывало вопросы о справедливости, так как многие считали, что ответственность лежит не только на Польше./n/nНесмотря на эти трудности, польское руководство, стремясь избежать дальнейшего конфликта и разрушений, решило принять условия Германии. Это решение было продиктовано давлением международного сообщества и желанием сохранить мир."
 poland.87.a: "Мудрый выбор"
 poland.87.b: "Как они могли?"
 poland.88.t: "Итоги переговоров"
 poland.88.d: "Вот и подошли к концу все приготовления к итоговым переговорам. Польские, немецкие и иностранные дипломаты собрались в главном здании в Варшаве, где ранее заседал Регентский совет. Несмотря на многочисленные споры и конфронтации, условия были обсуждены, и с подписанием всех документов мир наконец вступил в силу. Этот момент стал знаковым, ознаменовав переход к новой эре, хотя и оставив в обществе глубокие раны и недовольство, которые потребуют времени для заживления.\n\nКоличество дипломатических очков [POL.GetNameWithFlag] составляет: [?GPU.POL_oshko|0]\n\nКоличество дипломатических очков [GER.GetNameWithFlag] составляет: [?GPU.POL_oshko_ger|0]"
