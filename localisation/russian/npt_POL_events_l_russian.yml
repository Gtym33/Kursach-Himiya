 poland.88.a: "Так тому и быть"
 poland.88.b: "Возмутительно, введите войска!"
 poland.88.c: "Превосходно"
 poland.89.t: "Итоги переговоров"
 poland.89.d: "Вот и подошли к концу все приготовления к итоговым переговорам. Польские, немецкие и иностранные дипломаты прибыли в главное здание в Варшаве, где ранее заседал Регентский совет. Несмотря на многочисленные споры и конфронтации, условия были согласованы, пусть и не в пользу Польши: пришлось согласиться на демобилизацию Великой польской армии, признание германских притязаний и выплату средств. С подписанием всех документов мир наконец вступил в силу.\n\nКоличество дипломатических очков [POL.GetNameWithFlag] составляет: [?GPU.POL_oshko|0]\n\nКоличество дипломатических очков [GER.GetNameWithFlag] составляет: [?GPU.POL_oshko_ger|0]]"
 poland.89.de: "Вот и подошли к концу все приготовления к итоговым переговорам. Польские, немецкие и иностранные дипломаты прибыли в главное здание в Варшаве, где ранее заседал Регентский совет. Несмотря на многочисленные споры и конфронтации, условия были согласованы, пусть и не в пользу Польши: пришлось согласиться на демобилизацию Великой польской армии, признание германских притязаний и выплату средств. С подписанием всех документов мир наконец вступил в силу.\n\nКоличество дипломатических очков [POL.GetNameWithFlag] составляет: [?GPU.POL_oshko|0]\n\nКоличество дипломатических очков [GER.GetNameWithFlag] составляет: [?GPU.POL_oshko_ger|0]"
 poland.89.a: "Превосходно"
 poland.89.b: "Раз так решили, то, наверное, так и должно быть"
 poland.89.c: "Возмутительней этого не может и быть! Введите войска!"
 poland.90.t: "Германия продолжает боевые действия"
 poland.90.d: "Германия явно осталась недовольна подписанными договорённостями, считая их недостаточно выгодными и не отвечающими своим интересам. Несмотря на формальное заключение мира, через несколько дней после подписания соглашений немецкие войска вновь приступили к боевым действиям против восставших в Познани. Это возобновление конфликта показало, что Германия не намерена мириться с потерями и готова применять силу для восстановления контроля над национальным регионом."
 poland.90.de: "Германия явно осталась недовольна подписанными договорённостями, считая их недостаточно выгодными и не отвечающими своим интересам. Несмотря на формальное заключение мира, через несколько дней после подписания соглашений немецкие войска вновь приступили к боевым действиям против восставших в Познани. Это возобновление конфликта показало, что Германия не намерена мириться с потерями и готова применять силу для восстановления контроля над национальным регионом."
 poland.90.a: "Мира не видать..."
 poland.90.b: "Высылайте ноту протеста"
 poland.90.c: "Пора вмешаться"
 poland.91.t: "Великопольша продолжает боевые действия"
 poland.91.d: "Великопольша была явно недовольна подписанными договорённостями, которые, по мнению местного руководства и населения, не учитывали их интересы и потребности. Особенно остро воспринималась демобилизация армии, которую многие считали актом агрессии и попыткой ослабить польскую сторону. Это решение вызвало широкий общественный резонанс, и недовольство нарастало среди армии, которые не могли смириться с потерей своей военной мощи.\n\nВскоре, через несколько дней после подписания мирных соглашений, повстанцы в Познани, под руководством Добров Мусницкого, решили возобновить боевые действия против немецких частей."
 poland.91.a: "Что они вообще творят?"
 poland.91.b: "Высылайте ноту протеста"
 poland.91.c: "Пора вмешаться"
 poland.92.t: "Франция вмешиваться в конфликт"
 poland.92.d: "Смотря на вновь разгоревшийся конфликт между Великопольшей и Германией, Франция, как одна из ключевых европейских держав, начала проявлять активность в попытках разрешить ситуацию. Она выразила свою обеспокоенность по поводу эскалации насилия и угрозы стабильности в регионе. Франция, обладая значительным влиянием, угрожала полномасштабным вмешательством, что включало в себя введение санкций против обеих сторон и применение мер по усмирению конфликтующих сторон.\n\nЭти угрозы стали серьёзным сигналом для Великопольши и Германии, которые осознали, что продолжение конфликта может привести к ещё более серьёзным последствиям, включая международную изоляцию и экономические санкции. Обе стороны оказались под давлением, и им пришлось задуматься о необходимости остановки насилия и возвращения к переговорам."
 poland.92.a: "Похоже, что это конец"
 poland.92.b: "Даже им пришлось вмешаться"
 poland.92.c: "Похоже, что это конец"
 poland.93.t: "Разгром Великопольши"
 poland.93.d: "В первые дни восстания немецкий гарнизон Познани капитулировал, не оказав сопротивления. После нескольких недель боёв польские национальные войска заняли Познаньскую провинцию. В ответ, мы частично реорганизовали свои силы: армейские подразделения и временные фрайкоры объединились под названием «Пограничная охрана Восток», взяв на себя охрану спорных территорий и восточной границы. Немецкие части контратаковали, и бои продолжились, угрожая перерасти в более широкий конфликт. Тем не менее, немецкие войска разгромили последние формирования польских повстанцев. После длительных боёв стороны закрепили контроль над территориями, завершив активные столкновения."
 poland.93.a: "Вот мы и добились своего"
 poland.94.t: "Поражение Великопольского восстания"
 poland.94.d: "В первые дни восстания немецкий гарнизон Познани капитулировал, не оказав сопротивления. После нескольких недель боёв польские национальные войска заняли Познаньскую провинцию. В ответ Германия частично реорганизовала свои силы: армейские подразделения и временные фрайкоры объединились под названием «Пограничная охрана Восток», взяв на себя охрану спорных территорий и восточной границы. Немецкие части контратаковали, и бои продолжились, угрожая перерасти в более широкий конфликт. Тем не менее, немецкие войска разгромили последние формирования польских повстанцев. После длительных боёв стороны закрепили контроль над территориями, завершив активные столкновения. Несмотря на первоначальный успех, наши братья поляки не смогли выйти из восстания победителями."
 poland.94.a: "Трагичная новость"
 poland.95.t: "Познанская автономия"
 poland.95.d: "Комиссия НРП обращается к польскому правительству в Варшаве с просьбой об учреждении отдельной администрации для бывшей прусской части, поскольку она значительно более развита, чем остальная страна. Игнаций Падеревский добивается от правительства передачи всей власти в руки НРП до окончательного признания польско-германской границы, с последующим предоставлением автономии, и официально включает этот регион в состав Польского государства."
 poland.95.a: "Две Польши наконец объединяются"
 poland.96.t: "Прибытие Галлера"
 poland.96.d: "Появление «Синей армии» было тесно связано с вступлением США в Великую войну. Месяцем ранее Игнаций Ян Падеревский подал в Палату представителей США предложение о приёме польско-американских добровольцев на службу на Западном фронте во имя независимости Польши. Около 24 000 поляков были приняты на службу и, после непродолжительной военной подготовки, отправлены во Францию, чтобы присоединиться к генералу Халлеру, включая многих женщин-добровольцев. Американцы польского происхождения были готовы сражаться за свободу и демократию, поскольку сами избежали преследований со стороны империй, разделивших Польшу столетием ранее. Когда началась война, американская полония создала Центральный польский комитет помощи для поддержки военных действий, хотя этнические польские добровольцы прибывали во Францию из всех польских диаспор, и в итоге их число превысило 90 000 солдат. Антанта ответила тем же, признав Польский национальный комитет, сформированный во Франции под руководством Дмовского, как временное правительство Польши с письменным обещанием Вильсона воссоздать суверенное польское государство после их победы.\n\nПосле окончания Первой мировой войны армия продолжала набирать новобранцев. Многие из этих добровольцев были этническими поляками, призванными в немецкую, австрийскую и российскую армии, а затем демобилизованными после подписания соглашения о перемирии. К началу года «Синяя армия» насчитывала 68 500 человек и была полностью оснащена французским правительством. После того как немецкие власти отказали в разрешении на въезд в Польшу через балтийский портовый город Данциг (Гданьск), была организована транспортировка по железной дороге.\n\nВ тот же год все армейские подразделения были переброшены в только что обретшую независимость Польшу через Германию в опломбированных вагонах. Оружие было размещено в отдельных отсеках и находилось под охраной, чтобы успокоить немцев, опасавшихся, что иностранная армия пересечёт их территорию. Сразу после прибытия дивизии были включены в состав регулярной польской армии и отправлены на передовую. Это было опасное путешествие из Франции через революционную Германию в Польшу."
 poland.96.a: "Вы проделали поистине тяжёлый путь"
 poland.97.t: "Прибытие польского оружия"
 poland.97.d: "Польские власти, видя наше стремление к освобождению познанских поляков, решились поддержать наше восстание и отправили для борьбы 500 винтовок."
 poland.97.a: "Передайте им нашу благодарность"
 poland.98.t: "Поддержка Польского государства"
 poland.98.d: "Польское государство действительно является полезным союзником, и наши взаимовыгодные отношения способствовали укреплению позиций обеих стран. «Голубая армия» Галлера, а также польские действия на восточном фронте стали важными элементами в борьбе с Германией. Защита интересов в Польше и укрепление её боевых возможностей должны стать для нас первостепенной задачей, особенно в свете растущей угрозы со стороны Советской России, которая всё больше проявляет интерес к польскому соседу."
 poland.98.a: "Ограничимся малыми поставками"
 poland.98.b: "Польша будет забита нашим оружием"
 poland.99.t: "Французская военная поддержка"
 poland.99.d: "Французская военная миссия и начавшиеся крупные поставки оружия в Польшу станут частью более широкой стратегии поддержки молодой Второй Польской республики, недавно обретшей независимость в условиях смуты и борьбы за власть. Франция стремится способствовать формированию боеспособной польской армии, способной стать надёжным союзником в противостоянии как германской угрозе, так и наступлению большевистских сил.\n\nВоенная миссия представляет собой консультативный корпус из примерно четырёхсот французских офицеров, распределённых по штабам польских подразделений на разных уровнях командования. Несмотря на сравнительно небольшой численный состав, влияние этой миссии окажется значительным: которая внесет порядок в организацию, улучшив систему снабжения и логистики, что позволит польской армии быстрее адаптироваться к реалиям конфликта и повысить её эффективность на поле боя."
 poland.99.a: "Неоценимая помощь"
 poland.100.t: "Французы приостанавливают поддержку"
 poland.100.d: "Французское правительство, видимо, из-за ухудшения отношений с нами или из-за нехватки нужного поставляемого снаряжения, вынуждено свернуть крупные поставки оружия, что, конечно, не может нас не огорчать, учитывая, как сильно нам это оружие необходимо в данный момент."
 poland.100.a: "Печальные вести однако"
 poland.101.t: "Франция возобновляет поддержку"
 poland.101.d: "Французское правительство решается возобновить поставки оружия, видимо, с улучшением отношений или пополнением своих личных складов. Франция продолжит помогать оружием и оснащать польскую армию."
 poland.101.a: "Одумались всё таки"
 poland.102.t: "Прибытие крупной поставки оружия"
 poland.102.d: "И вот по железным дорогам прямо к железнодорожной станции прибыл локомотив с большим количеством всевозможного оружия — от винтовок и дополнительного оснащения до пушек и танков. Подсчитать всю их помощь не представляется возможным."
 poland.102.a: "Достойная поддержка"
 
 poland.103.t: "Возвращения Хомлищны"
 poland.103.d: "Холмщина, исторически являвшаяся территорией этнических поляков, оказалась под контролем Украинского государства в результате несправедливого Брестского мира. Однако с падением Центральных держав перед нами открылась уникальная возможность вернуть эти земли, которые всегда были частью нашей культурной и исторической идентичности. И по этому, мы не можем упустить такой шанс."
 poland.103.a: "Мы забираем то, что принадлежит нам"
 poland.104.t: "Поляки входят в Холмщину"
 poland.104.d: "Польское государство, считая себя вправе вторгнуться на нашу суверенную территорию и оправдывая свою агрессию якобы возвращением «своих национальных земель», которыми Холмщина никогда не была, предприняло решительные действия. Регулярные польские части были выдвинуты к границам Холмщины и вскоре заняли значительную часть административных зданий региона."
 poland.104.a: "Разберёмся с ними позже"
 poland.104.b: "Терпеть мы не станет"
 poland.105.t: "Победа в конфликте"
 poland.105.d: "Победа! Враг разбит и больше не в силах противодействовать нам, мы выполнили наши задачи, и мы показали им, кто здесь лучший. Эта победа — результат единства, дисциплины и решимости наших войск, а также мудрого руководства, которое направляло каждого бойца к общей цели."
 poland.105.a: "Несладко им пришлось"
 poland.106.t: "Поражение в конфликте"
 poland.106.d: "Мы не смогли сдержать натиск врага, его силы превзошли наши, и мы не смогли отстоять то, что нам оказалось дорого. Несмотря на проявленную храбрость и самоотверженность наших солдат, обстоятельства сложились против нас, и враг достиг поставленных целей."
 poland.106.a: "Мы еще вернёмся"
 
 poland.107.t: "Движение к Белостоку"
 poland.107.d: "Прежний мировой порядок рушится — на обломках империй вырастают новые гегемоны. С началом революции в Германии и выводом её войск с фронта ситуация резко меняется. Красная армия, укрепляясь, всё настойчивее претендует на западные территории, считая их «своими», и стремится вернуть их под контроль, навязав при этом свой зловещий коммунистический режим.\n\nМы же не можем позволить себе пассивность. Чтобы защитить нашу независимость и сохранить национальные интересы, мы должны действовать на опережение. Наша задача — занять и удержать как можно больше территорий до того, как большевики смогут это сделать. Это борьба не только за землю, но и за будущее нашего народа, за свободу от чуждых идеологий и диктатуры."
 poland.107.a: "Польская армия начинает своё движение"
 poland.108.t: "Поляки занимают Белосток"
 poland.108.d: "Прежний мировой порядок рушится — на обломках империй вырастают новые гегемоны. С началом революции в Германии и выводом её войск с фронта ситуация резко меняется. Красная армия, укрепляясь, всё настойчивее претендует на западные территории, считая их «своими», и стремится вернуть их под контроль, навязав при этом свой зловещий коммунистический режим. Похоже это стало весомым поводом для Поляком, и они начали своё движение, начав с Белостока, где в данный момент подчинили себе все административные органы управления."
 poland.108.a: "Они ведь на Белостоке и остановятся?"
 poland.108.b: "Нужно не дать им продвинуться дальше"
 poland.109.t: "Победа в конфликте"
 poland.109.d: "Победа! Враг разбит и больше не в силах противодействовать нам, мы выполнили наши задачи, и мы показали им, кто здесь лучший. Эта победа — результат единства, дисциплины и решимости наших войск, а также мудрого руководства, которое направляло каждого бойца к общей цели."
 poland.109.a: "Несладко им пришлось"
 poland.110.t: "Поражение в конфликте"
 poland.110.d: "Мы не смогли сдержать натиск врага, его силы превзошли наши, и мы не смогли отстоять то, что нам оказалось дорого. Несмотря на проявленную храбрость и самоотверженность наших солдат, обстоятельства сложились против нас, и враг достиг поставленных целей."
 poland.110.a: "Мы еще вернёмся"
 poland.111.t: "Войско Польское занимает Гродно"
 poland.111.d: "Продолжающаяся экспансия на восток не останавливается. С присоединением Белостока и части восточной территории, особое внимание обратилось на крупный и стратегически важный город Гродно, который долгое время являлся богатым центром польской культуры и на котором проживало немало этнических поляков. Все эти факторы делают присоединение Гродно важным и стратегическим решением, ведь с его присоединением откроются новые возможности для расширения нашей территории и дальнейшей экспансии."
 poland.111.a: "Польская армия на этом не остановится"
 poland.112.t: "Войско Польское занимает Гродно"
 poland.112.d: "Продолжающаяся Польская экспансия на восток не останавливается. С присоединением Белостока и части восточной территории, Польское внимание обратилось на крупный и стратегически важный город Гродно, который долгое время являлся богатым центром польской культуры и на котором проживало немало этнических поляков. Все эти факторы сделали присоединение Гродно важным и стратегическим решением с стороны Польских сил, ведь с его присоединением откроются новые возможности для расширения нашей территории и дальнейшей экспансии. Что может угрожать прямой интервенции уже на нашу границу."
 poland.112.a: "Тучи сгущаются"
 poland.114.t: "Вопрос Тешинской Силезии"
 poland.114.d: "Тешинская Силезия — регион, богатый разнообразными ресурсами и развитой промышленностью, что делает его стратегически важным для экономического развития Польши. Однако, несмотря на наши стремления получить этот богатый край, он находится под прямым контролем Чехословакии, с которой у нас сложились непростые отношения.\n\nПосле Великой войны территориальный спор между Польшей и Чехословакией обострился именно в Тешинской Силезии. Стремясь снизить напряжённость, польский Национальный Совет Княжества Цешинского и чешский Национальный Комитет для Силезии — региональные органы, представлявшие интересы двух национальностей — согласовали временные границы на территории после распада Австро-Венгерской империи. Это временное соглашение должно было быть утверждено центральными правительствами обеих республик, однако окончательное решение так и не было принято."
 poland.114.a: "Договориться здесь не получится"
 poland.114.b: "Предложим провести плебисцит"
 poland.115.t: "Ультиматум Польской Республики правительству Чехословацкой Республики"
 poland.115.d: "Польское Правительство несколько месяцев тому назад обратило внимание Чехословацкого Правительства на нетерпимое положение, сложившееся на территориях Чехословакии, где проживает польская национальная группа. Последовавшая дипломатическая переписка была результатом этого демарша. Совсем недавно, в критический момент обмена мнениями, с той и с другой стороны было констатировано, что нормализация отношений между Польшей и Чехословакией может осуществиться, в первую очередь, только путем территориальной уступки в пользу  Польши территорий, где проживает польское население, которые легко устанавливаются на основе существующих данных, а во вторую очередь - путем плебисцита на других территориях, где проживает смешанное население.\n\n Учитывая драматическое и угрожающее положение в Тешинском районе Силезии, Польское Правительство выдвигает требование немедленной территориальной уступки региона и удовлетворения всех польских претензий."
 poland.115.a: "Мы не можем согласиться на это"
 poland.115.b: "Отведите войска"
 poland.116.t: "Нота Польской Республики правительству Чехословацкой Республики"
 poland.116.d: "Польское Правительство несколько месяцев тому назад обратило внимание Чехословацкого Правительства на нетерпимое положение, сложившееся на территориях Чехословакии, где проживает польская национальная группа. Последовавшая дипломатическая переписка была результатом этого демарша. Совсем недавно, в критический момент обмена мнениями, с той и с другой стороны было констатировано, что нормализация отношений между Польшей и Чехословакией может осуществиться, в первую очередь, только путем территориальной уступки в пользу  Польши территорий, где проживает польское население, которые легко устанавливаются на основе существующих данных, а во вторую очередь - путем плебисцита на других территориях, где проживает смешанное население.\n\n Учитывая драматическое и угрожающее положение в Тешинском районе Силезии, Польское Правительство выдвигает требование немедленной территориальной уступки указанных районов и проведения плебисцита."
 poland.116.a: "Мы не можем согласиться на это"
 poland.116.b: "Сообщите им о проведении референдума в ближайшее время"
 poland.117.t: "Литовский вопрос"
 poland.117.d: "Ситуация вокруг Литвы в это время действительно была сложной и многослойной. Литовское государство, которое стало союзником Варшавы, столкнулось с вызовами, связанными с его суверенитетом и территориальной целостностью. После обретения независимости в 1918 году, Литва оказалась в центре противоречий, связанных с польскими и литовскими национальными комитетами, которые претендовали на Виленский край, действуя в интересах германских оккупационных властей.\n\nС уходом немецких войск в соответствии с договором о перемирии с Антантой, Красная армия начала наступление с востока, что поставило под угрозу суверенитет Литвы. В этой ситуации возник вопрос: следует ли подчинить литовские земли, чтобы создать буфер против большевистской угрозы, или объединить усилия с Литвой для совместной борьбы против общего врага?\n\nПодчинение Литвы могло бы временно укрепить позиции РСФСР на западе, однако это также рисковало бы вызвать ещё большее недовольство и сопротивление со стороны литовского населения, что могло привести к долгосрочным конфликтам. С другой стороны, объединение усилий с Литвой для отражения большевистского натиска могло бы создать более устойчивую фронтовую линию и укрепить позиции обеих республик в международной политике.\n\nОднако, учитывая историческую преданность Литвы Варшаве и её стремление к самостоятельности, такой союз мог быть проблематичным. Важно было учитывать и внутренние противоречия, и опасности, связанные с интервенцией, и в конечном итоге, решение должно было быть основано на анализе потенциальных последствий для обеих сторон."
 poland.117.a: "Литва должна войти в состав Польши"
 poland.117.b: "Следует объединить наши силы"
 poland.117.c: "От Литвы, нам нужен лишь Вильнюс"
 poland.118.t: "Поляки переходят границу"
 poland.118.d: "Поляки, осознавая угрозу, которую представляет собой большевизм для нашей целостности, стремились удовлетворить свои национальные амбиции и аннексировать наш край под польское господство. В результате польская армия пересекла государственные границы и начала свой поход по всей территории Литвы. Если мы не остановим их сейчас, мы рискуем потерять то, что так дорого нам — нашу независимость.\n\nС каждым днем наше положение становится все более критическим. Польские войска, не только угрожают нашей территориальной целостности, но и ставят под сомнение само существование литовского государства. Мы должны сплотиться и отстоять свои права, иначе история запомнит нас как народ, который не смог защитить свою свободу."
 poland.118.a: "Мы обязаны их остановить"
 poland.119.t: "Польша выдвигает предложение"
 poland.119.d: "Польское государство, наблюдая за тем, как большевики всё больше ставят под сомнение суверенитет и целостность Литвы, вышло на связь с нашим правительством и выдвинуло предложение. По их замыслу, Польша и Литва должны объединить усилия в борьбе с большевистской угрозой. Однако в обмен на поддержку Литвы Польша требовала согласия на реализацию своего плана по созданию некоего Междуморья.\n\nЭтот план подразумевал создание буферных государств, подчинённых Польше, для защиты от восточной угрозы. Польские власти видели в этом возможность укрепить свои позиции и обеспечить безопасность своих границ от возможных угроз от России на востоке. Тем не менее, такая схема ставила под угрозу независимость Литвы и её право на самостоятельное существование.\n\nПриняв предложение, мы бы могли временно обеспечить защиту нашему государству, но отвергнуть его, сохранив независимость, мы рискуем оказаться один на один с агрессией большевиков. Важно учитывать, что любое решение могло иметь долгосрочные последствия для будущего нашей страны. Мы должны были тщательно взвесить все риски и возможности, чтобы не потерять то, за что мы боролись."
 poland.119.a: "Мы в силах справиться и сами"
 poland.119.b: "Возможно, стоит согласиться"
 poland.120.t: "Поляки движутся к Вильнюсу"
 poland.120.d: "Польское военное руководство всё же решилось на попытку захвата Вильнюса. Польская армия смело движется к нашим границам, целью которых является присоединение важного для нас города Вильнюса — центра сопротивления. Однако сейчас город находится под угрозой прямого захвата, и потеря этого региона может поставить под удар всю нашу страну и недавно приобретённый суверенитет."
 poland.120.a: "Враг будет разбит"
 poland.121.t: "Победа в конфликте"
 poland.121.d: "Победа! Враг разбит и больше не в силах противодействовать нам, мы выполнили наши задачи, и мы показали им, кто здесь лучший. Эта победа — результат единства, дисциплины и решимости наших войск, а также мудрого руководства, которое направляло каждого бойца к общей цели."
 poland.121.a: "Несладко им пришлось"
 poland.122.t: "Поражение в конфликте"
 poland.122.d: "Мы не смогли сдержать натиск врага, его силы превзошли наши, и мы не смогли отстоять то, что нам оказалось дорого. Несмотря на проявленную храбрость и самоотверженность наших солдат, обстоятельства сложились против нас, и враг достиг поставленных целей."
 poland.122.a: "Мы еще вернёмся"
 poland.123.t: "Литва соглашается"
 poland.123.d: "Литовское руководство в ответ на наше предложение о союзе встретило его с одобрением. Понимая сложную ситуацию на фронте и возможную угрозу со стороны большевиков, литовское правительство сочло принятие этого предложения как реальный шанс защититься от опасности со стороны Советской России. В ходе переговоров буквально воссоздали момент подписания Люблинской унии — аналогия, понятная абсолютно всем. Таким образом, объединённые силы Польши и Литвы смогут лучше действовать против агрессоров и гораздо более эффективно бороться как с внутренними, так и с внешними врагами."
 poland.123.a: "Великий союз возрождается?"
 poland.124.t: "Литва отказывается"
 poland.124.d: "Литовское руководство, в ответ на наше предложение о союзе, категорически отказалось. Не желая становиться частью Польского союза, Литва посчитала разумным действовать независимо от своего польского соседа, даже не учитывая сложную ситуацию на фронтах. Это может привести к реальной угрозе личной безопасности Литвы со стороны большевистской России. Такой ответ вызывает огорчение, ведь он фактически разрушает ту многовековую историю и взаимоотношения, которая существовала между нашими народами, особенно в самый трудный момент для Литовского государства, когда Польша поддержала их, подписав Люблинскую унию."
 poland.124.a: "Мы так просто их не оставим"
 poland.124.b: "Они пожалеют об этом выборе"
 poland.125.t: "Поляки подчиняют наши активы"
 poland.125.d: "Как сегодня стало известно, польское руководство, чтобы увеличить своё влияние в нашей стране, решило подчинить и контролировать наши национальные активы, обосновывая это "защитой от возможной их потери во время столкновений с врагом". Неясно, действительно ли они хотят лишь защитить и обезопасить наши ресурсы, или же они в наглую стремятся контролировать наше государство."
 poland.125.a: "Видимо так надо"
 poland.125.b: "Что за бред? Мы выходим из Междуморья"
 poland.126.t: "Поляки подчиняют наши активы"
 poland.126.d: "Как сегодня стало известно, польское руководство, чтобы увеличить своё влияние в нашей стране, решило подчинить и контролировать наши национальные активы, обосновывая это "защитой от возможной их потери во время столкновений с врагом". Неясно, действительно ли они хотят лишь защитить и обезопасить наши ресурсы, или же они в наглую стремятся контролировать наше государство."
 poland.126.a: "Видимо так надо"
 poland.126.b: "Что за бред? Мы выходим из Междуморья"
 
 poland.128.t: "Соприкосновение с Большевиками"
 poland.128.d: "Польская экспансия на восток имела множество причин для своего осуществления, одна из которых заключалась в непрямой угрозе со стороны большевиков. После позорного сепаратного мира и потери огромных земель на западе они решились вернуть их. Такие возможности им предоставила революция, вспыхнувшая в Германии, которая вынудила германское правительство подписать мир с странами Антанты. Одним из условий этого мира стал вывод немецкого гарнизона с восточных, захваченных земель. Именно на этих восточных территориях, откуда бегут немцы, пересеклись польские и советские претензии и интересы.\n\nГлавной целью польской стороны было создание на востоке буферной зоны, которая в случае развязывания прямого конфликта могла бы стать хорошим полем боя, не затрагивая богатый польский центр. Большевики же преследовали иные, но понятные цели — вернуть все утраченные земли, перешедшие к Германии после выхода из войны, — от Прибалтики до Беларуси и Украины. Общие планы и амбиции ясно свидетельствуют о возможности дальнейшей эскалации конфликта.\n\nОднако есть и реальная возможность получить часть так желанных территорий: гражданская война в России ставит большевиков в уязвимое положение. Открытие нового фронта с нами может поставить под угрозу весь советский режим в Москве."
 poland.128.a: "Нам не о чем договариваться"
 poland.128.b: "Отправляйте делегацию"
 poland.129.t: "Расстрел советской миссии Красного Креста"
 poland.129.d: "Советская делегация в составе пяти человек прибыла в Варшаву [GetDateText] года с целью оказания помощи русским военнопленным, возвращавшимся домой из Германии и Австрии через Польшу. Несмотря на гуманитарный характер этой миссии, члены делегации вскоре были интернированы польскими властями. Информация об этом инциденте быстро стала известна широкой польской общественности, что привело к началу протестов со стороны левых сил с требованиями освободить советских представителей. Эти выступления закончились столкновениями между протестующими и полицией.\n\nСоветская миссия Красного Креста была удерживалась под арестом в Варшаве, а затем, под предлогом возвращения на Родину, все пять человек были вывезены на восток Польши и расстреляны польскими жандармами. При этом не было проведено никакого расследования, и не было вынесено постановления суда по данному делу.\n\nЭто преступление вызвало широкий негативный общественный резонанс. Польские власти пытались списать убийство на действия неких «бандитских группировок», распространяя официальную версию о том, что советская миссия якобы подверглась нападению группы неустановленных лиц с целью грабежа. Однако чудом выживший при расстреле врач Л. Альтер, сумевший самостоятельно вернуться в Москву, дал показания, которые полностью опровергли официальную польскую версию.\n\nЭти свидетельства придали делу новый, неприятный для Варшавы оборот. Под давлением неопровержимых фактов, предъявленных советским правительством и международным Красным Крестом, польские власти были вынуждены привлечь к ответственности жандармов, участвовавших в расстреле. Тем не менее, всем им были вынесены лишь условные сроки. В качестве «смягчающих» обстоятельств суд учёл их «патриотические побуждения» и уверенность в том, что они якобы казнили не представителей Красного Креста, а «большевистских эмиссаров, агитаторов и убийц».\n\nВажно отметить, что, несмотря на многочисленные запросы, советская сторона так и не получила от польских властей материалы следствия, что дополнительно подчеркивает непрозрачность и безнаказанность действий польских жандармов в этом трагическом инциденте."
 poland.129.a: "Нам нужно загладить это происшествие"
 poland.129.b: "Если нужно, то и ещё несколько таких расстреляем"
 poland.130.t: "[FROM.GetAdjective]ое правительство приостанавливает поддержку"
 poland.130.d: "[FROM.GetAdjective]ое правительство, осознавая ужасающую политику, проводимую Польским государством, и осуждая его действия, решило приостановить свою поддержку. Они выразили нежелание поддерживать того, кого можно назвать "агрессором". Растущее недовольство международного сообщества по поводу действий Польши, подчеркивало необходимость пересмотра подхода к дипломатическим отношениям с этой страной. [FROM.GetName], стремясь сохранить свои моральные принципы и поддерживать мир в регионе таким образом."
 poland.130.a: "Ну и пожалуйста"
 poland.131.t: "Агрессивная политика Польши"
 poland.131.d: "Польское государство проводит слишком агрессивную политику, и ужас их поступков не знает границ. Если мы не остановим их действия, то непонятно, что они могут устроить в следующий раз.  Требуется немедленных и решительных действий со стороны нас, и всего международного сообщества. Игнорирование агрессии может привести к еще более серьезным последствиям и дестабилизировать ситуацию в регионе. Необходимо объединить усилия для противостояния подобным действиям и защиты принципов мирного сосуществования и уважения к международным нормам."
 poland.131.a: "Они зашли слишком далеко"
 poland.131.b: "Ограничимся протестом"
 
 poland.132.t: "Польская делегация и переговоры"
 poland.132.te: "Польский отказ от переговоров"
 poland.132.d: "Польская дипломатическая миссия в Москве, прибывшая с целью урегулирования конфликта, была встречена соответствующим образом. Однако, помимо намерения установить нормальные отношения с нашим советским правительством, польское руководство надеется захватить обширные территории, значительно превышающие изначальные планы по присоединению всех земель с польским большинством. Вели разговоры о установлении польской власти над территориями Беларуси, Украины и Литвы. Такие идеи вызвали осуждение, поскольку они явно шли вразрез с идеями гуманности — речь шла лишь о расширении экспансии и реваншизме.\n\nЖелание польского руководства — вернуть свои земли и восстановить мощь Речи Посполитой, от моря до моря. Очевидно, что Польша считает наш режим угрозой своему существованию; память о многолетней русской власти в землях, бывших польским царством, подталкивает их к тому, чтобы максимально ослабить наш режим.\n\nОчень высока вероятность, что Польша вовсе не стремится к присоединению территорий мирным путём. Передача даже значительных восточных земель не насытит аппетиты польских амбиций, ведь в первую очередь они желают расправиться с нами за все годы оккупации в царской России."
 poland.132.de: "Несмотря на неоднократные попытки выйти на связь с польским руководством, все наши дипломатические миссии оставались без ответа, а просьбы — без услышания. Ведь намерения польского руководства строятся на захвате обширных территорий, значительно превышающих изначальные планы по присоединению всех земель с польским большинством. Разговоры о установлении польской власти над территориями Беларуси, Украины и Литвы шли вразрез с принципами гуманности — очевидно, речь шла лишь о расширении экспансии и реваншизме.\n\nЖелание польского руководства — вернуть свои земли и восстановить мощь Речи Посполитой от моря до моря. Очевидно, что Польша считает наш режим угрозой своему существованию; память о многолетнем русском владычестве в землях, бывших польским королевством, подталкивает их к тому, чтобы максимально ослабить наш режим.\n\nОчень велика вероятность, что Польша вовсе не преследует цели присоединения территорий мирным путём. Передача даже значительных восточных земель не удовлетворит польские аппетиты, ведь в первую очередь они хотят расправиться с нами за все годы оккупации в царской России."
 poland.132.a: "Польский пан не получит и дюйма нашей земли"
 poland.132.b: "Предложим им лишь малые уступки"
 poland.132.c: "Похоже, войны не избежать..."
 poland.132.e: "Мы отдадим всё, лишь бы избежать войны"
 poland.133.t: "Россия отказывается от переговоров"
 poland.133.d: "Неоднократные встречи и беседы между польскими и советскими дипломатами заканчивались без какого-либо результата. Нежелание советского руководства идти на территориальные уступки побуждает наше руководство начать своевременную интервенцию в восточные земли советской России — с установлением своей власти над землями Беларуси и Украины. Эти территории станут отличным буфером против расширительных амбиций большевиков и их идей революции, стремясь распространить их по всей Европе.\n\nВедь без построения сильного государства, способного препятствовать этим планам, велик риск, что сама Польша может стать жертвой натиска Красной армии, которая всё более и более набирает силу. Никому не известно и абсолютно не гарантировано, что после окончания гражданской войны эта армия не направится в первую очередь на наши земли. Такой шаг подтолкнет западных союзников поддержать нашу авантюру оружием и боеприпасами. В случае успеха это гарантирует нам безопасность на восточных рубежах."
 poland.133.a: "Бей большевика!"
 poland.133.b: "Возможно, нам стоит подумать дважды чем нападать."
 poland.134.t: "Россия предлагает уступки"
 poland.134.d: "Многократные встречи и переговоры между польскими и советскими дипломатами принесли свои результаты. Осознание угрозы со стороны возможного открытия нового, нежеланного фронта побудило советское руководство пойти на территориальные уступки в отношении восточных земель советской России — с установлением польской власти на части территорий с преобладающим польским населением. Эта зона могла стать серьёзным буфером против расширительных амбиций большевиков и их идей революции, стремившихся распространить их по всей Европе.\n\nОднако предложенные территории, к которым готова была склониться советская сторона, не совпадали с первоначальными ожиданиями нашего руководства. Требования о ещё большей передаче земель, вплоть до всей Беларуси и Украины, могут столкнуться с отказом со стороны советских лиц, что грозит неизбежной войной с Советской Россией. Готовы ли мы отказаться от своих мечтаний о построении великой Польши от моря до моря? Или предпочтём не испытывать судьбу и согласимся на то, что можно добиться без крови и потерь?"
 poland.134.a: "Потребуем больше"
 poland.134.b: "Этого будет достаточно"
 poland.134.c: "Лучше уж мы сами придём, и заберём своё"
 poland.135.t: "Польша соглашается"
 poland.135.d: "Выдвинутое предложение о передаче восточных земель с преобладающим польским населением было встречено в польском руководстве с особым вниманием. Изначальные польские планы доходили до идеи передачи всех земель, входивших в состав Речи Посполитой до первого её раздела в 1772 году. Однако хладнокровный расчёт и нежелание жертвовать польскими солдатами в возможной войне — которая могла обернуться полной катастрофой для Польского государства — привели к тому, что решение было одобрено и принято.\n\nНаши руководители полностью отказались от мечтаний и планов о построении Великой Польши от моря до моря, а взамен обеспечили гарантию безопасности на восточных рубежах. Это, безусловно, пойдет нам только на пользу: освободит дополнительные силы от необходимости держать еще один фронт, что может оказаться полезным и на других направлениях борьбы с врагами революции."
 poland.135.a: "Войну удалось предотвратить"
 poland.136.t: "Польша требует больших уступок"
 poland.136.d: "Выдвинутое предложение о передаче восточных земель с преобладающим польским населением было встречено в польском руководстве категорическим отказом. Нежелание польской власти соглашаться на, по их мнению, "недостойные условия" побуждает начать решительные меры против наглых польских панов, которые стремятся превратить восточные земли в свои колонии.\n\nДело лишь в том, насколько наше правительство готово открыть дополнительный фронт с поляками, обладающими достаточными силами для прямой угрозы нашим западным рубежам. В случае необходимости, нам придется быть готовыми противостоять хорошо вооружённой польской армией, которая не остановится лишь на возвращении своих земель от моря до моря."
 poland.136.a: "Больше они не получат"
 poland.136.b: "Мир нам необходим."
 poland.137.t: "Россия идёт на большие уступки"
 poland.137.d: "Советское правительство, учитывая свою сложную ситуацию, когда по всему бывшему пространству Российской империи идёт гражданская война, побудило Советскую Россию согласиться на условия передачи обширных территорий на востоке — вплоть до всей Беларуси и Украины. Это безусловно устраивает наше руководство. Безкровное присоединение таких больших земель гарантирует нам безопасность восточных рубежей, что станет достойным буфером против России — будь то большевики или какая-либо иная власть.\n\nТеперь мы смогли окончательно расправиться с той Россией, которая многие годы контролировала наши земли после трёх унизительных разделов. Наши ресурсы пойдут на укрепление нашей власти и установление собственной, личной и абсолютной власти."
 poland.137.a: "Польша вновь великая"
 poland.138.t: "Белорусская государственность"
 poland.138.d: "Появившееся правительство, через объявление трёх уставных грамот, белорусская рада смогла после ухода немецких войск укрепиться на своих землях и установить свою подконтрольную власть. Однако угроза со стороны большевистского правительства в России не гарантирует выживание столь хрупкой республики; она смогла появиться лишь благодаря внешним обстоятельствам и небольшой удаче.\n\nБелорусское самосознание уязвимо, и эта неопределённость даже среди лидеров белорусского движения по поводу их дальнейшей позиции — поддержки Польши или России — вызывает немалые дискуссии и противоречия. Необходимо решить, какая судьба ожидает это молодое государство, поскольку неопределённость в его политическом курсе ставит под угрозу его будущее. Ведь наша прямая поддержка их правительства и государственных институтов могла бы значительно сильнее повлиять на их настроение и желание двигаться в определённом направлении."
 poland.138.a: "Белорусов как таковых нет и быть не может"
 poland.138.b: "Беларусь станет хорошим буфером"
 poland.139.t: "Белорусская рада"
 poland.139.d: "Появившееся правительство, благодаря объявлению трёх уставных грамот, Белорусская рада так и не смогла воспользоваться уникальным моментом ухода немецких войск, когда могла бы укрепиться на своих землях и установить свою подконтрольную власть. Однако стремительно надвигающаяся угроза со стороны большевистского правительства в России побудила белорусскую раду выехать в Литву ради собственной безопасности.\n\nБелорусское самосознание остаётся уязвимым, и эта неопределённость даже среди лидеров белорусского движения по поводу их дальнейшей позиции — поддержки Польши или России — вызывает немалые дискуссии и противоречия. А с бегством рады в Литву ситуация в их руководстве стала ещё более раздробленной. Необходимо решить, какая судьба ожидает пропольскую раду, поскольку неопределённость в её политическом курсе ставит под угрозу её будущее. Ведь наша прямая поддержка их правительства и государственных институтов могла бы значительно сильнее повлиять на их настроение и желание двигаться в определённом направлении. А также помочь использовать их для утихомиривания местного, сельского населения."
 poland.139.a: "Рада лишь кучка сброда, страдающих самостийностью"
 poland.139.b: "Сделаем из них лояльными к нам, и подчиним всю Беларусь"
 poland.140.t: "Переговоры с Варшавой"
 poland.140.d: "Польское руководство обратило внимание на наше образование. Их предложения ясны и понятны: они видят в нашей Беларуси возможность, которая могла бы помочь возрождающейся Польше вновь стать региональным гегемоном. Так, они предлагают свою помощь нашему правительству, обещая поддержку и признание в обмен на своё личное господство и контроль над нашим правительством, как в политической, так и в других сферах. Конечно, это означало бы уничтожение нашей суверенности как нации, подчинение и контроль со стороны Польши. Однако, возможно, принятие подданства станет единственным и реальным шансом на долгосрочное существование — не как изгнанного правительства, втянутого в чужие дела, а как самостоятельной власти, обладающей реальным управлением на территориях нашей Беларуси."
 poland.140.a: "Нам не по пути"
 poland.140.b: "Это возможность отстоять нашу Беларусь"
 poland.141.t: "Сейм Польского государства"
 poland.141.d: "За последние несколько месяцев с момента освобождения от немецкой власти польское государство значительно окрепло и уже способно перейти полноценно на республиканские рельсы. В связи с чем, были проведены выборы в первый независимый сейм возрождённой Польши.\n\nНесмотря на то, что данный орган призван отражать совокупную волю народа польского, надежд на стабильное функционирование не так много. Левые партии продемонстрировали желание вести радикальные реформы, чем сразу отпугнули союзников своим сходством с большевиками, правые националисты и сторонники католичества оказались в антагонизме с Пилсудским, последний пытался занять позицию над схваткой, в качестве "Начальника государства", главное дело которого - война.\n\nТеперь новый сейм завис на грани противоречий, партии разбредаются по лагерям, армия при этом находится в ожидании. Потенциальный антагонизм в новой парламентской системе крайне высок, но внешне, всё выглядит спокойно. В любом случае, пришло время нам занять сторону."
 poland.141.a: "Встанем на сторону радикальных социалистов"
 poland.141.b: "Поддержим либералов"
 poland.141.c: "Консерваторы должны победить"
 poland.141.e: "Сторонники Галлера продолжат активность"
 poland.141.f: "Пришло время национального реванша"
 poland.142.t: "Белорусское правительство отказывается"
 poland.142.d: "Белорусское правительство, вопреки нашим ожиданиям, выдвинуло отказ в поддержке, поставив под угрозу своё подчинение их политическому суверенитету. Ожидаемое сильное пропольское настроение оказалось в значительной мере ошибочным. Стремясь сохранить свой, хотя и хрупкий, суверенитет, они решили до конца бороться за него, не желая становиться подконтрольной частью Польского государства.\n\nЯвляется ли правильным полностью лишить их этого суверенитета силой? Присоединив лишь остатки Беларуси и не получив той желанной поддержки среди местного крестьянства, мы столкнёмся с множеством проблем в будущем. Или лучше направить наши силы на действительно полезные и перспективные решения?"
 poland.142.a: "Применим значит силу"
 poland.142.b: "Они не заслуживают даже нашего внимания"
 poland.143.t: "Белорусское правительство соглашается"
 poland.143.d: "Как и следовало ожидать, белорусское правительство приняло предложение, и теперь мы обязуемся поддерживать наших друзей — белорусов. Угроза со стороны большевиков стала менее значительной. Совместная борьба сломит Советскую Россию и подарит беларусам собственное государство, хотя и под нашей властью.\n\nСам факт того, что белорусы получили реальную возможность сохранить свою государственность, обеспечивает нам дополнительную поддержку их народа, что в свою очередь существенно укрепит наши позиции, учитывая весь натиск и давление со стороны большевиков."
 poland.143.a: "Замечательно"
 poland.144.t: "Украинская республика"
 poland.144.d: "С первых дней своего существования украинское государство было втянуто во всевозможные войны. Молодое государство было вынуждено бороться за свою независимость силой, и, несмотря на немецкую оккупацию и последующую гражданскую войну, Украина продолжает своё существование. Теперь же, когда ситуация в Украине стала ещё более нестабильной, а власть переходит из рук в руки, нам стоило бы поучаствовать в дальнейшем определении судьбы украинского народа.\n\nНестабильное правительство, хотя и располагает собственной армией и значительной территорией, всё ещё находится под серьёзной угрозой. Целесообразно было бы заключить союз с украинским правительством для совместной борьбы против агрессии большевиков. Однако наши взгляды на будущее украинских земель не так просты — без явных территориальных уступок не обойтись.\n\nСтоит задуматься: действительно ли мы нуждаемся в заключении союза с украинским государством, а если и да, то насколько велика будет выгода от такого решения?"
 poland.144.a: "Нам с ними не о чем договариваться"
 poland.144.b: "Предложим Украинцам союз, взамен на уступки"
 poland.144.c: "Лишь равноправный союз приведёт нас к общей победе"
 poland.145.t: "Предложение о союзе"
 poland.145.d: "Польская республика — молодое, но весьма амбициозное государство. В данный момент она активно втягивается в конфликты со своими соседями, стремясь возродить былую мощь. Нам же было направлено предложение: Польша готова заключить с нашим правительством военный союз, что обеспечит нам гарантии безопасности. Однако, конечно же, без территориальных уступок не обойдётся.\n\nЖелаемыми для них территориями являются западные области Бреста и Ковеля, на которые они уже давно предъявляют свои притязания. Кризисная ситуация в стране, а также угроза со стороны России заставляют всерьёз задуматься о данном предложении. Ведь дополнительные польские силы в союзе с нашими украинскими частями могли бы стать серьёзной контрсилой против наших врагов."
 poland.145.a: "С поляками? Да ни за что"
 poland.145.b: "Если это сохранит нашу государственность, то пусть."
 poland.146.t: "Предложение о равноправном союзе"
 poland.146.d: "Польская республика — молодое, но весьма амбициозное государство. В данный момент она активно втягивается в конфликты со своими соседями, стремясь возродить былую мощь. Нам же было направлено предложение: Польша готова заключить с нашим правительством военный союз, что обеспечит нам гарантии безопасности. И что самое удивительное, заключенный же союз с Польшей, не будет требовать от нас каких либо обязательств.\n\nВероятно, польское руководство осознает, что лишь с равными правами и общими силами возможно противостоять угрозе с стороны России. Кризисная ситуация в нашей стране, а также угроза с стороны соседей заставляют всерьёз задуматься о данном предложении. Ведь дополнительные польские силы в союзе с нашими украинскими частями могли бы стать серьёзной контрсилой против наших врагов."
 poland.146.a: "С поляками? Да ни за что"
 poland.146.b: "Вместе нам не будет равных"
 poland.147.t: "Украинское правительство отказывается"
 poland.147.d: "Уверенное в своих силах украинское правительство отказало нам в заключении союза. Несмотря на очевидные преимущества, которые мог бы дать прочный оборонительный и военный союз, украинское руководство сочло это решение не столь важным. Вероятно, для них оно казалось слишком непредсказуемым, учитывая непростое отношение к полякам в целом.\n\nХотя мы и получили отказ, терять серьёзный плацдарм и территорию, которая могла бы служить важным буфером с Россией, недопустимо. Поэтому нам необходимо принять радикальные меры, если мы действительно хотим возрождения великой Польши."
 poland.147.a: "Здесь есть только одно решение"
 poland.147.b: "Ну и чёрт с ними"
 poland.148.t: "Украинское правительство соглашается"
 poland.148.d: "Рассмотрев наше предложение, украинское правительство выдвинуло нам ответ, в котором соглашается и выражает готовность к заключению союза. Хотя во время обсуждения этого решения в высших кругах украинской власти возникали сомнения — особенно из-за передачи некоторых территорий — здравый смысл и расчёт взяли верх, и было принято согласие на заключение союза, который обеспечит, насколько это возможно, гарантии безопасности украинскому обществу.\n\nЭто позволит совместными усилиями противостоять нарастающей угрозе со стороны России. При этом силы, которые ранее направлялись на дополнительное укрепление армии, теперь могут быть использованы для решения внутренних, не менее важных, проблем в украинском государстве."
 poland.148.a: "Чудесно"
 poland.149.t: "Украинское правительство соглашается"
 poland.149.d: "Рассмотрев наше предложение, украинское правительство выдвинуло нам ответ, в котором соглашается и выражает готовность к заключению союза. Хотя во время обсуждения этого решения в высших кругах украинской власти возникали сомнения, но здравый смысл и расчёт взяли верх, и было принято согласие на заключение союза, который обеспечит, насколько это возможно, гарантии безопасности украинскому обществу.\n\nЭто позволит совместными усилиями противостоять нарастающей угрозе со стороны России. При этом силы и ресурсы, которые ранее направлялись на дополнительное укрепление армии, теперь могут быть использованы для решения внутренних, не менее важных, проблем в украинском государстве."
 poland.149.a: "Чудесно"
 
 poland.151.t: "Сейм Польского государства"
 poland.151.d: "За последние несколько месяцев с момента освобождения от немецкой власти польское государство значительно окрепло и уже способно перейти полноценно на республиканские рельсы. В связи с чем, были проведены выборы в первый независимый сейм возрождённой Польши.\n\nНесмотря на то, что данный орган призван отражать совокупную волю народа польского, надежд на стабильное функционирование не так много. Левые партии продемонстрировали желание вести радикальные реформы, чем сразу отпугнули союзников своим сходством с большевиками, правые националисты и сторонники католичества оказались в антагонизме с Пилсудским, последний пытался занять позицию над схваткой, в качестве "Начальника государства", главное дело которого - война.\n\nТеперь новый сейм завис на грани противоречий, партии разбредаются по лагерям, армия при этом находится в ожидании. Потенциальный антагонизм в новой парламентской системе крайне высок, но внешне, всё выглядит демократично. В любом случае, пришло время нам занять сторону."
 poland.151.a: "Встанем на сторону радикальных социалистов"
 poland.151.b: "Мы должны поддержать умеренных социалистов"
 poland.151.c: "Наши кандидаты в право-либеральном лагере"
 poland.151.e: "Нужно поддержать Начальника!"
 poland.152.t: "Красная Польша"
 poland.152.d: "На радикально левом фланге нового Польского государства расположились партии марксистской и аграристской ориентации. Из первых наибольшим влиянием всегда обладали СДКПиЛ и ППС-левица, недавно объединенные в единую Компарию. На коммунистов Польши особое влияние оказывают русские большевики и германские независимые социал-демократы. Коммунисты стоят за идеи обобществления собственности и установление власти советов. Их ориентация преимущественно на промышленный пролетариат.\n\nВ то же время, интересы крестьян в более радикальном ключе отражает Польская Крестьянская Партия “Освобождение”. Представители этой фракции выступают за расширение крестьянских наделов при поддержке государства, радикалы также поддерживают идею аграрной реформы с изъятием земель помещиков без выкупа. Однако, “Освобождение” считается куда более приемлемым для Сейма, чем большевики из Компартии."
 poland.152.a: "Советская власть победит!"
 poland.152.b: "Вперёд польское крестьянство"
 poland.153.t: "Социалистическая Польша"
 poland.153.d: "Основные силы среди умеренных социалистов в Польше представляют социал-демократы из ППС и социал-либеральная Крестьянская Партия “Пяст”. Первая из них - Польская Социалистическая Партия - представляет умеренный социализм с национальным уклоном и реформистским курсом на обеспечение нужд польского рабочего. Сторонники ППС считают возможным развитие страны на социалистических рельсах нереволюционным путём, а их национальный уклон является прививкой против следования в русле иностранных марксистов.\n\nКрестьянская Партия “Пяст” также стоит на национальных и реформистских позициях, однако, уже в аграрной сфере. Пястовцы требуют расширения мелких крестьянских хозяйств засчет перераспределения по аграрной реформе. Также “Пяст” выступает за поддержку крестьянства экономическими мерами ввиде долгосрочного кредита и различных субсидий. При этом партия выступает против революции и за сохранение республиканского сеймового режима."
 poland.153.a: "Да здравствует Польская Социалистическая Партия!"
 poland.153.b: "Польский крестьянин! Голосуй за “Пяст”!"
 poland.154.t: "Правый выбор"
 poland.154.d: "Правый фланг польской политики представляют Национал-демократы Романа Дмовского и небольшое консервативное объединение католиков из Народной Католической партии. Партия Дмовского в прошлом имела влияние в Российской империи, отстаивая путь приобретения прав через реформы, а затем нац-демы поддержали Антанту и содействовали созданию польских антигерманских сил. Сторонники Дмовского - твердые националисты, они имеют репутацию людей “правее Пилсудского”, которого с одной стороны считают социалистом, а с другой, всё ещё недолюбливают за службу Австрии. Национализм нац-демов также выражается в лозунгах построения Польши для поляков и возвращении бывших польских территорий без компромисса с инородным населением. При этом, нац-демы согласны, что республика является сейчас лучшим способом управления среди цивилизованных держав. Они вовсе не противники парламента.\n\nКатолическая Народная партия не обладает столь широкой программой и не имеет длительной истории и массовой поддержки. Тем не менее, почва для успеха КНП имеется, так как народные католики апеллируют к религиозному чувству поляков, отстаивая ту часть их идентичности, которую оставили без внимания другие. Католическая Народная партия - типичные представители христианской демократии, это вполне респектабельная организация не оторванная от народа."
 poland.154.a: "Настал час национального возрождения!"
 poland.154.b: "Господи, даруй Польше мир!"
 poland.155.t: "Пилсудчики действуют"
 poland.155.d: "Если и можно назвать кого-то яркой фигурой в Польше, то это без сомнения Юзеф Пилсудский. Его политическая биография содержит участие в Боевой Организации ППС, создание польских легионов в Австрии и тюремное заключение в Германии. Пилсудский оказался прав когда сказал, что сначала поляки избавятся от русских руками немцев, а затем от немцев руками Антанты. Его репутация среди “легионеров” безупречна, так что отошедший от социализма Юзеф не нуждается в программе как таковой, он и есть программа. “Пилсудчики” желают сохранения своего вождя на вершине власти в любой форме, и хотя их политические действия порой неуклюжи, это искренние лоялисты своего лидера и если потребуется, они обеспечат ему диктатуру. "
 poland.155.a: "Ещё Польша не погибла!"
 poland.156.t: "Ветераны Голубой Армии"
 poland.156.d: "Биография Юзефа Галлера не является чем-то само собой разумеющимся. В Мировой войне Галлер побывал по обе стороны фронта - сначала сражался за освобождение поляков в Австрии, а затем, после начала немецких репрессий - перешёл фронт и оказался во Франции. Здесь он стал организатором “Голубой армии” - специальных польских частей на службе Антанты. Во Франции Галлер также установил тесные контакты с президентом страны и с польским заграничным комитетом получив расположение пана Дмовского.\n\nПосле того как режим Пилсудского-Мораческого потерпел фиаско в Варшаве Галлер стал вторым по счету Начальником Государства, получив особые военные и административные функции. Хорошие отношения с национал-демократами, репутация у союзников, а также наличие собственных войск делает из Юзефа Галлера серьезную политическую фигуру, число сторонников которой постоянно растёт, хотя, конечно, в значительной степени все они концентрируются в армии. "
 poland.156.a: "Юзеф Галлер наведёт порядок!"
 poland.157.t: "“Освобождение” за большевизм"
 poland.157.d: "Крестьянская партия “Освобождение” внезапно взяла резкий крен влево. Сегодня они заявляют что русские революционеры - пример для подражания. Освобожденцы трубят на всех улицах, что мы должны также радикально решить вопрос с землёй и не останавливаться перед разгромом помещиков. Радикализации риторики этой социалистической аграристской партии может стать проблемой для будущего Польши и действительно принести в неё большевизм. "
 poland.157.a: "Правые партии этого не потерпят!"
 poland.158.t: "Обращение польских крестьян"
 poland.158.d: "Польская крестьянская партия “Освобождение” сегодня направила к нам своих делегатов с приветственным обращением. Польские крестьяне с воодушевлением смотрят на свершения германской революции и надеются на взаимную поддержку и установление братского мира с социалистическими соседями. "
 poland.158.a: "Мы рады знакомству!"
 poland.159.t: "Привет польских крестьян"
 poland.159.d: "После установления социалистического правительства в Венгрии мы оказались во враждебном окружении, однако, социализм продолжает развиваться повсюду в Европе. Сегодня мы получили дружеский привет от польской крестьянской партии “Освобождение”. Наличие друзей в Польше является для нас хорошим подспорьем, однако, пока не ясно к чему это приведёт. "
 poland.159.a: "Может хоть они нам помогут?"
 poland.160.t: "“Освобождение” требует власть"
 poland.160.d: "Влияние крестьянской партии “Освобождение” постоянно возрастает, в то же время стабильность Сейма всё больше расшатывается. Освобожденцы приобрели множество сторонников среди крестьян и батраков, они создали региональные отделения и укрепили партию в масштабах страны. Их силы крайне серьезны и их лозунги чрезвычайно популярны. Теперь они требуют распустить текущий кабинет и отдать власть в правительстве мирным путём."
 poland.160.a: "Теперь в Польше крестьянская власть"
 poland.161.t: "Угроза крестьянского мятежа"
 poland.161.d: "Сегодня в Сейме партия “Освобождение” откровенно угрожала правительству мятежом. Радикальные-аграристы утверждали, что если текущий кабинет неспособен осуществить реформ чаемых большинством населения, и такие преобразования способны осуществить только “освобожденцы”. Эти речи, в свою очередь, были приправлены требованием сформировать новое правительство, из представителей крестьянских радикалов, т.е. из них самих же."
 poland.161.a: "Правительство не поведётся на провокации"
 poland.161.b: "Правительство сдаётся"
 poland.162.t: "Восстание польских крестьян"
 poland.162.d: "По всей стране вспыхнули беспорядки! Сельская местность полыхает. Демократический сеймовый режим не смог удержать страну от впадения в анархию. Польская крестьянская партия “Освобождение” начала революцию против буржуазной республики. Теперь они свергают власть в деревнях, делят поместья и собираются захватить города. Армия пока молчит, но правые среди офицеров, явно не будут в восторге от перспективы большевизма. Правительство в Варшаве также не намеренно сдаваться. Гражданская война началась."
 poland.162.a: "Вперёд крестьяне!"
 poland.162.b: "Остановите быдло!"
 poland.163.t: "Просьба польских товарищей"
 poland.163.d: "Польские товарищи из Польской Коммунистической Партии направили к нам делегацию с просьбой немедленно оказать помощь делу польского социализма. Сейчас ситуация в стране достаточно напряженная, голову поднимают шовинистические и клерикальные силы, однако, польский пролетариат готов к освобождению. Не хватает только материальных средств. Польские коммунисты рассчитывают на нас."
 poland.163.a: "Предоставьте всё необходимое"
 poland.163.b: "Пусть товарищи постараются!"
 poland.164.t: "Обращение польских рабочих "
 poland.164.d: "Рабочие из Польской Коммунистической Партии обратились сегодня к правительству Германии в самых дружественных словах. Польский пролетариат растёт и набирается сил, польские коммунисты рады видеть что их прежде грозный и империалистический сосед превратился в первое в Европе социалистическое государство."
 poland.164.a: "Отрадно видеть товарищей!"
 poland.165.t: "Привет польских рабочих"
 poland.165.d: "Сегодня, когда красная Венгрия ещё не до конца прошла через все испытания, сегодня польский пролетариат в лице коммунистической партии этой страны обращается к нам с братским приветом и пожеланием успехов в борьбе. Нам вдвойне приятно видеть как рядом с нами, по соседству с враждебной Чехией нарастает движение союзного пролетариата. Быть может скоро наши народы пойдут единым фронтом!"
 poland.165.a: "Пролетарии восточной Европы - объединяйтесь!"
 poland.166.t: "Красные рвуться к власти"
 poland.166.d: "Коммунисты Польши требуют установления рабочего правительства. Так председатель их фракции в сейме объявил сегодня. И намерения коммунистов нельзя считать пустыми словами. Наоборот, по всем городам и на большинстве фабрик красные имеют существенную поддержку. Они готовы к броску, но предлагают распустить нынешнее правительство мирным порядком. Взаимен коммунисты сформируют свою власть."
 poland.166.a: "Польша в руках большевизма"
 poland.167.t: "Красные начали забастовки"
 poland.167.d: "Польша погружается в забастовочный кризис. Польские коммунисты проникли на все фабрики и заводы и теперь требуют немедленного улучшения трудовых условий. Наиболее радикальные забастовщики выдвигают политические лозунги утверждая идею власти советов. Полиции сейчас придётся напрячься, а правительство находится перед лицом серьезных проблем в производстве."
 poland.167.a: "Рабочие недовольны"
 poland.168.t: "Угроза восстания рабочих"
 poland.168.d: "Сегодня в Сейме партия “Освобождение” откровенно угрожала правительству мятежом. Радикальные-аграристы утверждали, что если текущий кабинет неспособен осуществить реформ чаемых большинством населения, и такие преобразования способны осуществить только “освобожденцы”. Эти речи, в свою очередь, были приправлены требованием сформировать новое правительство, из представителей крестьянских радикалов, т.е. из них самих же."
 poland.168.a: "Правительство не поведётся на провокации"
 poland.168.b: "Правительство сдаётся"
 poland.169.t: "Восстание польских рабочих"
 poland.169.d: "Польские рабочии взялись за оружие. К этому их подтолкнула Коммунистическая партия, которая теперь надеется захватить власть и уничтожить все препятствия “буржуазного”сеймовского режима. Коммунистические вожди революции безжалостны, они утверждают что капиталисты и помещики в Польше должны быть уничтожены, а католическая церковь лишена всех прав. Вместо этого польские коммунисты хотят возвести на руинах только что освобожденной Польши новое социалистическое государство, где будут одинаково жить поляки, литовцы, немцы, и возможно даже евреи!"
 poland.169.a: "Вперёд рабочий класс!"
 poland.169.b: "Остановите пролетарское быдло!"
 poland.170.t: "Социал-демократическая забастовка"
 poland.170.d: "Польская Социалистическая партия выводит своих сторонников на забастовку. Сейчас они требуют проведения качественных реформ по улучшению жизненных условий польских рабочих. Представители ППС считают, что правые партии в сейме не оказывают должного внимания рабочему вопросу, а значит пришло время проявить свою мощь по всей стране."
 poland.170.a: "Забастовка началась"
 poland.171.t: "Польские социалисты против Начальника"
 poland.171.d: "Какими бы ни были прошлые отношения между ППС и Начальником Государства сегодня они явно пришли в упадок. Депутаты от польских социалистов посмели публично поставить под вопрос компетентность нынешнего Начальника как в военной, так и в политической сферах. Хотя все ещё согласны, что чрезвычайная должность должна сохраниться нынешний её представитель, по мнению ППС берёт на себя слишком много, а даёт Польше слишком мало."
 poland.171.a: "Они решили действовать открыто"
 poland.172.t: "Польские социалисты поддержали Пилсудского"
 poland.172.d: "Польская Социалистическая Партия выступила в прессе и в Сейме с недвусмысленным приветствием в адрес пана Юзефа Пилсудского. Известно, что действующий Начальник Государства имеет давние связи с этой организацией, однако, о том сохранил ли он их ходят лишь смутные слухи. Пилсудского в Польше традиционно считают левым правые и правым левые, для национал-демократов произошедшее вполне логично, однако, лагерь социалистов находиться в некотором недоумении. Так или иначе теперь польская публика знает, что ППС готовы выступить в поддержку Начальника, а значит его влияние вновь возросло."
 poland.172.a: "Это заявление будет иметь последствия"
 poland.173.t: "Кабинет ППС"
 poland.173.d: "Польская Социалистическая Партия вновь стремиться получить власть. Влияние ППС существенно выросло, ячейки этой партии популярны во всех городах, а её реальные возможность трудно переоценить. Если мы хотим избежать неприятностей, то нынешний кабинет должен быть распущен, а новый кабинет под руководством ППС сможет хотя бы контролировать ситуацию в стране."
 poland.173.a: "Польские социалисты вернулись к власти"
 poland.174.t: "“Пяст” протестует против Начальника"
 poland.174.d: "Крестьянская партия “Пяст” решила высказаться против прерогатив Начальника Государства. В заявлениях в прессе и в Сейме данная должность названа “неконституционной”, нарушающей дух демократической республики. И действительно, Начальник сейчас имеет ряд полномочий, которые ставят его в ранг то ли бессменного президента, то ли главнокомандующего с политическими функциями. Так или иначе, “Пяст” недоволен."
 poland.174.a: "Время выбрано удачно"
 poland.175.t: "“Пяст” за Пилсудского"
 poland.175.d: "Крестьянская партия “Пяст” неожиданно высказалась за Пилсудского. Многих это шокировало, однако, факт остаётся фактом - левые реверансы Начальника Государства не остались незамеченными и привлекли к себе даже таких полу-социалистов как “пястовцы”. Неизвестно, кроются ли за этим жестом подпольные договоренности, однако, ясно, что обе силы сейчас укрепили своё влияние."
 poland.175.a: "Пилсудский теперь вождь крестьян?"
 poland.176.t: "”Пяст” формирует правительство"
 poland.176.d: "После длительных дебатов в Сейме, а также митингов на улицах и некоторых кулураных переговоров, партия “Пяст” смогла добиться лидирующего положения в обществе. По крайней мере они сейчас единственные кто могут сформировать устойчивое правительство и именно это требование “пястовцы” и выдвинули теперь."
 poland.176.a: "В Польше новое правительство"
 poland.177.t: "Эндеция” за Галлера"
 poland.177.d: "Национал-демократы известные своими связями с Юзефом Галлером сегодня выступили публично за союз с нынешним Начальником Государства. Этот акт является чем-то большим чем просто декларация взаимного расположения. Эндеция отныне получит поддержку своих инициатив со стороны Начальника и армии, и точно также наоборот."
 poland.177.a: "Нац-демы укрепляют свой лагерь"
 poland.178.t: "“Эндеция” берёт власть силой"
 poland.178.d: "Национал-демократы снова действуют. Вот их излюбленный ход: армейские заговорщики вновь пришли в Сейм и потребовали роспуск правительства. Хотя претенденты в новый кабинет не названы, всем легонько намекнули что “Эндеция” единственная национальная партия, достойная править страной"
 poland.178.a: "Правительство не поведётся на провокации"
 poland.178.b: "Правительство сдаётся"
 poland.179.t: "”Эндеция” формирует правительство"
 poland.179.d: "Влияние нац-демов пана Дмовского вновь поднялось на высокий уровень. В обществе и в армии, а также в Сейме Эденция получила широкое влияние. Теперь когда судьба страны всё ещё находиться на перепутье нац-демы формируют своё правительство, а предыдущий кабинет уходит в отставку."
 poland.179.a: "Стабильность достигнута?"
 poland.180.t: "Католики формируют правительство"
 poland.180.d: "Католическая Народная Партия внезапно получила широкую популярность среди польского населения. Быть может вначале работы Сейма “католиков” считали серой лошадкой, но сейчас они уверенно держаться в седле. Их призывы о создании “католической Польши” нашли свой отклик и влияние данной партии настолько бесспорно, что теперь она сформирует новое правительство."
 poland.180.a: "Бог на стороне Польши!"
 poland.181.t: "Пилсудский критикует правительство"
 poland.181.d: "Правительство некомпетентно и неспособно удержать Сейм от разделения, Польша всё больше фрагментируется, народ недоволен, а армия находится под угрозой из-за действий партийных руководителей нынешнего кабинета - с такими заявлениями выступил сегодня Юзеф Пилсудский."
 poland.181.a: "Он прав, но стабильности так не прибавишь"
 poland.182.t: "Переворот Пилсудского"
 poland.182.d: "Правительству давно было известно о политических амбициях маршала Пилсудского, тем не менее, именно в последнее время его риторика обострилась, а действия стали подозрительными. Предвидя негативный поворот событий правительство отменило маневры вокруг столицы намеченные несколькими днями ранее под руководством маршала, однако, войска и не думали расходиться.\n\nНа следующий день утренние газеты ошеломили читателей известием, что ночью неизвестные люди обстреляли виллу маршала в Сулеювеке. А поскольку конфликт между Пилсудским и правительственным лагерем имел публичный характер, то ответ на вопрос о вероятном организаторе покушения напрашивался сам собой. Это была провокация, оправдывающая запланированную акцию устрашения президента и правительства. Лишь самые доверенные люди из окружения «отшельника из Сулеювека» знали о том, что ночью он отдал приказ командирам верных ему частей войти в Варшаву.\n\nПилсудский решился идти ва-банк. Генерал Орлич-Дрешер получил приказ овладеть мостами через Вислу, чтобы военная группировка путчистов могла войти в левобережную часть города, где находились все правительственные здания. Сам маршал во главе военной колоны выступил из Рембертува в направлении Варшавы, на помощь подтягивались и другие части, дислоцированные в окрестностях столицы. Левые партии оказали поддержку формируя рабочий батальон в помощь маршалу.\n\nБои в столице продолжались три дня. Правительство опиралось на части варшавского гарнизона и надеялось вскоре получить подкрепления из западных округов. Однако, Пилсудский выступил с упреждающими действиями и склонил на свою сторону массу социалистов, которые смогли организовать забастовки на железных дорогах. Получив собственные подкрепления маршал занял аэропорт. Понимая, что углубление противостояния вызовет гражданскую войну правительство ушло в отставку предоставив свободу действий Юзефу Пилсудскому."
 poland.182.a: "Начинается эпоха Оздоровления!"
 poland.183.t: "Юзеф Галлер критикует правительство"
 poland.183.d: "“Голубой генерал” Юзеф Галлер высказался против правительства, которое по его мнению не способно обеспечить стабильность и единство страны. Он также указывает на то как плачевно влияют на армию дрязги в тылу и постоянные столкновения в Сейме."
 poland.183.a: "Эти выпады подорвут доверие к демократии"
 poland.184.t: "Переворот Галлера"
 poland.184.d: "Проблемы в Польском государстве продолжали нарастать пока Сейм вёл безрезультатные дебаты. Напряжение в обществе росло и, пожалуй, даже больше - росло недовольство и разочарование демократией. Кто-то должен был представить альтернативу и так как Пилсудский был несколько отодвинут в тень на первый план пришлось выйти Юзефу Галлеру. \n\nВместе со своими сторонниками и при поддержки части Эденции он вступил в политическую борьбу против остальных партий Сейма, однако, Галлер вовсе не собирался участвовать в выборах. “Голубой генерал” стал постепенно консолидировать своих сторонников из бывшей “Голубой армии”, а также среди бывших великопольских повстанцев. Галлер также получил поддержку в Варшавском гарнизоне.\n\nКогда правительство допустило выпад против Галлера он смог обвинить власти в попытке устранить героя войны, а также намекнул на большевистский заговор. В то же время были скоординированы акции в Варшаве и “учения” вблизи столицы, так что, когда правительство заподозрив неладное попыталось ограничить сторонников Галлера у него уже всё было готово.\n\nТри дня шла операция по взятию столицы под контроль путчистов. Правительство смогло привлечь некоторые части на свою сторону, а также пыталось использовать рабочих Однако, и само правительство и сейм вовсе не были едины. Поняв, что дальнейшее сопротивление ведёт к гражданской войне действующий кабинет сложил свои полномочия."
 poland.184.a: "Новая страница в истории Польши"
 poland.185.t: "Конец партийной эпохи"
 poland.185.d: "В течении нескольких лет с момента провозглашения свободной Польши её сейм раздирали всевозможные разногласия. Польша была поглощена борьбой партий, в то время как враги окружали её со всех сторон. Даже такие прославленные лидеры как Пилсудский и Галлер не смогли направить политику государства по единому вектору.\n\nНаконец, наша партия смогла объединить сейм и завоевать твердое большинство. Это значит, что правительство теперь контролируется нами. Оппозиционные партии постепенно отходят в тень, а их влияние падает. В конце концов, демократия - это не театр. Кто-то должен взять руководство на себя."
 poland.185.a: "Да здравствует партия!"
 poland.186.t: "Судьба рабочих советов"
 poland.186.d: "Безвластие, рождённое уходом из Польши немецких гарнизонов и ликвидацией комендатур, стало отличной почвой для формирования рабочих и крестьянских советов на территории страны. Уже сейчас они берут на себя административные и хозяйственные функции, фактически являясь властью на местах в восточной и центральной частях Польши. Эти советы, организованные в основном представителями социал-демократии и ПСП, объединили под своей властью более полумиллиона рабочих и крестьян, а общая численность организаций перевалила за сотню. У нас есть информация о растущем влиянии левых радикалов в советах Варшавы, Плоцка, Замостья, Люблина и других городов. Эти радикалы наверняка намерены бороться за власть над всей страной и потому представляют угрозу для Польского государства. Если мы ничего не предпримем названные города станут очагами революции, однако немедленные и решительные действия так же опасны, ведь правительство рискует оттолкнуть от себя народные массы которые в основном настроенны на поддержку деятельности советов."
 poland.186.a: "Необходимо принять решительные меры"
 poland.186.b: "Советы будут ликвидированы постепенно"
 poland.187.t: "Борьба с "красной чумой""
 poland.187.d: "После того как правительство Польской Республики взяло курс на борьбу с большевистскими организациями по стране прокатилась волна арестов видных деятелей коммунистической партии и большевиков-активистов. Деятельность всякой организации ставившей своей целью революционную борьбу против Польского Государства была запрещена, имущество этих организаций арестовано, а члены заключены под стражу в польских тюрьмах. Местные власти с дозволения вышестоящих органов издали особые распоряжения по немедленному закрытию всех известных революционных газет и типографий. Рабочие советы в промышленных центрах страны и сельских регионах были разогнаны, а их председатели отправлены под суд. Массовые беспорядки вызванные подобными мерами были пресечены силами жандармерии и армии, а незаконные вооруженные формирования разгромлены в кратчайший срок. Сразу же после ликвидации всякой революционной активности в стране правительство начало распространение среди населения антикоммунистической пропаганды в виде листовок и статей в газетах, особый упор в деле разъяснения гражданам опасности большевизма был сделан в армейской среде и бюрократии."
 poland.187.a: "Гоните их из Польши!"
 poland.188.t: "Конец немецкой оккупации"
 poland.188.d: "Наконец, последний немецкий военный гарнизон был разоружён. По сообщениям газет, в объявленном «военном перевороте против оккупантов» участвовали более 16 тысяч человек. При разоружении немцев, проводившемся воинскими частями и населением, во время многочисленных инцидентов, стычек и перестрелок многие люди были ранены с обеих сторон, а также некоторые были убиты, а многие поляки получили тяжёлые ранения во время перестрелок в Муранове у Ковельского моста, когда немцы пытались защитить Цитадель. Были и случаи обстрела польских солдат сторонниками большевизма. Во время захвата оружия у немецкой армии польские военные власти вели переговоры с немецким советом солдат и рабочих в Варшаве. Польская армия захватила посты на мосту Кербедзь и на железнодорожном мосту . Ночью поляки захватили казармы на улице Нововейской, немецкую военную автомобильную часть на улице Ксёненца, конфисковав оружие и боеприпасы. Были также освобождены политические заключённые из тюрем Модлина и Варшавы.\nУтром заместитель председателя временного правительства Владислав Врублевский, немецкие комиссары, граф Лерхефельд, советник Жихлинский, граф Хуттен-Чапски выступил с заявлением, в котором сообщалось, что вся администрация оккупированной территории была передана польским властям. В Варшаве были захвачены Цитадель, железная дорога, судоходство, городская милиция, почта, трамваи. Немецкие суды прекратили свою деятельность. В середине дня польские войска захватили гауптвахту на площади Саски и Губернаторский дворец, где раньше находилась немецкая администрация. Немецкие таблички и знаки исчезли со зданий, появились польские цвета и национальные символы. Последний поезд с немецкими официальными лицами и военными отправился из Варшавы. "
 poland.188.a: "Единая Польша возрождается!"
 poland.189.t: "Чехословацкая Республика отказывает"
 poland.189.d: "Положение, сложившееся на территориях Чехословакии, где проживает польская национальная группа. И последовавшая дипломатическая переписка была попыткой склонить Чехов к мирному решению. Но не смотря на возможность мирного решения конфликта, правительство Томаша Масарика приняло решение отказать, и не принимать наши условия. Чешская сторона построила свою аргументацию на исторических, экономических и стратегических соображениях. На корню отрицая возможность передачи этого региона в наши руки. Окончательное решение, остается за нами."
 poland.189.a: "Мы освободим Тешинских поляков!"
 poland.189.b: "В данный момент у нас есть дела и поважнее"
 poland.190.t: "Чехословацкая Республика принимают условия"
 poland.190.d: "Учитывая драматическое и угрожающее положение в Тешинском районе Силезии, наше правительство выдвинуло требование о немедленной территориальной уступки региона или же, проведения плебисцита. Чехи, скорбно учитывая  преимущественно польскую этническую принадлежность населения, и риск с возможным военным исходом конфликта, не решилось разгорать конфликт. С давлением западных держав, надеясь утолить польские аппетиты, согласились с польской стороной о необходимости провести самый мирный вариант, проведение плебисцита. Чехословацкая сторона, не решилась возражать."
 poland.190.de: "Учитывая драматическое и угрожающее положение в Тешинском районе Силезии, наше правительство выдвинуло требование о немедленной территориальной уступки региона и удовлетворения всех польских претензий. Чехи, учитывая  преимущественно польскую этническую принадлежность населения, и риск с возможным военным исходом конфликта, решило удовлетворить наши требования, тем самым закончив возможное разгорание конфликта."
 poland.190.a: "Разумное решение"
 poland.191.t: "Победа в конфликте"
 poland.191.d: "Победа! Враг разбит и больше не в силах противодействовать нам, мы выполнили наши задачи, и мы показали им, кто здесь лучший. Эта победа — результат единства, дисциплины и решимости наших войск, а также мудрого руководства, которое направляло каждого бойца к общей цели."
 poland.191.a: "Несладко им пришлось"
 poland.192.t: "Поражение в конфликте"
 poland.192.d: "Мы не смогли сдержать натиск врага, его силы превзошли наши, и мы не смогли отстоять то, что нам оказалось дорого. Несмотря на проявленную храбрость и самоотверженность наших солдат, обстоятельства сложились против нас, и враг достиг поставленных целей."
 poland.192.a: "Мы еще вернёмся"
 
 poland.193.t: "Логистические затруднения"
 poland.193.d: "Продвижение польских войск все дальше на Восток породило ранее не существовавшие проблемы с армейской логистикой. Фронт слишком сильно отдалился от основных баз снабжения, из-за чего перемещение резервных частей и пополнений может занимать недели, даже при использовании железных дорог. Проблема подвоза боеприпасов на передовую сказывается на боевой эффективности польских солдат которые все чаще и чаще вынуждены рисковать и добывать все необходимое у противника и местного населения. Так же были дестабилизированы поставки продовольствия в части, нехватка которого уже стала поводом для ряда конфликтов между офицерами и солдатами, а так же между армией и гражданским населением. В итоге работа квартирмейстеров серьезно осложнена необходимостью жертвовать подвозом одних грузов в пользу других. Это не позволяет армии оперативно накапливать силы на необходимых участках фронта и соответственно играет на руку русским."
 poland.193.a: "Медлить с решением недопустимо."
 poland.194.t: "Нарастающая крестьянская партизанщина"
 poland.194.d: "Боевые действия в Беларуси и Украине вызвали массу разрушений и стали причиной страшнейших лишений для мирного населения. Инфляция и реквизиции имущества неизбежно вызвали обнищание в городах и деревнях, которое стало благодатной почвой для роста бандитизма и партизанщины. Вчерашние пахари и фабричные рабочие, распропагандированые большевиками, получают оружие от подпольных ячеек РКП (б) и уходят партизанить в леса. Они пускают под откос поезда, повреждают дороги и мосты, атакают польские патрули и нападают на служащих оккупационной администрации. Все это вынуждает руководство республики снимать с фронта полки для проведения карательных операций, каковые негативно сказываются на репутацию правительства и армии в глазах местного населения."
 poland.194.a: "Уберем их под корень"
 poland.195.t: "Атака на дороги"
 poland.195.d: "Новости о взятии бандами станций и захвате поездов приходят слишком часто. Нормальное движение без военной охраны стало проблемой. А железные дороги в следствии постоянных атак от крестьянских партизан, не обслуживаются должным образом. Также стоит учитывать, что партизаны для своих акций активно используют взрывчатку и не брезгают пустить красного петуха."
 poland.195.a: "Серьезная угроза."
 poland.196.t: "Атака на дороги"
 poland.196.d: "Новости о взятии бандами станций и захвате поездов приходят часто. Несмотря на тыловые подразделения, атаки на станции не с стороны крестьянских партизан, не утизают. А железные дороги в следствии постоянных атак от них, не обслуживаются должным образом. Также стоит учитывать, что партизаны для своих акций активно используют взрывчатку и не брезгают пустить красного петуха."
 poland.196.a: "Тыловые войска с этим разберутся"
 poland.197.t: "Польская угроза"
 poland.197.d: "Результатом военной кампании на Западе стало падение двух крупнейших городов в регионе - Киева и Минска. Измотанная революционная армия постепенно отходит все дальше на Восток к Днепру. Это поражение серьезнейшим образом сказалось на боеспособности армии: войска измотаны и им требуется отдых, ощущается острая нехватка пополнений, многие дивизии насчитывают лишь половину от необходимого состава, большое количество военного имущества потеряно, уничтожено или изношено и требует замены. Но самое губительное это отсутствие воли к победе. Моральный дух красноармейцев упал, им требуется символ который сможет мотивировать их продолжить борьбу и начать контрнаступление с целью освободить страну от иностранных захватчиков."
 poland.197.a: "Смерть ясновельможным панам!"
 poland.198.t: "Советская угроза"
 poland.198.d: "Наше мнение о большевиках оказалось ложным и не отражало реального положения дел. Несмотря на годы войны и противостояния в ходе гражданской войны, мы были убеждены, что при поддержке стран Антанты сильная и хорошо оснащённая польская армия сможет справиться с ослабленной Красной армией. Первоначально так и было, но всё более усиливающаяся Красная армия сумела реорганизоваться и в решающий момент отбить наши атаки.\n\nТщеславие и гордыня, подкреплённые идеями о великой Польше, затуманили наше трезвое восприятие происходящего. В итоге мы сами довели страну до положения, при котором позволили красноармейцам ступить на нашу родную землю — ту свободу, о которой мы так долго мечтали, теперь вновь нужно защищать.\n\nОднако ничего не потеряно, пока с нами наша армия и солдаты способны держать оружие — войско польское не отступит! А эйфория большевиков от временного успеха будет разбита под финальным натиском польской армии. И это единственный наш шанс отстоять независимость. Другой возможности больше не предвидится."
 poland.198.a: "— Ещё Польша не погибла!"
 poland.199.t: "Нарастающая крестьянская партизанщина"
 poland.199.d: "Боевые действия в Беларуси и Украине для Польши вызвали массу разрушений и стали причиной страшнейших лишений для мирного населения. Инфляция и реквизиции имущества неизбежно вызвали обнищание в городах и деревнях, которое стало благодатной почвой для роста бандитизма и партизанщины. Вчерашние пахари и фабричные рабочие, распропагандированые большевиками, получают оружие от подпольных ячеек РКП (б) и уходят партизанить в леса. Они пускают под откос поезда, повреждают дороги и мосты, атакают польские патрули и нападают на служащих оккупационной администрации. Все это вынуждает руководство республики снимать с фронта полки для проведения карательных операций, каковые негативно сказываются на репутацию правительства и армии в глазах местного населения."
 poland.199.a: "Уберем их под корень"

 poland.200.t: "Аграрные трудности в Польше"
 poland.200.d: "Современная Польша является по большей части аграрным регионом. Крестьянство - основной класс Польши, однако, земли на всех не хватает, а возможности переезда в город ограничены. В таких условиях аграрный вопрос стал политически важным. \n\nМожно выделить несколько главных направлений. Первое - правые партии. Они в целом представляли интересы помещиков и выступали за сохранение крупного землевладения и частичное наделение крестьян землей за денежную компенсацию бывшим владельцам. Второе - крестьянские партии, пропагандировавшие наделение крестьян землей в как можно большем масштабе и по низкой цене. Третье направление, коммунисты, поддерживало идею аграрных преобразований с ликвидацией помещичьего землевладения, бесплатной передачей конфискованной земли крестьянам и в дальнейшей перспективе - коллективизацией сельского хозяйства. "
 poland.200.a: "Нужно поддержать крупные и прибыльные хозяйства"
 poland.200.b: "Пора переходить к умеренной парцелляции"
 poland.200.c: "Поддерживаем бесплатную и полную передачу земли"
 poland.201.t: "Переезд крестьян в город"
 poland.201.d: "Села переполнены лишними ртами. Крестьянские дети, ещё не успевшие ничего заработать самим своим присутствием сокращают прибыли мелких хозяйств. Мы не можем делить землю вечно доходя до самых мелких и невнятных отрезков. Правительство справедливо решило сделать ставку на сильные хозяйства. Однако, в таком случае куда деть всех этих бедняков? Ответ очевиден: в город, на фабрики и заводы, а также в армию. Единственный вопрос: хватит ли рабочих мест. Ведь если нет, то все сельские маргиналы просто станут городским отребьем."
 poland.201.a: "Мы будем спонсировать эту программу насколько возможно"
 poland.202.t: "Варианты коллективизации"
 poland.202.d: "Дискуссии в правительстве и Сейме привели нас в конце концов к идее коллективизации сельского хозяйства. Отныне всей землёй сразу будет владеть одна единица, некое коллективное хозяйство, добровольное или государственное. Частное землевладение будет максимально ограничиваться. В этом свете обсуждаются два проекта: централизованной коллективизации сверху, или же более либеральной кооперации сельхоз угодий. Во втором случае у крестьян останется некоторая свобода самостоятельно входить и выходит из подобных организаций, правда уже без земли."
 poland.202.a: "Коллективизация означает полное упразднение частной собственности"
 poland.202.b: "Кооперативное землевладение более мягкая система"




 poland.203.t: "Русский синдром"
 poland.203.d: "Польско-российские отношения с давних времен не отличались особой дружелюбностью: на протяжении веков они боролись по самым различным причинам. С началом двадцатого века и возможностью получения независимости Польша незамедлительно использовала эти обстоятельства. Формирующаяся белая армия на юге в основном представляла собой движение идеалистов, стремящихся сохранить прежний порядок жизни. Как и их территориальные амбиции, пусть никто в белом движении и не верит в возвращение бывшей Польши, остаются опасения, что при падении большевистской власти белые армии могут повести свои войска и в сторону Варшавы. Это было бы очевидно, губительно для всей польской идеи о самостоятельном и сильном государстве.\n\nОпасность исходила одновременно от двух совершенно разных России — коммунистической и её прямых противников, белогвардейцев и прочих. Оставаться нейтральными в вопросе о будущем послевоенной России было бы недопустимо, так как исход этого противостояния напрямую связан и с судьбой Польши.\n\nПоддержка Белых и их дальнейшее теоретическое признание могли бы оправдать всю законность нашего существования, а также укрепить наши отношения с западными державами, которые могли бы поспособствовать принятию решения о нашем признании и обещать неприкосновенность границ с стороны будущей законной властью России. Вопрос лишь в том, о каких границах идет речь. Предложенная ранее демаркационная линия между Польшей и Россией, предложенная министром иностранных дел Великобритании лордом Джорджем Кёрзоном, вовсе не отражает всех надежд польского руководства и их желаний. В частности, тех, кто хочет видеть Польшу не ограниченной только территориями вокруг Гродно, Бреста и Львова.\n\nПрямая поддержка коммунистической России и большевиков, несмотря на сложности, возможность для них — лишь бы разобраться с набирающими силу контрреволюционными силами по всей стране. Хоть прямая поддержка не представляется возможным, в мыслях всех поддерживающих нас стран, надеющихся что Польша станет опорой антибольшевистской борьбы и препятствием для проникновения большевиков и революционных идей в Европу. Поэтому необходимо учитывать все приоритеты: потерю всех приобретений — и даже больше — вплоть до полного лишения суверенитета.\n\nПринятое нами решение определит дальнейшее направление развития. Сделка, которую нам предстоит заключить, будет напоминать соглашение с «чёртом» или «дьяволом»."
 poland.203.a: "Мы доверимся белым силам, и будем надеяться, что такой жест, будет учтен ими"
 poland.203.b: "Угроза возникшая от русских империалистов, слишком велика, чтоб надеется на их признание"
 poland.203.c: "Белые империалисты должны быть разбиты, а крестьяне и рабочий пролетариат — объединяться!"
 poland.204.t: "Поляки идут на связь"
 poland.204.d: "Возрожденное польское государство с момента своего появления находилось на перекрёстке двух разваливающихся империй и уже тогда проявляло свои желания и аппетиты, которые не ограничивались лишь территориями с преобладающим польским населением. Польские амбиции охватывали все территории Речи Посполитой и даже больше. Несмотря на опасности со стороны польских националистов во главе, оно оставалось оплотом антибольшевизма в Восточной Европе, что отвлекало многочисленные силы Красной России с других фронтов и играло важную роль в нашем противостоянии с бандитами-революционерами.\n\nНесмотря на сложности, в Таганроге по инициативе польской стороны начались переговоры между лидером Добровольческой армии и польскими представителями. В ходе переговоров Карницкому было дано указание настаивать перед командованием Юга на границах «Великой Польши», охватывающих Курляндию с Балтийским побережьем, Литву, Белоруссию и Волынь. Хотя такие высказывания воспринимались как неуместные, в разговоре с [ROOT.GetLeader] глава польской военной миссии был не столь категоричен и интересовался его мнением о судьбе «земель польского расселения», которые на специальной карте были отмечены густыми черными точками и простирались далеко на восток — к Киеву и Одессе.\n\nВ то же время [ROOT.GetLeader] указывал Карницкому на крайнюю необходимость в обоюдных интересах — немедленном наступлении восточной польской армии до линии Верхнего Днепра. При этом разграничительная линия между польской и русской армиями должна была быть определена на основе стратегических соображений. Поскольку поляки готовы к сотрудничеству, от них ожидается соблюдение общих интересов, прежде всего — борьбы с большевистской Россией и восстановлении прежнего порядка."
 poland.204.de: "Польское государство, появившееся на руинах бывших империй, быстро начало разрастаться: оскалив клыки, оно посягнуло и на восточные границы, проявляя аппетиты, которые не знали предела. Тем не менее, оно стало серьёзной угрозой: развивая свои успехи, Польша угрожает захватом всех территорий Беларуси и Украины. Даже не учитывая этого, добровольческие формирования в Кубани и на юге России остаются в приоритете. Концентрация сил на столь многочисленных фронтах вызывает серьезные опасения и даже возможность полного подавления всей большевистской России, что означало бы крах революции.\n\nОднако у поляков не было полной уверенности, что при таком исходе событий восстановленная империя не повернёт своих войск уже в сторону Варшавы. Учитывая лишь это, а также нежелание терять захваченные территории и большие амбиции, секретная делегация прибыла в Москву с обещанием не продвигать польские войска за определённый рубеж. Это позволило бы большевикам перебросить силы с советско-польского фронта на «красно-белый» фронт для борьбы с Добровольческой армией. Белые были бы остановлены, а Советская власть — сохранена."
 poland.204.a: "На сотрудничество мы готовы, но не на признание всех амбиций."
 poland.204.b: "Разгромить белых — наша первоначальная задача."
 poland.204.c: "Сотрудничество с польскими панами недопустимо"
 poland.205.t: "Добровольческая армия готова к общей борьбе"
 poland.205.d: "Несмотря на имеющиеся сложности, в Таганроге начались переговоры [RVA.GetLeader] с польскими представителями. В ходе этих переговоров Карницкому были даны инструкции настаивать перед командованием Юга на границах «Великой Польши», охватывающих Курляндию с Балтийским побережьем, Литву, Белоруссию и Волынь. Нашлись те, кто предостерегал А. Карницкого от предъявления столь неумеренных требований.\n\nОднако в разговоре с [RVA.GetLeader] глава польской военной миссии — «не был так категоричен и интересовался его взглядами на судьбу „земель польского расселения“», которые на специальной карте были густо закрашены черными точками и простирались далеко на восток — к Киеву и Одессе. Командующий Вооружёнными силами Юга России указывал на несвоевременность окончательного решения вопроса и настаивал на сохранении «временной границы» до разрешения судьбы приграничных земель совместно польской и будущей общерусской властью.\n\nРечь шла о временной пограничной линии между Советской Россией и Польшей, которую, как мы уже видели, утвердил Верховный Совет Парижской мирной конференции. Причём [RVA.GetLeader] не возражал против продвижения польских войск на восток от этой линии при условии установки на данной территории русской администрации, которая, однако, в течение всего времени проведения военных действий должна была подчиняться польскому верховному командованию.\n\nНесмотря на все противоречия, соглашения были подписаны, может быть, и не на тех условиях, на которых рассчитывало наше правительство. Но факт заключения формального союза налицо, а значит, совместные польско-российские силы должны нанести решительный удар по большевикам в Москве."
 poland.205.a: "Вместе, против большевизма!"
 poland.206.t: "Советская россия готова на секретное перемирие"
 poland.206.d: "Советское правительство предполагало, что комбинированное наступление польских войск и Добровольческой армии будет гибельным для Советской России. Учитывая эту горькую реальность, Советское правительство командировало к Временному начальнику Польского государства — [POL.GetLeader], а также к члену ЦИК — Ю. Мархлевскому, который якобы убедил [POL.GetLeader] в «общности интересов большевиков и поляков» перед лицом «опасности» в лице Добровольческой армии и «добился приостановки польского наступления», чтобы оно было разгромлено. В результате было подписано секретное перемирие — то есть прекращение любых боевых действий на определённый срок.\n\nСоветское правительство, же, «с радостью приняло предложение [POL.GetLeader]», дав по его требованию заверение, что «тайна будет сохранена нерушимо». В связи с этим, факт соглашения заставлял [POL.GetLeader] скрываться от своей ставки, отправив к нему польскую миссию для проведения фиктивных переговоров. Он продолжал скрываться и от Англии и Франции — стран, оказывававших политическую и материальную помощь Польше, вовсе не в качестве пособницы большевиков и большевизма."
 poland.206.a: "Избавившись от империалистов, мы займемся коммунистами в одиночку"
 poland.207.t: "Русские против сотрудничества"
 poland.207.d: "Генерал-майор Герберт Кэмпбелл Хольман — начальник английской миссии при правительстве Деникина. Он трижды бывал у генерала Карницкого и договорился о встрече. В рапорте В. Вайды об этой встрече говорится следующее: «Встреча состоялась. Присутствовали генерал Карницкий, поручик Михальский, господин Скомпский, Деникин, начальник штаба, заместитель начальника штаба и Анатолий Анатольевич Нератов. Англичан не было. Атмосфера была напряженной. А. Деникин спросил, зачем мы прибыли. Генерал Карницкий ответил: ‚Нас пригласили‘. Тогда А. Деникин изложил всю суть: что Добровольческая армия не готова признать национальные претензии со стороны поляков и не собирается способствовать её расширению путём передачи территорий Беларуси и Украины».\n\nНо ещё ранее, на тех же переговорах, Деникин указывал Карницкому на крайнюю необходимость — в обоюдных интересах — немедленного наступления восточной польской армии до линии Верхнего Днепра. При этом разграничительная линия между польской и русской армиями определялась бы на основании стратегических соображений. Однако, не увидев отклика со стороны Польши и понимая абсурдность границ «Великой Польши», о которых ему заявляли — охватывающих Курляндию с Балтийским побережьем, Литву, Белоруссию и Волынь — он был не готов к этому."
 poland.207.de: "Условия, поставленные Пилсудским, и ответ, полученный от большевиков, явно указывают на то, что о настоящем мире или краткосрочном перемирии говорить не приходится. Для Пилсудского обязательным условием, при котором могло бы быть подписано мирное соглашение, было согласие Совета Советов на создание независимой, несоветской Украины. Это условие Ленин назвал просто «криминальным». Большевики были готовы пойти на аннексионный вариант польских претензий на востоке. Большая часть Литвы и Белоруссии, а также Западная Украина могли быть отданы «панской Польше», но ни в коем случае большевики не склонны были отказаться от контроля над всей Украиной, обладающей важным экономическим и стратегическим значением. В этом ключевом пункте они были такими же непреклонными защитниками основ унаследованной ими империи, как Колчак и Врангель.\n\nКроме того, Советская Россия четко дала понять, что способна справиться со всеми своими противниками. Она не собирается давать время на организацию предполагаемого наступления, которое обязательно возникло бы у поляков в случае перемирия, — времени, необходимого для подготовки их сил."
 poland.207.a: "Польша останется одна, и разгромит всех врагов своих"
 poland.207.b: "Если они не захотели сотрудничать с нами, мы обратимся к их противникам"
 poland.208.t: "Поляки предлагают объединиться"
 poland.208.d: "Приход польских социалистов открыл новые возможности. Левые фракции, сменившие прежнее польское правительство, придерживаются совершенно иных взглядов на будущее страны. По их мнению, война, ведущаяся ради польских имперских амбиций, больше не является разумной. Гораздо больше внимания они уделяют продвижению идеи развития мирового социализма и поддержке рабоче-крестьянского пролетариата в других странах. В этом мы с ними до боли похожи.\n\nПоэтому польские социалисты выдвинули предложение о прекращении дальнейшей войны за прежние интересы, которые утратили свою актуальность. Напротив, они предлагают объединиться ради общей цели — воплощения своих идей по распространению социализма во всём мире."
 poland.208.a: "Вместе, к разгрому контрреволюции!"
 poland.208.b: "Сотрудничество с польскими социалистами недопустимо"
 poland.209.t: "Советская россия готова объединить силы"
 poland.209.d: "Идущая война с Советской Россией утратила свой изначальный смысл. Начавшее войну прежнее польское правительство преследовало лишь империалистические цели — построение Великой Польши с обширными территориями на востоке, которые, как они полагали, должны были достаться Польше в ходе войны против РСФСР. Однако очевидно, что это не принесёт ничего хорошего нашим странам, а лишь породит взаимную неприязнь и обиду.\n\nНовое социалистическое правительство Польши посчитало неразумным продолжать войну ради прошлых интересов и, напротив, решило объединиться с коммунистическими товарищами в Москве. Совместная поддержка движения и идей принесёт гораздо больше пользы для развития мирового социализма, который можно будет продвигать и в других странах, нежели бессмысленное взаимное уничтожение.\n\nРоссийские большевики оценили такой подход и дали старт построению дружеских отношений между нашими народами."
 poland.209.a: "Вместе, к разгрому контрреволюции!"
 poland.210.t: "Переговоры с Савинковым, и формирование Русского комитета"
 poland.210.d: "Начало наступления польских войск на Украину было болезненно воспринято большинством русских антисоветских сил. Происшедшее воспринималось как проявление зарождающегося польского империализма. Единственным крупным антибольшевистским деятелем, готовым сотрудничать с Польшей, оказался Б. В. Савинков. Не веривший в успех Добровольческой армии и продолжающий сопротивление на Юге России, он считал, что победить большевиков можно только опираясь на восставшее крестьянство и при помощи новых государств, возникших на обломках Российской империи. В отличие от «белых», для которых территориальная целостность России была непререкаемым догматом, Савинков допускал существование национальных государственных образований на западных окраинах империи: «Его согласие с территориальными претензиями Польши следует рассматривать как плату за помощь в борьбе с большевизмом».\n\nНа сегодняшней встрече Б. В. Савинков договорился с главой Польши [POL.GetLeader] о создании русского политического центра в Польше. Деятельность РПК должна была оставаться в секрете до выхода сформированных им войск на фронт, что объяснялось опасениями негативной реакции со стороны левых кругов Польши. Фактически, РПК представлял собой независимый от «белого» правительства [RVA.GetLeader] центр антисоветской борьбы, ориентированный на Польшу и ведущий работу по антибольшевистской деятельности на территории Польского государства."
 poland.210.a: "Мы готовы поддержать Савинкова"
 poland.211.t: "Содействие генералу Бредову"
 poland.211.d: "В тот момент, когда красные начали побеждать белых повсюду, Киевская группа войск генерала Бредова отступила. Вместе с войсками, значительно замедляя их продвижение, отступал огромный обоз беженцев — тех, кто не желал оставаться «под большевиками». Позже отряды Бредова достигли Тирасполя. На другом берегу Днестра начиналась Бессарабия — ещё два года назад это была русская губерния, а теперь — аннексированная Румынией.\n\nСразу выяснилось: никаких переговоров с румынским руководством о пропуске русских в Бессарабию англичане не вели, и румыны не собирались никого впускать. Чтобы предотвратить попытки перейти замёрзший Днестр, румыны даже специально взорвали и разбили весь лёд, а на бессарабском берегу демонстративно установили пулемёты. Обещанных складов с продовольствием в Тирасполе не было, а местные жители отвергали попытки расплатиться за еду, выданную в Одессе украинскими карбованцами.\n\nНа военном совете офицеры Бредова выступали за то, чтобы форсировать Днестр, а в случае открытия румынами огня — отвечать силой. Но Бредов отказался от этого решения, и вместе со своим начальником штаба Б. А. Штейфоном он проложил путь в Польшу, находившуюся в состоянии войны с большевиками.\n\n[GetDateText] года армия Бредова наконец смогла соединиться с польскими войсками. Поляки приняли их достаточно хорошо — как союзников, на которых можно было бы переложить часть борьбы с большевиками. За 14 дней группа прошла около 400 верст, в жесткую и суровую пору, везя с собой до двух тысяч раненых и больных, а также несколько тысяч беженцев."
 poland.211.a: "Русских дух не перестает удивлять"
 poland.212.t: "Казацкие формирования в Польше"
 poland.212.d: "Штаб русских войск Бориса Савинкова предусматривал создание Уральских казачьих полков, кавалерийского полка из казачьих отрядов Яковлева и Сальникова, а также отдельного Донского полка есаула Фролова. Все эти части вместе с русскими полками должны были прорвать южный фронт с большевиками и выйти в тыл их войск. Однако что-то пошло не так. Громкая боевая слава бригады Яковлева привлекла поток новых казаков-добровольцев, что позволило к осени увеличить её численность до полутора тысяч бойцов. Польское командование традиционно уважало доблесть, особенно столь яркую и живописную. Оно начало покровительствовать Вадиму Яковлеву, более щедро выделяя ему вооружение, коней, снаряжение и боевые материалы.\n\nВ то же время, укрепляя свои полки, есаул был вынужден отчаянно маневрировать на политическом фронте, стараясь сохранить приверженность своей бригады идеям казачьей самостийности. Для этого ему пришлось отказаться от сотрудничества с Борисом Савинковым, возглавлявшим «Русский политический комитет», что, разумеется, было воспринято этим комитетом с особым недоумением. Очевидно, что стороны не придут к единому решению, и в этом противоречии необходимо вмешательство и окончание конфликта нашим окончательным словом."
 poland.212.a: "Любые формирования должны оставаться едины"
 poland.212.b: "Разумным решением будет оставить их"
 poland.213.t: "Встреча Савинкого и главы Польши"
 poland.213.d: "В Варшаве состоялась встреча Б.В. Савинкова и Н.В. Чайковского с [POL.GetLeader]. Ход и результаты этой трёхсторонней беседы Борис Савинков подробно описал в письме князю Г.Е. Львову, которое было отправлено на следующий день после встречи. По словам Савинкова, [POL.GetLeader] принял их «чрезвычайно любезно, как старых товарищей по революционной работе при царе». Савинков пришёл к выводу, что лидер польского государства понимает: «единственная возможность польского похода против большевиков заключается в совместной борьбе с русскими анти-большевистскими силами, и этим силам необходимо предоставить территорию для формирования правительства и войск».\n\nВопрос о том, «чего же ожидает Польша взамен своей помощи», был пока отложен. [POL.GetLeader] лишь вскользь отметил необходимость «самоограничений». Савинков и Чайковский ответили, что «самоограничения необходимы с обеих сторон, однако бывают ситуации, когда остаётся лишь умереть»."
 poland.213.a: "Все еще впереди"
 poland.214.t: "Амбиции Польского реваншизма"
 poland.214.d: "Особенностью отношений Польши к «белым» правительствам во время Гражданской войны в России было стремление добиться их согласия на расширение её границ на восток. В то же время русские политические деятели, как на Юге России, так и в эмиграции, не могли согласиться на любые изменения границ страны без формальной санкции будущего представительного органа. Это создавал препятствия для развития военного сотрудничества между польскими и «белыми» вооружёнными силами в борьбе против советской власти.\n\nПри этом отдельные русские политики, в первую очередь Б.В. Савинков, были готовы к сотрудничеству с Польшей и, ради этого, соглашались признать любые территориальные претензии польской стороны. Эти политики действовали в рамках подходов, где различные инициативные группы могли брать на себя ответственность за управление частью территории и создавать собственные вооружённые силы.\n\nНепрерывные переговоры Бориса Савинкова и Н.В. Чайковского с руководством польского государства сводились к ряду условий, при выполнении которых стороны могли бы прийти к согласию. Так, для успеха неизбежной войны между Польшей и большевиками было бы необходимо «соглашение между Польшей и демократической Россией, стремящейся бороться против большевиков». Такое соглашение могло состояться «только при условии отказа обеих сторон от права завоевания и признания принципа народного самоопределения», причем «спорные территории должны быть подвергнуты плебисциту», который проводился бы с соблюдением ряда гарантий и только «после того, как в Москве установится прочное демократическое правительство». В заключение переговоров звучало обещание: «В случае утверждения этих условий соответствующими русскими структурами, [POL.GetLeader] надеется соединёнными силами двинуться на Москву»."
 poland.214.a: "Мы не вправе единолично принимать это решение"
 poland.214.b: "Ради победы над большевиками — мы готовы"
 poland.215.t: "[RVA.GetLeader] не идет на уступки"
 poland.215.d: "Особенностью отношений Польши к «белым» правительствам во время Гражданской войны в России было стремление добиться их согласия на расширение её границ на восток. В то же время русские политические деятели, как на Юге России, так и в эмиграции, не могли согласиться на любые изменения границ страны без формальной санкции будущего представительного органа. Это создавал препятствия для развития военного сотрудничества между польскими и «белыми» вооружёнными силами в борьбе против советской власти.\n\nПри этом отдельные русские политики, в первую очередь Б.В. Савинков, были готовы к сотрудничеству с Польшей и, ради этого, соглашались признать любые территориальные претензии польской стороны. Эти политики действовали в рамках подходов, где различные инициативные группы могли брать на себя ответственность за управление частью территории и создавать собственные вооружённые силы.\n\nНепрерывные переговоры Бориса Савинкова и Н.В. Чайковского с руководством польского государства сводились к ряду условий, при выполнении которых стороны могли бы прийти к согласию. Так, для успеха неизбежной войны между Польшей и большевиками было бы необходимо «соглашение между Польшей и демократической Россией, стремящейся бороться против большевиков». Такое соглашение могло состояться «только при условии отказа обеих сторон от права завоевания и признания принципа народного самоопределения», причем «спорные территории должны быть подвергнуты плебисциту», который проводился бы с соблюдением ряда гарантий и только «после того, как в Москве установится прочное демократическое правительство». В заключение переговоров звучало обещание: «В случае утверждения этих условий соответствующими русскими структурами, [POL.GetLeader] надеется соединёнными силами двинуться на Москву».\n\nОднако, поездка к [RVA.GetLeader], не увенчалась успехом. Как выразился [RVA.GetLeader], он не даст своего согласия на союз с Польшей, Финляндией или другими отдельными народностями», о национальных польских притензиях, говорить после этого не приходится."
 poland.215.a: "Это не может не удручать"
 poland.215.b: "Это нож в спину с их стороны, у этого только одно решение..."
 poland.216.t: "[RVA.GetLeader] идет на соглашение"
 poland.216.d: "Особенностью отношений Польши к «белым» правительствам во время Гражданской войны в России было стремление добиться их согласия на расширение её границ на восток. В то же время русские политические деятели, как на Юге России, так и в эмиграции, не могли согласиться на любые изменения границ страны без формальной санкции будущего представительного органа. Это создавал препятствия для развития военного сотрудничества между польскими и «белыми» вооружёнными силами в борьбе против советской власти.\n\nПри этом отдельные русские политики, в первую очередь Б.В. Савинков, были готовы к сотрудничеству с Польшей и, ради этого, соглашались признать любые территориальные претензии польской стороны. Эти политики действовали в рамках подходов, где различные инициативные группы могли брать на себя ответственность за управление частью территории и создавать собственные вооружённые силы.\n\nНепрерывные переговоры Бориса Савинкова и Н.В. Чайковского с руководством польского государства сводились к ряду условий, при выполнении которых стороны могли бы прийти к согласию. Так, для успеха неизбежной войны между Польшей и большевиками было бы необходимо «соглашение между Польшей и демократической Россией, стремящейся бороться против большевиков». Такое соглашение могло состояться «только при условии отказа обеих сторон от права завоевания и признания принципа народного самоопределения», причем «спорные территории должны быть подвергнуты плебисциту», который проводился бы с соблюдением ряда гарантий и только «после того, как в Москве установится прочное демократическое правительство». В заключение переговоров звучало обещание: «В случае утверждения этих условий соответствующими русскими структурами, [POL.GetLeader] надеется соединёнными силами двинуться на Москву».\n\nПоездка к [RVA.GetLeader], стало историческим событием. Как выразился [RVA.GetLeader], он готов пойти на уступки и заключение более тесного союза с Польшей, учитывая её территориальные претензии, но учтя что итоговые границы с демократическим правительством России должна будет установится после войны и окончательной победы."
 poland.216.a: "— Готовьте силы, мы выдвигаемся на Москву"
 poland.217.t: "Генерал Булак-Балахович движется в Беларусь"
 poland.217.d: "Станислав Никодимович Балахович родился в 1883 году в крестьянской католической семье на литовско-белорусской границе. Предпочтя агрономические курсы и должность управляющего одним из помещичьих имений, он отказался от карьеры священника и обучения в духовной семинарии, к которой его собирались направить. Вместе с братом Юзефом он добровольно отправился на фронт, где командовал эскадроном в партизанском отряде. В 1918 году Балахович возглавил кавалерийский полк Красной армии и участвовал в подавлении крестьянских восстаний. Позже он вместе с полком перешёл на сторону белых. Однако главнокомандующий Северо-западной армии объявил о роспуске своей армии, и атаману пришлось искать новую пристанище.\n\nРанее, присматриваясь к «международной ситуации» и новообразованиям на карте, Балахович обратил внимание на проходившую в Юрьеве конференцию представителей балтийских государств, Украины и Белоруссии. Именно там он познакомился с полковником К. Езовитовым — главой белорусской миссии. В тот момент «Белорусская Народная Республика» находилась в ещё более тяжелом положении, чем Украина: у неё не было серьёзных армий, значительной территории или крепкого «правительства». Внутри руководящих кругов «Республики» произошёл раскол, и образовались две «Рады», не признававшие друг друга. Понятно, что Езовитова не мог не заинтересовать Балахович, у которого уже было имя, небольшой, но преданный ему вооружённый отряд, хорошие отношения с эстонцами и, главное, — крайняя неопределённость ситуации, которая заставляла искать флаг для продолжения борьбы.\n\nВ свою очередь, Булак с готовностью откликнулся на предложение перейти на службу в «белорусские» ряды, заявив, что считает себя белорусом, и официально попросил принять его «для защиты единства и неделимости моей Отчизны». Так как у белорусского правительства тоже не было средств, обеспечение балаховцев, занявших боевой участок под Изборском между позициями эстонских и латвийских войск, взяли на себя эстонцы. «Особый Отряд БНР в Прибалтике» был переодет в форму эстонской армии. Планировалось затем движение в сторону Белорусского фронта."
 poland.217.a: "Не следует мешать их передвижению"
 poland.217.b: "Он не должен дойти до них"
 poland.218.t: "Вербовка Булака-Балаховича"
 poland.218.d: "С момента переговоров Балаховича и Езовитова не проходит и недели, как Езовитов обращается к «Начальнику Польского Государства» с просьбой «предоставить Особому Отряду БНР участок фронта на левом фланге Польской Армии и возложить на Польское интендантство обязанность обеспечивать его всем необходимым». Однако [POL.GetLeader] медлил с ответом, денег всё равно не было — по инициативе балаховцев Езовитову даже заказал в Латвии тираж почтовых марок, чтобы улучшить финансовое положение Отряда. Сам же «Батька», в атмосфере вынужденного бездействия, по характеристике Езовитова, был «дурэу i пию». Тем временем в Варшаве, по всей видимости, решили, что смогут договориться с Балаховичем без посредников — и [GetDateText] года Главное командование Польской Армии получило отчет о проведенной беседе. Генерал, произвысивший приятное впечатление на собеседников, с готовностью заявил, что считает себя поляком, но на всякий случай предупредил: если до конца месяца не будет принято решения о его принятии на польскую службу, он бросит 800 штыков Особого Отряда на Острове, Опочке, Полоцке, начав свою собственную игру. Решение было объявлено позже, а вскоре командующий участком фронта, один из близких соратников [POL.GetLeader], бригадный генерал Э. Рыдзь-Смиглый, уже с почестями встречал балаховцев."
 poland.218.a: "Балахович стал поляком, но... надолго ли?"
 poland.219.t: "Генерал Булак-Балахович движется в Беларусь"
 poland.219.d: "Станислав Никодимович Балахович родился в 1883 году в крестьянской католической семье на литовско-белорусской границе. Предпочтя агрономические курсы и должность управляющего одним из помещичьих имений, он отказался от карьеры священника и обучения в духовной семинарии, к которой его собирались направить. Вместе с братом Юзефом он добровольно отправился на фронт, где командовал эскадроном в партизанском отряде. В 1918 году Балахович возглавил кавалерийский полк Красной армии и участвовал в подавлении крестьянских восстаний. Позже он вместе с полком перешёл на сторону белых. Однако главнокомандующий Северо-западной армии объявил о роспуске своей армии, и атаману пришлось искать новую пристанище.\n\nРанее, присматриваясь к «международной ситуации» и новообразованиям на карте, Балахович обратил внимание на проходившую в Юрьеве конференцию представителей балтийских государств, Украины и Белоруссии. Именно там он познакомился с полковником К. Езовитовым — главой белорусской миссии. В тот момент «Белорусская Народная Республика» находилась в ещё более тяжелом положении, чем Украина: у неё не было серьёзных армий, значительной территории или крепкого «правительства в изгнании». Внутри руководящих кругов «Республики» произошёл раскол, и образовались две «Рады», не признававшие друг друга. Понятно, что Езовитова не мог не заинтересовать Балахович, у которого уже было имя, небольшой, но преданный ему вооружённый отряд, хорошие отношения с эстонцами и, главное, — крайняя неопределённость ситуации, которая заставляла искать флаг для продолжения борьбы.\n\nВ свою очередь, Булак с готовностью откликнулся на предложение перейти на службу в «белорусские» ряды, заявив, что считает себя белорусом, и официально попросил принять его «для защиты единства и неделимости моей Отчизны». Так как у белорусского правительства тоже не было средств, обеспечение балаховцев, занявших боевой участок под Изборском между позициями эстонских и латвийских войск, взяли на себя эстонцы. «Особый Отряд БНР в Прибалтике» был переодет в форму эстонской армии. Планировалось затем движение в сторону Белорусского фронта, для дальнейшей борьбы."
 poland.219.a: "Не следует мешать их передвижению"
 poland.219.b: "Без нас он пропадет"
 poland.220.t: "Балахович идет на контакт с РПК"
 poland.220.d: "В своей борьбе против большевиков Борис Савинков был готов сотрудничать с С. Н. Булак-Балаховичем, несмотря на все его отрицательные стороны и слухи, поскольку его отряды представляли настоящую силу. «По его мнению, — говорил он, — у меня есть выбор: либо заниматься «бормотанием» вместе с эмиграцией — то есть разговорами на разные более или менее возвышенные темы, — либо же вместе с Балаховичем действительно попытаться свалить большевиков». И, когда ему «указывали, что Балахович и его армия — это жулье, он возражал: "Может быть. Но что же мне делать, если благородные люди не желают бороться и сидят в парижских кафе, ругая тех, кто борется, и бормоча на возвышенные темы? Разве тот, кто действительно хочет бороться, ответит: я не могу, потому что мне не нравится то-то и то-то, тот-то и тот-то? Он просто засучит рукава и пойдет биться на той стороне, которую считает правой"».\n\nВ специальном соглашении, заключённом между РПК и Булак-Балаховичем, было оговорено, что, сохраняя самостоятельность как командир воинского формирования, последний признает политическую власть РПК. Савинков же «отлично знал, что в случае вопроса о власти фактически всё будет в его руках, а не у Балаховича».\n\nКак иронично вышло: недавно являвшиеся конкуренты по набору русских добровольцев — Балахович и Савинков — достигли соглашения. И на следующий день последний писал начальнику Польши: «Генерал Булак-Балахович выразил полную готовность в политическом отношении подчиниться моей группе русских политических деятелей с его отрядом во главе». Руководитель Комитета выражал удовлетворение тем, что «таким образом все русские формирования на территории Польской Республики объединены в моём лице»,— и этим опроверглось его же позднейшее утверждение о том, будто Балахович, в качестве командующего войсками, был рекомендован, а, возможно, и навязан ему главой Польши. Вопрос о его официальном поступлении на польскую службу был тем самым окончательно снят с дневного порядка."
 poland.220.a: "Надеемся он хорошо послужит комитету"
 poland.221.t: "Балахович идет в наступление"
 poland.221.d: "Русская Народная Добровольческая Армия, борющаяся против большевиков за свободу всех народов и за мир во всем мире, сегодня пересекла границу, установленную прелиминарным миром. Она покинула нейтральную зону между Польшей и Советской Россией и начала наступление.\n\nРанее, к моменту заключения предварительного договора о мире между РСФСР и Польшей, на территории, контролируемой последней, находился ряд различных образований. При этом договор предусматривал недопущение пребывания на территории РСФСР и Польши организаций, «ставящих своей целью вооружённую борьбу с другой стороной».\n\nВ этот момент особенно актуальной фигурой стал Борис Викторович Савинков — широко известный организатор «Союза защиты Родины и Свободы» и мятежей в Муроме и Ярославле в 1918 году. Он прибыл в Польшу с идеей «третьей России» — без большевиков и монархистов, а также с готовностью признать национальное самоопределение народов ради совместной борьбы с Советами.\n\n«…Мы отвергаем не только большевизм, царящий в советской России и являющийся новым самодержавием слева, но и любые реакционные попытки монархистов, стремящихся восстановить самодержавие справа», — утверждал Савинков.\n\nСавинкову были подчинены все русские воинские формирования на территории, контролируемой Польшей, где велась активная вербовка русских частей. Одной из них стала Русская Народная Добровольческая Армия под командованием Булак-Балаховича, которая, при поддержке Белорусского политического комитета, в настоящее время начинает свой собственный поход."
 poland.221.a: "Пожелаем ему удачи"
 poland.221.b: "Батька освободит Беларусь!"
 poland.222.t: "Русская армия в Польше идет в наступление"
 poland.222.d: "Русская Народная Добровольческая Армия, сражающаяся против большевиков за свободу всех народов и за мир во всем мире, сегодня пересекла границу, установленную прелиминарным миром. Она покинула нейтральную зону между Польшей и Советской Россией и перешла в наступление.\n\nРанее, на момент заключения предварительного мирного договора между РСФСР и Польшей, на территории, контролируемой последней, находился целый ряд различных образований. Договор предусматривал недопущение пребывания на территории РСФСР и Польши организаций, «ставящих своей целью вооружённую борьбу с другой стороной».\n\nИменно в этот момент на сцене появляется Борис Викторович Савинков — фигура широко известная как организатор «Союза защиты Родины и Свободы», а также мятежей в Муроме и Ярославле в 1918 году. Он прибыл в Польшу с идеей «третьей России» — без большевиков и монархистов, и с готовностью признать национальное самоопределение народов ради совместной борьбы с Советами.\n\n«…Мы отвергаем не только большевизм, господствующий в советской России и являющийся новым самодержавием слева, но также любые реакционные попытки монархистов, стремящихся восстановить самодержавие справа», — отмечал Савинков.\n\nВ ходе своей деятельности и принимаемых решений ему удалось собрать и объединить значительную часть русских добровольческих формирований, готовых освободить Россию от большевиков и стать новой силой в продолжающейся гражданской войне.\n\nА ныне, не имея возможности оставаться дальше в Польше, Борис Савинков принял окончательное решение — двигаться вглубь большевистских территорий."
 poland.222.a: "Пожелаем им удачи"
 poland.222.b: "Русская армия нанесет решающий удар!"
 poland.223.t: "Требование от Русской Добровольческой армии"
 poland.223.d: "К моменту заключения предварительного мирного договора между РСФСР и Польшей на территории, контролируемой последней, находился ряд различных формирований. Договор, однако, предусматривал недопущение пребывания на территории РСФСР и Польши организаций, «ставящих своей целью вооружённую борьбу с другой стороной». Одной из таких организаций являлась Русская Народная Добровольческая Армия, подчинённая Русскому политическому комитету.\n\nГлавными целями их похода были объединение белых армий на юге и нанесение удара по центру России через Беларусь. Однако белорусские земли находятся под нашим контролем, что препятствует дальнейшему продвижению Русской армии. В связи с этим они требуют от нас разрешения на свободное перемещение своих войск по нашей территории, чтобы перебросить армию на линию фронта."
 poland.223.a: "У нас нет возможности отказать"
 poland.223.b: "Ни одна армия не вправе переходить нашу границу"



 poland.224.t: "Решение о восточных землях"
 poland.224.d: "С самого начала на руинах трёх империй Польша стремилась стать новым региональным гегемоном, распространяя свои владения далеко за пределы территорий, населённых этнически польским населением. Осталось лишь определиться, каким методом и какой политикой она будет руководствоваться для построения своей гегемонии в Восточной Европе.\n\nВ польском обществе существовали в основном два мнения, которые включали разные видения дальнейшей политики.\n\nПервое из них — геостратегическая концепция междуморья. Главной целью было создать под верховенством Варшавы конфедерацию государств, расположенных между Чёрным, Адриатическим и Балтийским морями. Амбиции Польши в этом случае распространялись на Украину, Белоруссию, Литву, Латвию, Эстонию, Молдавию, Венгрию, Румынию, Югославию, Чехословакию и Финляндию. По плану, эта новая Речь Посполитая должна была доминировать в Восточной Европе и противостоять Германии и России.\n\nПротивоположной идеей было строительство более сильного и централизованного польского государства, которое, подобно великой Речи Посполитой, включало бы в свой состав земли Беларуси, Украины и Литвы. Попытка их «ополячивания» с целью создания единого и могущественного государства, способного тягаться с гигантами-соседями, и не уступить им в силе."
 poland.224.a: "Все приобретения должны быть в составе Польши"
 poland.224.b: "Каждый народ получит место в новом объединении"
 poland.225.t: "Концепция прометеизма"
 poland.225.d: "Хотя Рижский мир и позволил окончательно закрепить за Польшей некоторые территориальные приобретения, противоречия, конечно же, не исчезли. Варшава и Москва так и не смогли полностью решить свои претензии и взаимные желания. В Москве были уверены, что польское государство ждёт подходящего случая, чтобы вновь начать борьбу между двумя странами. Это, отчасти, не было безосновательным. Амбиции Варшавы не ограничивались междуморьем. Чтобы усилить свои позиции, был выдвинут политический проект «прометеизма», который ставил целью ослабление и расшечку Советского Союза посредством поддержки национал-сепаратистских движений и множества других групп. В этом случае Польша, подобно Прометею, несла бы людям огонь свободы, помогая угнетённым советской властью народам. Успех хотя бы одной из многих фракций мог бы гарантировать Польше значительные гарантии безопасности со стороны России."
 poland.225.a: "Русский медведь должен быть усмирен"


 poland.226.t: "Территориальная принадлежность Ковеля"
 poland.226.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Ковель, давно являвшийся острым предметом споров между польскими и украинскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемый Ковель."
 poland.226.a: "Он должен принадлежать лишь Польше"
 poland.226.b: "Стоит передать его Украине"
 poland.227.t: "Территориальная принадлежность Волыни"
 poland.227.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Волынь, давно являвшийся острым предметом споров между польскими и украинскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемая Волынь."
 poland.227.a: "Оставим его в составе Польши"
 poland.227.b: "Передадим его Украине"
 poland.228.t: "Территориальная принадлежность Галиции"
 poland.228.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Галиция, давно являвшийся острым предметом споров между польскими и украинскими политиками, желавшими заявить о законности своих прав на владение этим регионом. Что и не удивительно, ведь Галиция большое количество времени было местом соприкосновения Польских и Украинских претензий. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемая Галиция."
 poland.228.a: "Галиция это Польская земля"
 poland.228.b: "Украина вправе завладеть им"
 poland.228.c: "Передадим Украине лишь основную часть"
 poland.228.e: "Будет лучше разделить его"
 poland.229.t: "Территориальная принадлежность Бреста"
 poland.229.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Брест, давно являвшийся острым предметом споров между польскими, белорусскими и даже украинскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемый Брест."
 poland.229.a: "Брест должен оставаться в составе Польши"
 poland.229.b: "Беларусь вправе владеть им"
 poland.229.c: "Передадим его Украине"
 poland.230.t: "Территориальная принадлежность Восточного Полессья"
 poland.230.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Восточное Полессье, давно являвшийся острым предметом споров между польскими, украинскими и белорусскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемое Восточное Полессье."
 poland.230.a: "Оставим его за Беларусью"
 poland.230.b: "Лучше передать Украине"
 poland.231.t: "Территориальная принадлежность Западного Полессья"
 poland.231.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Западное Полессье, давно являвшийся острым предметом споров между польскими, украинскими и белорусскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемое Западное Полессье."
 poland.231.a: "Оставим за нами"
 poland.231.b: "Передадим его Беларуси"
 poland.231.c: "Украина будет владеть им"
 poland.232.t: "Территориальная принадлежность Белостока"
 poland.232.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал регион Белосток, давно являвшийся острым предметом споров между польскими и белорусскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемый Белосток."
 poland.232.a: "Оставим два региона себе"
 poland.232.b: "Стоит передать их Беларуси"
 poland.232.c: "Разделить будет самым уместным"
 poland.233.t: "Территориальная принадлежность Гродно"
 poland.233.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал богатый на польскую культуру регион Гродно, давно являвшийся острым предметом споров между польскими белорусскими, и даже литовскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемый Гродно."
 poland.233.a: "Гродно станет частью Польши"
 poland.233.b: "Беларусь должна владеть Гродно"
 poland.233.c: "Разделим два региона"
 poland.233.e: "Передадим оба региона Литве"
 poland.234.t: "Территориальная принадлежность Западной Беларуси"
 poland.234.d: "Окончание войны принесло нам немало проблем, а также новые приобретения. Одним из таких стал огромный регион Западной Беларуси, давно являвшийся острым предметом споров между польскими и белорусскими политиками, желавшими заявить о законности своих прав на владение этим регионом. И вот, наконец, возникла возможность разрешить все наши территориальные споры. Вопрос лишь в том — под каким государством в дальнейшем будет столь обсуждаемая Западная Беларусь."
 poland.234.a: "Западная часть перейдет к нам"
 poland.234.b: "Что западная, что восточная, это часть Беларуси"

 poland.235.t: "Начало политики централизации"
 poland.235.d: "В своих действиях на востоке польское государство руководствовалось определённым планом, известным как федеративный. Он предполагал, с одной стороны, включение в состав Польши территории примерно до линии границы польского расселения, то есть ту самую стратегическую оборонную зону. С другой стороны, предполагалось избежать непосредственного соседства Польши с Великороссией, для чего следовало помочь в создании вдоль её западной границы независимых литовско-белорусского и украинского государств, связанных с Польшей союзными узами. Их платой за покровительство Варшавы стал бы отказ в пользу Польши от Виленской области, Восточной Галиции, западных районов Белоруссии и Волыни. Однако стало очевидно, что дробление будущего федеративного государства может оказать негативное влияние на его способность противостоять возможной будущей войне — по сути, неэффективная и дезорганизованная нация с вассалами не сможет сдержать натиск более централизованных сил, таких как большевики или Германия. Поэтому необходимо создать из Польши сильное и единое государство, которое станет серьёзной проблемой для страны-агрессора. В связи с этим следует начать политику местной полонизации восточных территорий и подчинения местных сепаратистских правительств."
 poland.235.a: "Польша будет сильна только в единстве."
 poland.236.t: "Польша к построению единого государства"
 poland.236.d: "В своих действиях на востоке польское государство руководствовалось определённым планом. Этот план предполагал, с одной стороны, включение в состав Польши территории примерно до линии границы польского расселения, то есть ту самую стратегическую оборонную зону. Однако этого было недостаточно для польских амбиций. Нашей платой за покровительство Варшавы стал бы отказ в пользу Польши от Виленской области, Восточной Галиции, западных районов Белоруссии и Волыни. Тем не менее, для поляков дробление будущего государства сулило бы негативные последствия — его способность противостоять возможной будущей войне оказалась бы под угрозой. Поэтому они стремились создать из Польши сильное и единое государство, начав политическую полонизацию восточных территорий и подчинение местных сепаратистских правительств. Очевидно, что польские националисты в Варшаве не потеряли своих мечт о Великой Польше и возрождении единой Речи Посполитой. А согласие на компромисс могло бы привести к не самым благоприятным последствиям для всей нашей нации и народа — ведь, уже убедившись в польских амбициях и желаниях, большая часть населения с высокой вероятностью будет национализирована и ополячена."
 poland.236.a: "Они защитили нас от полного захвата — это разумная отплата"
 poland.236.b: "Мы не видим себя в составе Польши"
 poland.237.t: "Государство [FROM.GetName] против единения"
 poland.237.d: "Белорусское государство, которое не желало стать частью будущего единого и могущественного польского государства, решительным отказом продемонстрировало своё нежелание войти в систему польского реваншизма и национализма, которая очевидно приведёт к ущемлению и сокращению прав местных меньшинств, а также к превращению их в граждан «репрессивной Польши»."
 poland.237.a: "Ничего не поделать, пусть уходят"
 poland.237.b: "Придется задействовать против их силу."
 poland.238.t: "Католическая поддержка"
 poland.238.d: "На всей западной территории Польши преобладающая православная церковь, находясь в условиях польской оккупации, стремилась к выполнению главной задачи — духовному служению людям и стране. Её приходы считались основным звеном, формировавшим семейные христианские традиции. Большое внимание уделялось воспитанию детей и молодежи, чтобы оказать влияние на подрастающее поколение по-своему. Это шло вразрез с главной идеей о полонизации Восточных кресов, где ранее проводилась политика, направленная против православия как религиозной формы самосознания белорусского и украинского народов. Однако польская католическая курия римского костела, с согласия нашего правительства, начала реализовывать давнюю цель: не только полонизацию, но и денационализацию белорусов и украинцев. Ссылаясь на фиктивные сепаратистские тенденции среди коренного населения, она замышляла создание польской карманной автокефальной православной церкви, подчинённой политическим интересам государства Польского."
 poland.238.a: "Религия станет главным объединителем в нашей политике"
 poland.239.t: "Националисты начинают борьбу"
 poland.239.d: "Разумно было предположить, что политика полной централизации и полонизации не по духу местных крестьян и интеллигенции, которые не желали становиться частью пропольской культуры. Именно потому местные национальные группы и партии начали скрытую борьбу с местной администрацией, разжигали на улицах бандитизм и панику в обществе. Это негативно сказывается на нашей стабильности. Развитие национальных волнений может привести к более решительным мерам со стороны бунтовщиков, особенно радикальные общественные группы не стесняются говорить о полном отделении своей нации от "гнёта Польши". Необходимо немедленно подавить всех протестующих, пока это не превратилось в национальные восстания местных народов."
 poland.239.a: "Сепаратисты подняли голос на своих покровителей."
 poland.240.t: "Вопрос Восточной Малопольши"
 poland.240.d: "Польско-украинское вооружённое противостояние в Восточной Галичине в межвоенный период казалось неизбежным. Однако стоит отметить, что даже при первом выступлении Украинской военной организации власти Польши отреагировали вполне достаточно мягко, несмотря на то, что среди целей украинских террористов значился сам начальник польского государства. Это явно привело к временной приостановке акций данной организации. Однако к лету следующего года подчинённые Евгения Коновальца активизировали борьбу с поляками, выступая со свежими силами. Восточная Галичина была передана Польше при условии решения «украинского вопроса», в частности — соблюдения прав украинского меньшинства на создание национальной автономии.\n\nХотя Сейм Польши принял соответствующее постановление, практически все указанные условия остались невыполненными. Естественно, это побудило украинских националистов к новым действиям, поскольку попытки договориться оказались безуспешными. Неоднократные диверсионные акции наносят неисчислимый вред стабильному положению Польши. В связи с этим будут начаты особые меры по отношению к украинским национальным организациям."
 poland.240.a: "Есть ли одно решение как подавить неугодных."
 poland.241.t: "Подавление местных националистов"
 poland.241.d: "Формы и интенсивность полонизации варьировали в зависимости от особенностей восточнославянского населения в различных регионах Польши. Белорусы признавались польскими властями податливыми польскому культурному влиянию. В стратегически важных областях с украинским населением Польша прибегала к репрессиям и силовым методам. Однако ситуация достигла нового, более радикального уровня, когда местные националисты начали подпольную борьбу против польской политики, направленной на национализацию восточных окраин. Поэтому единственно верным решением должно стать применение еще более жестких мер и репрессий, чтобы подавить сопротивление противников польского режима."
 poland.241.a: "Против силы действует лишь другая сила."
 poland.242.t: "Начало реквизиции Польшей"
 poland.242.d: "Стремясь как можно быстрее утвердить своё господство «на крэсах всходних» и получить крупную выгоду от приобретённых земель, польские власти и военнослужащие не стеснялись своих методов, прибегая к инквизиции и буквально «терроризируя» население. В ряде губерний и других городах действовали военно-полевые суда, выносящие смертные приговоры арестованным подпольщикам и захваченным в плен партизанам. Особые польские отряды обходили хутора для реквизиции и последующего вывоза всех ресурсов в Польшу. Очевидно, что такие «акции» наносят серьезный урон местной экономике и приводят её к убыткам."
 poland.242.a: "Польская жадность не знает границ."
 poland.243.t: "Вопрос еврей в Польше"
 poland.243.d: "Ни в одной стране мира не было такого высокого процента евреев среди населения, как в Польше — около 10%. Основой еврейской жизни оставалась религиозная община. Постепенно появлялись политические партии, а позже — и экономические организации. Большая часть еврейского населения вела традиционный образ жизни. Еврейская община была преимущественно городской и довольно замкнутой, а контакты с нееврейским населением носили в основном экономический характер. Основными занятиями евреев были ремёсла и торговля.\n\nС момента воссоздания независимого польского государства еврейское население было вынуждено бороться за свои права и равенство. Рост антисемитских настроений, пропагандируемых националистическими партиями, всё больше набирал популярность. Даже звучали разговоры о возможных экономических ограничениях для евреев и начале их массовой эмиграции из страны. Такое нарастание противоречий не может остаться без внимания – какой же будущее будет ожидает такой богатый народ, как евреи?"
 poland.243.a: "Евреи станут полноправным народом в новом союзе"
 poland.243.b: "Евреи могут жить спокойно, но на большее пусть не рассчитывают"
 poland.243.c: "Начнем гонения и реквизиции с жидов"
 poland.244.t: "Приглашение в междуморье"
 poland.244.d: "Идея создания блока третьих сил между Западной Европой, в основном Германией, и Россией, известного как Междуморье, возникла в период демонтажа Австро-Венгерской империи, согласно положениям Версальского мирного договора — документа, положившего конец Великой войне, а также Сен-Жерменского и Трианонского договоров, являвшихся составными частями Версальского мирового порядка. Предполагалась федерация, простиравшаяся от Балтийского моря до Адриатики, со смыслом противостояния как Германии, так и России — всё под верховенством Польши.\n\nКогда все войны и противоречия были пережиты, Польша выступила с инициативой создания федеративного союза восточноевропейских государств, достаточно сильного, чтобы отражать угрозы со стороны потенциально воинственных соседей: главным образом, Германии, оказавшейся обиженной и урезанной после утраты части Восточной Пруссии, и набирающей силу Советской России.\n\nИ одной из таких стран, которая  стала приглашённой в будущую великую федерацию с стороны Польши, стали мы."
 poland.244.a: "Мы готовы вступить"
 poland.244.b: "Мы против вступления"
 poland.245.t: "[FROM.GetName] против вступления"
 poland.245.d: "Идея создания блока третьих сил между Западной Европой, в основном Германией, и Россией, известного как Междуморье, возникла в период демонтажа Австро-Венгерской империи, согласно положениям Версальского мирного договора — документа, положившего конец Великой войне, а также Сен-Жерменского и Трианонского договоров, являвшихся составными частями Версальского мирового порядка. Предполагалась федерация, простиравшаяся от Балтийского моря до Адриатики, со смыслом противостояния как Германии, так и России — всё под верховенством Польши.\n\nКогда все войны и противоречия были пережиты, мы выступили с инициативой создания федеративного союза восточноевропейских государств, достаточно сильного, чтобы отражать угрозы со стороны потенциально воинственных соседей: главным образом, Германии, оказавшейся обиженной и урезанной после утраты части Восточной Пруссии, и набирающей силу Советской России.\n\nИ одной из таких стран, которая неожиданно стала приглашённой в будущую великую федерацию, должна была стать [FROM.GetName]. Но пришедший нам отказ перевернул нынешнюю ситуацию, ведь на одну страну, на которой мы рассчитывали построить сильнейший союз для противостояния двум гегемонам, стало меньше."
 poland.245.a: "Наверно, у них были весомые причины отказать."
 poland.246.t: "Многонациональная политика"
 poland.246.d: "Весь польский народ прекрасно знал, как больше ста двадцати лет Польша находилась под гнётом иностранного владычества. Но проблема заключалась не только в этом угнетении: за многие годы сами поляки поняли, что значит, когда твою культуру и язык пытаются искоренить и притеснить, затрачивая на это огромные усилия. Однако угнетение одного народа не гарантирует исчезновения всей нации. Напротив, под общим гнётом польский народ сплотился и не хотел мириться с оккупантами.\n\nЧтобы не повторять ошибок прошлого, левыми фракциями был предложен проект нового законодательства, который должен был гарантировать малым народам право на вероисповедание, развитие собственной культуры и языка. Надеясь, что такая мягкая политика будет воспринята народами Востока должным образом."
 poland.246.a: "Все народы найдут в Польше себе место"


 poland.247.t: "Огромные успехи на Западе"
 poland.247.d: "С началом революции в Германии поляки из Познани сразу же взялись за оружие, чтобы защитить свою нацию от немецких захватчиков. Но успех восстания, который в данный момент наблюдается, потрясает даже западные государства, не говоря уже о немецком правительстве, которое до последнего надеялось на снижение эскалации текущего конфликта. Восстание в Великопольше, начавшееся как попытка освободить лишь приграничную Познань, разрослось до невиданных масштабов. Теперь можно с уверенностью сказать, что движение перешло на совсем другой уровень.\n\nНо как долго наши братья поляки смогут удерживать такие обширные завоевания? В понимании серьезности ситуации Германия все больше разворачивает свои фрайкоры и пограничные силы для противодействия восстанию. Удачная авантюра Великопольши может обернуться полным крахом и прорывом еще неустойчивого и шаткого фронта.\n\nДолжны ли мы поддержать наших братьев поляков в Познани или надеяться на содействие Антанты, чьё слово наверняка сможет положить конец этому конфликту?"
 poland.247.a: "Будем ожидать междунородной поддержки"
 poland.247.b: "Нельзя потерять такую возможность, будем вмешиваться"
 poland.248.t: "Разгром на западе"
 poland.248.d: "Разумное на первый взгляд решение — поддержать польских братьев в Великопольском восстании — потерпело сокрушительный крах. Как и предполагалось, шаткий фронт, который не успели укрепить после недавнего успеха, был прорван, что создавало угрозу окружения всех войск Великопольши и самой Польши. В очередной раз тщеславие и гордыня не позволили нам отказаться от желания получить больше, в данном случае — расширить владения на западе.\n\nДаже объединённые силы наших войск не смогли противостоять сосредоточенным немецким частям, которые были куда более мотивированы бороться против дальнейшей польской экспансии и оккупации своих земель. Для них это стало чуть ли не единственной радостью после поражения в Великой войне, что, разумеется, ещё сильнее сплотило их народ — чего нельзя сказать о нас.\n\nТакое решение изначально не вызвало всеобщего воодушевления, а когда стало ясно, что эта авантюра потерпела полный провал, противоречия и нестабильность только усилились как в польском правительстве, так и в обществе в целом."
 poland.248.a: "Авантюра стоила нам поражения."
 poland.249.t: "Разгром на востоке"
 poland.249.d: "Вступление Польши в конфликт забило последний гвоздь в крышку гроба. Не сумев отстоять свои границы, фрайкоры и немецкие силы были вынуждены отступить. Добившись успеха, великополяки смогли передать инициативу Польской армии, которая продолжила наступление. Даже национальные призывы и попытки повысить боевой дух деморализованной немецкой армии не смогли противостоять объединённым польским частям, которые были гораздо более организованными и хорошо оснащёнными. Для поляков это стало очередной победой в их военных походах по расширению границ. А для нас — ещё одним поражением некогда великого немецкого государства, которое не смогло защитить даже собственную территорию.\n\nПодобные события, как и многое другое, неизбежно приведут к радикализации политических групп и росту реваншизма в немецких кругах."
 poland.249.a: "Немецкий народ запомнит этот день."
 poland.250.t: "Победа над Германией"
 poland.250.d: "Разумное на первый взгляд решение — поддержать польских братьев в Великопольском восстании — оказалось обречено на сокрушительный провал. Как и предполагалось, слабо организованные немецкие части не сумели воспользоваться моментом шаткости их фронта с Великополяками. В результате уже объединённые силы польского восстания смогли прорвать фронт с Германией и закрепиться в её восточных территориях. Даже собравшие боевой дух немецкие части не смогли противостоять нашим организованным и вооружённым войскам, которые в тот момент были гораздо более боеспособными.\n\nДля немецкого народа это станет ещё одним поражением некогда великого немецкого государства, которое не смогло защитить даже свою собственную территорию. Такие события, а также мнения, связанные с ними, неизбежно приведут к радикализации политических групп и росту реваншистских настроений в немецких кругах. Но это уже не наша забота."
 poland.250.a: "Авантюра была не напрасна"
 poland.251.t: "Победа над Польшей"
 poland.251.d: "Даже присоединение Польши к конфликту не смогло изменить ход боевых действий. Шаткий фронт, который не успели укрепить после успеха великополяков, был прорван, что, в свою очередь, грозило окружением всех войск объединённых сил Великопольши и самой Польши, из-за чего им пришлось отступить. В очередной раз тщеславие и гордыня не позволили полякам отказаться от желания получить больше земли.\n\nОбъединённые силы польских войск также не смогли противостоять сосредоточенным немецким частям, которые были гораздо более мотивированы сражаться против дальнейшей польской экспансии и оккупации наших земель. Для нас это стало одной из немногих радостей после поражения в Великой войне — что, конечно же, ещё сильнее сплотило наш народ.\n\nВ Польше же такое решение с самого начала не было встречено всеобщей радостью, а после того как стало ясно, что подобная авантюра потерпела крах, противоречия и нестабильность всё больше нарастают в польском правительстве и обществе в целом. Но это уже не наша забота."
 poland.251.a: "Польский пан выбит с немецкой земли."




 poland.252.t: "Активность новых радикалов"
 poland.252.d: "Пока сейм утопает в дебатах и разногласиях, а армия оказывается неспособной стабилизировать страну, на улицах Польши появились новые радикальные силы: представители лагеря "национальных радикалов" и "национальной рабочей партии". \n\nОбе эти силы обращаются к полусоциалистической риторике, апеллируют к простому народу и при этом являются яростными националистами. Простые решения представленные новыми радикалами находят отзыв во всех слоях польского общества, в то время как их способность применять вооруженные иррегулярные отряды против большевиков и других их противников вызывает уважение и страх перед насилием этого нового политического фланга сеймовой Польши. \n\nНеизвестно смогут ли рабочие-националисты и национал-радикалы добиться успеха, но в период кризиса Речи Посполитой дорога для их авантюр открыта"
 poland.252.a: "Это просто сброд"
 poland.252.b: "К ним стоит присмотреться"
 poland.253.t: "Национальные радикалы и НРП"
 poland.253.d: "Лагерь Национальных радикалов - антикоммунистическое антилиберальное и антидемократическое (также антисемитское) объединение из молодых активистов радикалов и крайне правых выходцев национал-демократической партии. Эта сила отрицает способность парламентской республики управлять страной и её экономикой в интересах польского народа. Национальные радикалы получили ограниченную популярность в армии, но кроме того заняты формированием своих собственных иррегулярных городских бойцов. \n\nНациональная рабочая партия - национал-социалистическая организация выступающая за введение левой экономики и ограничения прибыли капиталистов, упразднение сеймовского режима и отстаиванию интересов польского рабочего класса, как основы и ядра польской нации. Часть популистов также поддерживает контакты с национальными популистами из России. "
 poland.253.a: "Пора перейти на сторону национальных радикалов"
 poland.253.b: "НРП - это выход из кризиса"
 poland.254.t: "Переворот национальных радикалов"
 poland.254.d: "В последние дни в столице Польши было особенно неспокойно - всюду носились слухи о прибытии 20-30 тысяч вооруженных бойцов иррегулярных отрядов национал-радикальной партии. Правительство и сейм молчали, в то время как армия так же продолжала бездействовать. Сегодня стало ясно что все они капитулировали перед новыми господами страны: глава национал-радикалов назначен новым премьер министром, а сейм временно распущен. \n\nТеперь по улицам города проходит парад национал-радикальных ударных отрядов, а высшее руководство партии взялось за активную агитацию, обещая очистить Польшу от коммунистов, евреев, иностранного капитала и предателей из сейма. В любом случае часть поляков радостно рукоплещут произошедшему."
 poland.254.a: "Время сейма прошло"
 poland.255.t: "Переворот Национальной-Рабочей партии"
 poland.255.d: "Ожидание чего-то неизбежного чувствовалось в столице в последние дни перед переворотом. Молча и без ярких лозунгов вставали заводы и фабрики, железнодорожники закрывали пути, в то время как армия продолжала бездействовать. В какой-то момент на улицах появились вооруженные люди с красными повязками НРП на правой руке, полиция не препятствовала им. Газеты также на время остановили печать. Никто не понял "когда всё началось" и "когда всё кончилось", но итогом закулисных переговоров стало объявление о создании "национал-рабочего правительства" во главе с лидерами НРП. \n\nЗатем новый режим поспешил устроить триумф и "национальный рабочий праздник" разрешив выходные на заводах и организовав внушительный парад в центре столицы. Затем всё утихло, и, как будто бы, ничего не изменилось. Разве что сейма больше не было."
 poland.255.a: "Да здравствует национальная революция!"
 poland.256.t: "Переворот национальных радикалов"
 poland.256.d: "В последние дни в столице Польши было особенно неспокойно - всюду носились слухи о прибытии 20-30 тысяч вооруженных бойцов иррегулярных отрядов национал-радикальной партии. Правительство и сейм молчали, в то время как армия так же продолжала бездействовать. Сегодня стало ясно что все они капитулировали перед новыми господами страны: глава национал-радикалов назначен новым премьер министром, а сейм временно распущен. \n\nТеперь по улицам города проходит парад национал-радикальных ударных отрядов, а высшее руководство партии взялось за активную агитацию, обещая очистить Польшу от коммунистов, евреев, иностранного капитала и предателей из сейма. В любом случае часть поляков радостно рукоплещут произошедшему."
 poland.256.a: "Время сейма прошло"
 poland.257.t: "Переворот Национальной-Рабочей партии"
 poland.257.d: "Ожидание чего-то неизбежного чувствовалось в столице в последние дни перед переворотом. Молча и без ярких лозунгов вставали заводы и фабрики, железнодорожники закрывали пути, в то время как армия продолжала бездействовать. В какой-то момент на улицах появились вооруженные люди с красными повязками НРП на правой руке, полиция не препятствовала им. Газеты также на время остановили печать. Никто не понял "когда всё началось" и "когда всё кончилось", но итогом закулисных переговоров стало объявление о создании "национал-рабочего правительства" во главе с лидерами НРП. \n\nЗатем новый режим поспешил устроить триумф и "национальный рабочий праздник" разрешив выходные на заводах и организовав внушительный парад в центре столицы. Затем всё утихло, и, как будто бы, ничего не изменилось. Разве что сейма больше не было."
 poland.257.a: "Да здравствует национальная революция!"



 poland.258.t: "Советская Россия предлагает начать переговоры"
 poland.258.d: "Идущая Советско-польская война, продолжающаяся уже долгое время, вымотала основных её участников. Прибывшая в Варшаву советская делегация предприняла попытку начать мирные переговоры с нашим правительством. Многие потери на фронте и усталость от войны дают о себе знать. Хотя многие дивизии и полки продолжают сражаться, время и усталость уже сказываются на боевом духе. Активная фаза войны стихла, но попытки прорыва в отдельных участках фронта всё ещё продолжаются. Продолжение и без того тяжёлой войны для обеих сторон может привести к необратимым последствиям.\n\nНо готовы ли мы отказаться от своих планов по воссозданию великой Польши? Пока мы не можем на сто процентов быть уверены, что противник разбит, а наши требования — достигнуты, готовы ли мы остановиться? Этот вопрос требует более тщательного обдумывания. Спешить с выбором, который определит дальнейшее геополитическое положение в Восточном регионе, — значит рисковать очень серьёзно. Поэтому такое решение нуждается в особом внимании и взвешенности."
 poland.258.a: "Войну нужно немедленно прекращать"
 poland.258.b: "Мы полны сил продолжать войну"
 poland.259.t: "Польша соглашается на переговоры"
 poland.259.d: "Польское руководство, приняв нашу делегацию, несколько дней обдумывало принятое решение. По итогам их диалогов было решено продолжить переговоры с Советской Россией, что, конечно, не может не радовать. Многочисленные потери с обеих сторон и продолжительная война дали о себе знать, и это нашло отражение в окончательном решении Польской стороны, которая готова к заключению мира. Хотя дальнейшие обсуждения условий мира ещё предстоит провести, сама мысль о том, что столь убыточную войну можно остановить, уже вызывает радость и воспринимается как дипломатическая победа."
 poland.259.a: "Созывайте дипломатов."
 poland.260.t: "Польша против переговоров"
 poland.260.d: "Польское руководство, приняв нашу делегацию, несколько дней обдумывалось по поводу принятия решения. В итоге было решено продолжать войну против нашей страны. Видимо, польские аппетиты и амбиции превышают элементарный здравый смысл и расчёт. Советско-польская война, продолжающаяся уже длительное время, измотала обе стороны, и несмотря на большие потери и военную усталость, польское правительство невозмутимо продолжает губить своих бойцов, преследуя свои мятежные фантазии. Нам же остаётся лишь не допустить реализации этих планов. Если эти польские паны всерьёз полагают, что у них ещё остались силы для продолжения войны, мы готовы разбить любое их сопротивление."
 poland.260.a: "Этой войне не будет конца."
 poland.261.t: "Польша предлагает начать переговоры"
 poland.261.d: "Продолжающаяся Советско-польская война, идущая уже длительное время, измотала основных её участников. Прибывшая в Москву польская делегация предприняла попытку начать мирные переговоры с нашим правительством. Многочисленные потери на фронте и усталость от войны дают о себе знать. Хотя многие дивизии и полки продолжают сражаться, время и усталость сказываются на их боевом духе. Активная фаза войны стихла, но попытки прорыва в отдельных участках фронта всё ещё продолжаются. Продолжение уже и так тяжёлой для обеих сторон войны может привести к необратимым последствиям.\n\nНеисполненные планы о возведении Великой Польши, и многое другое, вынудили их пойти на переговоры. Но готовы ли мы отказаться от авантюры с созданием Советской Польши и дальнейшей экспансией на Запад, что, по нашим замыслам, должно привести к вспышкам новых революций по всей Европе? Такой вопрос требует более тщательного обдумывания. Спешка с выбором, который определит дальнейшее геополитическое положение в восточном регионе, недопустима и нуждается в особом внимании."
 poland.261.a: "Войну нужно немедленно прекращать"
 poland.261.b: "Польский пан будет разбит"
 poland.262.t: "Советская Россия соглашается на переговоры"
 poland.262.d: "Советское руководство, приняв нашу делегацию, несколько дней обдумывало принятое решение. В итоге было решено продолжить переговоры с Польшей, что, безусловно, не может не радовать. Многочисленные потери с обеих сторон и продолжающаяся длительная война дали о себе знать и нашли отражение в окончательном решении польской стороны — о желании заключить мир, отказавшись от своих идей реализации так называемой "великой Польши". Хотя дальнейшие и окончательные обсуждения условий мира ещё предстоит провести, сама мысль о том, что столь убыточную войну можно прекратить, уже вызывает радость и воспринимается как дипломатическая победа."
 poland.262.a: "Созывайте дипломатов."
 poland.263.t: "Советская Россия против переговоров"
 poland.263.d: "Советское руководство, приняв нашу делегацию, несколько дней обдумывало принятое решение. По итогам их диалогов было решено продолжать войну против нашей страны. Видимо, советские аппетиты и амбиции по дальнейшей экспансии революции на запад превосходят разумные расчёты и здравый смысл. Идущая уже длительное время советско-польская война измотала обе стороны, и, несмотря на большие потери и военную усталость, советское правительство невозмутимо продолжает губить своих бойцов ради достижения своих захватнических фантазий. Нам остается лишь предотвратить реализацию этих планов. Если эти большевистские бандиты всерьёз полагают, что у них ещё есть силы для продолжения войны, мы готовы разбить любое их сопротивление."
 poland.263.a: "Этой войне не будет конца."

 poland.264.t: "Положение Литовской границы"
 poland.264.d: "Итак, начался переговорный процесс, в ходе которого будут подробно изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Одним из основных вопросов будущих границ стала Литва, чьи претензии высказывают не только поляки. Польша, в своих планах, тщательно формулировала свои территориальные требования: с одной стороны, она стремилась к максимально возможному возвращению своих земель, населённых этническими поляками, с другой — осторожно относилась к присоединению территорий с преобладанием непольского населения в Литве.\n\nПланы РСФСР складываются совершенно иначе: они предусматривают создание дружественного или даже полностью подконтрольного им правительства в Литве, что фактически означало бы превращение её в очередную советскую республику. Однако очевидно, что принятие только своей позиции без учета другой стороны приведет лишь к разногласиям в ходе переговоров и возможным спорам.\n\nКакое будущее ожидает Литву? Какие претензии оспариваются так сильно, и какой статус ей будет предоставлен? — эти вопросы требуют ясных и взвешенных решений."
 poland.264.a: "Литва останется нейтральным регионом"
 poland.264.b: "Потребуем лишь Вильнус"
 poland.264.c: "Литва должна перейти под нашу сферу влияния"
 poland.265.t: "Принадлежность Литвы"
 poland.265.da: "Итак, начался переговорный процесс, в ходе которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Одним из ключевых вопросов будущих границ стала Литва, чьи претензии высказывают не только поляки. Польша в своих планах тщательно формулировала свои территориальные требования: с одной стороны, она стремилась к максимально возможному возвращению земель, населённых этническими поляками, с другой — осторожно относилась к присоединению территорий с преобладанием непольского населения в Литве.\n\nПланы РСФСР складываются совершенно иначе: они предусматривают создание в Литве дружественного или даже полностью подконтрольного им правительства — будущей советской республики. Однако, учитывая вероятность разногласий, которые могут привести к срыву переговоров, противоположная сторона предложила иной вариант: предоставление Литве нейтрального статуса с минимальными территориальными изменениями. Такой подход исключит возможность закрепления влияния Польши или Советской России на литовской территории."
 poland.265.db: "Итак, начался переговорный процесс, в ходе которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Одним из главных вопросов о будущих границах стала Литва, чьи претензии высказывают не только поляки. Польша в своих планах тщательно формулировала территориальные требования: с одной стороны, она стремилась к максимально возможному возвращению своих земель, населённых этническими поляками, с другой — осторожно относилась к присоединению территорий с преобладанием непольского населения в Литве.\n\nПланы РСФСР складываются иначе: они предусматривают создание в Литве дружественного или даже полностью подконтрольного им правительства — будущей советской республики. Что станет очередной советской независимой территорией, — неясно, однако ясно одно: разногласия между сторонами могут привести к срыву переговоров.\n\nВ свою очередь, Польша твердо придерживается своей позиции и готова согласиться только на такие условия, при которых Вильнюс и прибрежные территории перейдут под её прямое управление, а Литва останется нейтральным буфером между двумя государствами."
 poland.265.dc: "Итак, начался переговорный процесс, в ходе которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Одним из ключевых вопросов будущих границ стала Литва, чьи притязания высказывают не только поляки. Польша в своих планах тщательно формулировала территориальные требования: с одной стороны, она стремилась к максимально возможному возвращению своих земель, населённых этническими поляками, с другой — осторожно относилась к присоединению территорий с преобладанием непольского населения в Литве.\n\nПланы РСФСР складываются иначе: они предусматривают создание в Литве дружественного или даже полностью подконтрольного им правительства, что означало бы превращение её в очередную советскую республику. Хотя этот вариант вызывает определённые опасения, противоположная сторона предпочитает видеть Литву только под своим прямым управлением и влиянием. Они воспринимают каждое иное мнение с полным противоречием и настойчивостью.\n\nВ связи с этим предстоит решить, принимать ли предложенные условия или же высказать свой протест."
 poland.265.a: "Мы готовы принять такие условия"
 poland.265.b: "Такие условия нам не по нраву"

 poland.266.t: "Положение Белорусской земли"
 poland.266.d: "Полным ходом начинается переговорный процесс, в рамках которого будет изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Одним из ключевых вопросов будущих границ стала Беларусь, чьи претензии высказывают обе стороны. Польша в своих планах формулировала возможность максимально возможного присоединения белорусских земель, которые служат для неё хорошим буфером. Также она рассматривала присоединение зон с большим населением этнических поляков на западе страны. К другим частям Беларуси отношение было более осторожным: там учитывались земли с преобладанием преимущественно непольского населения, и к их присоединению относились с меньшей настойчивостью.\n\nПланы РСФСР построены иначе: они предполагают создание в Беларуси дружественного или даже полностью подконтрольного им правительства, что означало бы превращение её в ещё одну советскую республику. Ясно, что принятие только своей позиции без учета другой стороны приведет лишь к разногласиям в переговорах и возможным спорам.\n\nИ вот возникает главный вопрос: какое будущее ожидает Беларусь, чьи притязания так остро оспариваются?"
 poland.266.a: "Беларусь станет нейтральным буфером"
 poland.266.b: "Выдвинем границу по Днепру"
 poland.266.c: "Разделим на западную и восточную Беларусь"
 poland.266.e: "Беларусь должна принадлежать лишь нам"
 poland.267.t: "Принадлежность Беларуси"
 poland.267.da: "Полным ходом начинается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Одним из ключевых вопросов будущих границ стала Беларусь, чьи притязания высказывают обе стороны. Польша в своих планах формулировала возможность максимально возможного присоединения белорусских земель, которые служат для неё хорошим буфером. Также она рассматривала присоединение районов с преобладанием этнических поляков на западе страны. К другим частям Беларуси относились довольно осторожно, учитывая земли с преобладанием преимущественно непольского населения, и к их присоединению относились с меньшей настойчивостью.\n\nПланы РСФСР складываются иначе: они предполагают создание в Беларуси дружественного или даже полностью подконтрольного им правительства, что означало бы превращение её в ещё одну советскую республику. Учитывая возможные споры, которые могут необратимо привести к срыву переговоров, противоположная сторона предложила особый вариант — предоставить Беларуси статус нейтрального государства с минимальными территориальными изменениями. Такой подход исключит возможность закрепления влияния Польши или Советской России на белорусской территории."
 poland.267.db: "Полным ходом начинается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Беларусь, чьи притязания высказывают обе стороны. Польша в своих планах формулировала возможность максимально возможного присоединения белорусских земель, которые являются для неё хорошим буфером. Также рассматривались районы с преобладанием этнических поляков на западе страны. К другим частям Беларуси относились довольно осторожно, учитывая земли с преобладанием преимущественно непольского населения и к их возможному присоединению проявляли меньшую настойчивость.\n\nПланы РСФСР складываются иначе: они предполагают создание в Беларуси дружественного или даже полностью подконтрольного им правительства, что означало бы превращение её в очередную советскую республику. Учитывая возможные споры, которые могут необратимо привести к срыву переговоров, было выдвинуто предложение о разделе Беларуси — её территория пройдет по реке Днепр и западной Двине"
 poland.267.dc: "Полным ходом начинается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Беларусь, чьи претензии высказывают обе стороны. Польша в своих планах формулировала возможность максимально возможного присоединения белорусских земель, которые являются для неё прекрасным буфером. Также рассматривались районы с преобладанием этнических поляков на западе страны. К другой части Беларуси относились довольно осторожно, учитывая земли с преобладанием преимущественно непольского населения, и к их присоединению проявляли меньшую настойчивость.\n\nПланы РСФСР сложились иначе: они предполагают создание в Беларуси дружественного или даже полностью подконтрольного правительства, что означало бы превращение её в очередную советскую республику. Хотя предложенное решение не могло полностью удовлетворить притязания обеих сторон, оно являлось одним из наиболее логичных вариантов. Таковым стало разделение белорусской территории на Западную и Восточную части: Минск передавался бы России, а Гродно с Бабруйском — Польше."
 poland.267.dd: "Полным ходом начинается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Беларусь, чьи притязания высказывают обе стороны. Польша в своих планах формулировала возможность максимально возможного присоединения белорусских земель, которые служат для неё прекрасным буфером. Также рассматривались районы с преобладанием этнических поляков на западе страны. К другой части Беларуси относились довольно осторожно, учитывая земли с преобладанием непольского населения, и к их присоединению проявляли меньшую настойчивость.\n\nПланы РСФСР складывались иначе: они предполагали создание в Беларуси дружественного или даже полностью подконтрольного правительства, что означало бы превращение её в очередную советскую республику. Однако, несмотря на это, противоположная сторона намерена видеть Беларусь лишь под своим прямым управлением и в сфере своего влияния. Они с полным отрицанием воспринимают любую другую точку зрения. Поэтому возникает вопрос: стоит ли принять такие условия или выразить свой протест."
 poland.267.a: "Мы готовы принять такие условия"
 poland.267.b: "Такие условия нам не по нраву"

 poland.268.t: "Положение Украинского государства"
 poland.268.d: "Продолжается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Украина, чьи притязания высказывают обе стороны. Польша в своих планах выражала желание притязать на всю часть украинской территории, на которой проживали преимущественно польское население. Особенно это касалось западных границ. Планы РСФСР звучали иначе: они предполагают создание в Украине дружественного или даже полностью подконтрольного правительства, что фактически означало бы превращение её в очередную советскую республику.\n\nНесмотря на сильное желание получить свою часть украинской земли, проблемой могут стать украинские националисты, чья борьба с подобными планами может принести немало хлопот. Очевидно, что принятие только одной стороны, без учета иной, приведет лишь к непримиримости в переговорах и возможным разногласиям.\n\nВозникает вопрос: какую позицию займет Украина, чьи притязания так сильно оспариваются?"
 poland.268.a: "Оставим Украину нейтральным государством"
 poland.268.b: "Разделим Украинскую границу по Днепру"
 poland.268.c: "Разделим границу на западную и восточную часть"
 poland.268.e: "Украина должна принадлежать нам вся"
 poland.269.t: "Принадлежность Украины"
 poland.269.da: "Продолжается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Украина, чьи притязания высказывают обе стороны. Польша в своих планах выражала желание приобрести всю часть украинской территории, на которой проживало преимущественно польское население, — а именно западные границы.\n\nПланы РСФСР звучали иначе: они предусматривали создание в Украине дружественного или даже полностью подконтрольного правительства, что означало бы превращение её в очередную советскую республику. Несмотря на сильное желание получить свою часть украинской земли, проблемой могут стать украинские националисты, чья борьба с подобными планами может принести немало хлопот.\n\nУчитывая возможные споры, которые в итоге могут привести к непримиримости и срыву переговоров, противоположная сторона предложила особый вариант. А именно — предоставление Украине нейтрального статуса с минимальными территориальными изменениями. Такой подход предотвратит возможность Польше или Советской России закрепить свое влияние на украинской территории."
 poland.269.db: "Продолжается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Украина, чьи притязания высказывают обе стороны. Польша в своих планах выражала желание приобрести всю часть украинской территории, на которой проживало преимущественно польское население — а именно западные границы.\n\nПланы РСФСР звучали иначе: они предусматривали создание в Украине дружественного или даже полностью подконтрольного правительства — что означало бы превращение её в очередную советскую республику. Несмотря на сильное желание получить свою часть украинской земли, проблемой могут стать украинские националисты, чья борьба с такими планами может принести немало хлопот.\n\nПоэтому было предложено разумное решение — разделить Украину по реке Днепр, выделив западную и восточную части территории."
 poland.269.dc: "Продолжается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Украина, чьи притязания изъявляют обе стороны. Польша в своих планах выражала желание приобрести всю часть украинской территории, на которой проживали преимущественно польское население — а именно западные границы.\n\nПланы РСФСР звучали иначе: они предполагали создание в Украине дружественного или даже полностью подконтрольного правительства — что означало бы превращение её в очередную советскую республику. Несмотря на сильное желание получить свою часть украинской земли, проблемой могут стать украинские националисты, чья борьба с такими планами может принести немало хлопот.\n\nВыдвинутое предложение, хотя и не могло полностью удовлетворить притязания обеих сторон, являлось одним из наиболее логичных решений. Так было предложено разделить украинскую территорию на западную и восточную части: Киев передать России, а Ковель и остальную часть — Польше."
 poland.269.dd: "Продолжается переговорный процесс, в рамках которого будут изложены и обсуждены итоговые условия и соглашения, входящие в финальный документ о подписании мира и разделе границ между сторонами. Текущим острым вопросом о будущем границ стала Украина, чьи притязания изъявляют обе стороны. Польша в своих планах выражала желание приобрести всю часть украинской территории, на которой проживали преимущественно польское население — а именно западные границы.\n\nПланы РСФСР звучали иначе: они предполагали создание в Украине дружественного или даже полностью подконтрольного правительства, что означало бы превращение её в очередную советскую республику. Несмотря на сильное желание получить свою часть украинской земли, проблемой могут стать украинские националисты, чья борьба с подобными планами может принести немало хлопот.\n\nТем не менее, противоположная сторона желает видеть Украину исключительно под своим прямым управлением и в сфере своего влияния. Они с полным противоречием встречают любую другую точку зрения. Поэтому возникает вопрос: стоит ли принять такие условия или высказать свой протест."
 poland.269.a: "Мы готовы принять такие условия"
 poland.269.b: "Такие условия нам не по нраву"

 poland.270.t: "Противоположная сторона отказывается"
 poland.270.d: "В ходе переговоров с противоположной стороной нами было выдвинуто вполне разумное решение. Несмотря на многочасовые споры и попытки его обоснования, вторая сторона категорически отказалась принимать предложенные условия. Из-за этого возникает реальная проблема. Нежелание принять наши требования необратимо ведет переговорный процесс в тупик, что вынуждает нас или смягчать и менять условия, или полностью отказаться от переговоров. В случае отказа последствия могут привести к дальнейшему развитию конфликта и продолжению войны, чего нам уже нельзя допускать, особенно сейчас, когда мы только начали предпринимать шаги к урегулированию ситуации и прекращению боевых действий навсегда."
 poland.270.a: "Нам ничего не остается сделать."
 poland.270.b: "Предложим им другой вариант"
 poland.271.t: "Противоположная сторона отказывается"
 poland.271.d: "В ходе переговоров с противоположной стороной нами было выдвинуто вполне разумное решение. Несмотря на многочасовые споры и попытки его обоснования, вторая сторона категорически отказалась принимать предложенные условия. Из-за этого возникает реальная проблема. Нежелание принять наши требования необратимо ведет переговорный процесс в тупик, что вынуждает нас или смягчать и менять условия, или полностью отказаться от переговоров. В случае отказа последствия могут привести к дальнейшему развитию конфликта и продолжению войны, чего нам уже нельзя допускать, особенно сейчас, когда мы только начали предпринимать шаги к урегулированию ситуации и прекращению боевых действий навсегда."
 poland.271.a: "Нам ничего не остается сделать."
 poland.271.b: "Предложим им другой вариант"
 poland.272.t: "Противоположная сторона отказывается"
 poland.272.d: "В ходе переговоров с противоположной стороной нами было выдвинуто вполне разумное решение. Несмотря на многочасовые споры и попытки его обоснования, вторая сторона категорически отказалась принимать предложенные условия. Из-за этого возникает реальная проблема. Нежелание принять наши требования необратимо ведет переговорный процесс в тупик, что вынуждает нас или смягчать и менять условия, или полностью отказаться от переговоров. В случае отказа последствия могут привести к дальнейшему развитию конфликта и продолжению войны, чего нам уже нельзя допускать, особенно сейчас, когда мы только начали предпринимать шаги к урегулированию ситуации и прекращению боевых действий навсегда."
 poland.272.a: "Нам ничего не остается сделать."
 poland.272.b: "Предложим им другой вариант"
 poland.273.t: "Итоги переговоров"
 poland.273.d: "Вот и завершился переговорный процесс, а подписанный в Риге Рижский договор окончательно закрепил позиции наших стран. Конечно, в ходе переговоров было много упущений и уступок, ведь большевикам нужна была передышка для решения накопившихся острых проблем, когда их власть могла пасть в любой момент. В связи с этим советские дипломаты были проинструктированы о необходимости заключения мира с серьезными территориальными уступками, поскольку для большевиков мир был жизненно важен.\n\nМир хотели и в Польше: под давлением стран Антанты депутаты польского сейма призвали польское правительство в кратчайшие сроки подписать мирный договор. Его поддержал и «начальник» польского государства, подчеркнув, что отторгнутые большевикам земли в будущем можно вернуть.\n\nНесмотря ни на что, подписанный договор завершил многолетние споры. Хотя итоги мира не пришлись всем по душе, и в будущем, вероятно, появятся новые проблемы. Но по крайней мере, в данный момент наша страна достигла столь желанного мира."
 poland.273.a: "Желанный мир наконец настал"
 poland.273.b: "Условия неприемлемы, мы должны получить больше!"

 poland.274.t: "Русская армия в Польше идет в наступление"
 poland.274.d: "Русская Народная Добровольческая Армия, сражающаяся против нашей власти за свободу всех народов и за мир во всем мире, сегодня пересекла границу, установленную прелиминарным миром. Она покинула нейтральную зону между Польшей и Советской Россией и перешла в наступление.\n\nРанее, на момент заключения предварительного мирного договора между РСФСР и Польшей, на территории, контролируемой последней, находился целый ряд различных образований. Договор предусматривал недопущение пребывания на территории РСФСР и Польши организаций, «ставящих своей целью вооружённую борьбу с другой стороной».\n\nИменно в этот момент на сцене появляется Борис Викторович Савинков — фигура широко известная как организатор «Союза защиты Родины и Свободы», а также мятежей в Муроме и Ярославле в 1918 году. Он прибыл в Польшу с идеей «третьей России» — без большевиков и монархистов, и с готовностью признать национальное самоопределение народов ради совместной борьбы с Советами.\n\nВ ходе своей деятельности и принимаемых решений ему удалось собрать и объединить значительную часть русских добровольческих формирований, готовых пойти против большевистской власти.\n\nА ныне, не имея возможности оставаться дальше в Польше, Борис Савинков принял окончательное решение — двигаться вглубь большевистских территорий."
 poland.274.a: "Они должны быть разбиты."

 poland.275.t: "Отношения с Прусским правительством"
 poland.275.d: "В Кенигсберге на севере от территорий освобожденной Польши часть германских земель перешла под управление автономного правительства Восточной Пруссии. Немцы здесь фактически вышли из подчинения Берлину и надеются самостоятельно удержать эти территории под своим контролем. В этой ситуации польских штаб рассматривает возможность провести интервенцию в Пруссию и заполучить необходимые нашему государству земли прибалтийского побережья."
 poland.275.a: "Поход на Кенигсберг будет начат"
 poland.275.b: "Участвовать в этом неразумно"
 poland.276.t: "Переговоры с РНР"
 poland.276.d: "На востоке мы столкнулись с новым русским правительством созданным немцами. Впрочем сейчас, немецкая поддержка этого проекта фактически перекрыта, да и мы обрели независимость, а значит необходимо определить линию разграничения."
 poland.276.a: "У нас нет претензий к русским"
 poland.276.b: "Нам необходимы земли до Минска"
 poland.276.c: "Наша граница должна включать Минск"
 poland.277.t: "Требования Польши по разграничению"
 poland.277.d: "После исчезновения немецкого фактора независимое Польское правительство перешло к активному движению на восток. Здесь поляки столкнулись с нашей администрацией, после чего решили установить дипломатический контакт и выдвинули собственные требования по уступке территорий до Минска."
 poland.277.a: "Это невозможно"
 poland.277.b: "Мы готовы согласиться"
 poland.278.t: "Жесткие требования Польши по разграничению"
 poland.278.d: "Польское правительство перешло к активному движению на восток. Здесь поляки столкнулись с нашей администрацией, после чего решили установить дипломатический контакт и выдвинули собственные требования по уступке территорий включая Минск."
 poland.278.a: "Это невозможно"
 poland.278.b: "Мы готовы согласиться"
 poland.279.t: "Согласие РНР"
 poland.279.d: "Новое русское правительство проявило мудрость и согласилось на предложенные нами границы, это значит что польские войска продвигаются дальше на восток без препятствий."
 poland.279.a: "Русские ведут себя разумно"
 poland.280.t: "Отказ РНР"
 poland.280.d: "Русское правительство отказалось от предложенных условий, изменения границы в мирном формате не произойдут."
 poland.280.a: "Неудача"
 poland.280.b: "Возьмем своё силой"

 
 
 news_n.1004.t: "Провозглашение Второй Речи Посполитой"
 news_n.1004.d: "Сегодня главнокомандующий польской армии Юзеф Пилсудский сообщил о создании Второй речи Посполитой в "составе всех земель объединенной Польши". Это смутило дипломатов большинства стран мира, ведь это заявление не было санкционированно правительством Польши, которое все еще остается непризнанным и мало кто знает, что понимается под "землями объединенной Польши". Тем не менее Берлин и Москва уже отправили своих представителей в Варшаву."
 news_n.1004.a: "Великая Польша возрождается"
 news_n.1005.t: "Польско - Советская война"
 news_n.1005.d: "Конфликт территориальных интересов Польской Республики и большевистской России достиг своей кульминации. После множества пограничных стычек, конфликтов и безуспешных переговоров польские войска перешли недавно установленную границу тем самым начав полномасштабную войну в Восточной Европе.\n\n Польша стремится вернуть старые восточные территории Речи Посполитой, тогда как большевики заинтересованы в распространении революции в Польшу и даже в Германию. Однако последние все же обременены внутренней войной и сил для нового фронта на западе может не хватить."
 news_n.1005.a: "Польский орёл расправил крылья"
 news_n.1006.t: "Оздоровление Польского государства"
 news_n.1006.d: "Вторая Речь Посполитая вновь сотрясается в кризисе. Сеймовский режим оказался не способен стабилизировать страну, а действующее правительство не смогло унять вражду партий. А реформы в социальной сфере оказались предметом постоянных споров и расколов. В конце концов, население Польши теряло доверие к внезапно установленной демократии.\n\nТеперь против правительства выступил прославленный маршал Юзеф Пилсудский. Он обвинил действующий кабинет в коррупции, а партии Сейма в разложении и действии в узких фракционных интересах. Свои заявления маршал поддержал ввод войск в Варшаву, где после трехдневных боёв правительство вынуждено было сложить полномочия. Теперь Пилсудский обещает, что под его чутким руководством Польша пойдёт по пути “оздоровления” прочь от лихорадки демократического сейма."
 news_n.1006.a: "По-польски “оздоровление” звучит как “санация”"
 news_n.1007.t: "Оздоровление Польского государства"
 news_n.1007.d: "Вторая Речь Посполитая вновь сотрясается в кризисе. Сеймовский режим оказался не способен стабилизировать страну, а действующее правительство не смогло унять вражду партий. А реформы в социальной сфере оказались предметом постоянных споров и расколов. В конце концов, население Польши теряло доверие к внезапно установленной демократии.\n\nТеперь против правительства выступил прославленный маршал Юзеф Халлер. Он обвинил действующий кабинет в коррупции, а партии Сейма в разложении и действии в узких фракционных интересах. Свои заявления маршал поддержал ввод войск в Варшаву, где после трехдневных боёв правительство вынуждено было сложить полномочия. Теперь Халлер обещает, что под его чутким руководством Польша пойдёт по пути “оздоровления” прочь от лихорадки демократического сейма."
 news_n.1007.a: "По-польски “оздоровление” звучит как “санация”"
 news_n.1009.t: "Воззвание генерала Брусилова"
 news_n.1009.d: "Ко всем бывшим офицерам, где бы они ни находились:\n\n«В этот критический исторический момент нашей народной жизни мы, ваши старшие боевые товарищи, обращаемся к вашим чувствам любви и преданности к Родине и взываем к вам с настоятельной просьбой забыть все обиды, кто бы и где бы их вам ни нанёс, а добровольно идти с полным самоотвержением и охотой в Красную Армию на фронт или в тыл, куда бы правительство Советской Рабоче-Крестьянской России вас не назначило и служить там не за страх, а за совесть, дабы своею честною службою, не жалея жизни, отстоять во что бы то ни стало дорогую нам Россию и не допустить её расхищения, ибо, в последнем случае, она безвозвратно может пропасть и тогда наши потомки будут нас справедливо проклинать и правильно обвинять за то, что мы из-за эгоистических чувств классовой борьбы не использовали своих боевых знаний и опыта, забыли свой родной русский народ и загубили свою Матушку-Россию» - генерал лейтенант Алексей Алексеевич Брусилов."
 news_n.1009.a: "Русские — сплочаются даже в такой момент."
 news_n.1010.t: "Польша развязывает войну с Германией"
 news_n.1010.d: "На фоне успехов восставших в Познани польских националистов, которым удалось занять обширные территории на востоке Германии, правительство в Варшаве приняло решение об интервенции с целью аннексии всех территорий Рейха имеющих значительную долю польского населения. Подобный акт агрессии не остался незамеченным среди стран Антанты, представители которых уже направили ряд дипломатических протестов, а  главы государств уже заявляют о необходимости "принять все возможные меры для сдерживания польского ирредентизма"."
 news_n.1010.a: "Польские амбиции не знают границ."
 news_n.1011.t: "Рижский мирный договор"
 news_n.1011.d: ""
 news_n.1011.a: "Мир наконец достигнут"
 news_n.1012.t: "Срыв мирных переговоров"
 news_n.1012.d: ""
 news_n.1012.a: "Этой войне не будет конца"