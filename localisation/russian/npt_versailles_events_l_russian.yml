l_russian:
 
 SER_CRO_ethnic_separatism: "Этнический сепаратизм хорватов и словенцев"
 AUH_CRO_separatists: "Народные организации сербов, хорватов и словенцев"
 AUH_CRO_separatists_desc: "«Югославский клуб» политиков Рейхсрата пробудил активность низовых партийных ячеек славянских политиков в Империи. Теперь по всей Хорватии и Словении растёт количество местных политических комитетов, которые постепенно перехватывают управление."
 
 yugoslavian_angry_in_AUH.1.t: "Декларация югославского клуба"
 yugoslavian_angry_in_AUH.1.desc: "Декларация об объединении славянских земель на юге Империи представлена сегодня в Рейхсрате. Основная её мысль создание самоуправляемой административной единицы на территории со словенским, хорватским и сербским населением при сохранении унии с домом Габсбургов и нахождении в едином государстве. Фактически предложение заключается в превращении дуалистической монархии в тройственную, где наравне с Австрией и королевством Венгрия появится новое Сербо-Хорватское королевство.\nАвторы декларации — кружок депутатов известных как «Югославский клуб». Его главой является Антон Крошец, лидер словенской народной партии. Представитель Хорватского Собора Антре Павелич также высказался в поддержку декларации. Против «югославов» выступают бошняки и некоторые венгерские политики. В любом случае у нас нет необходимости как то реагировать прямо сейчас, хотя спокойствие поколеблено."
 yugoslavian_angry_in_AUH.1.a: "Мы подумаем над этим"
 yugoslavian_angry_in_AUH.1.b: "Необходимо запретить распространение декларации"
 
 yugoslavian_angry_in_AUH.2.t: "Реакция на австрийскую декларацию"
 yugoslavian_angry_in_AUH.2.desc: "Славянские депутаты австрийского Рейхсрата на днях вынесли декларацию, в которой призвали правительство Империи к проведению внутренней реформы и созданию автономного югославянского королевства. Хотя во многом этот документ отвечает нашим намерениям по освобождению сербских братьев в Австро-Венгрии, одновременно он является предохранителем призванным сохранить единство Габсбургского государства.\nНа данном этапе авторы декларации, так называемый «Югославский клуб», всё ещё надеются поменять статус своих земель внутри монархии без отделения и революционных потрясений. Представители нашего правительства уже готовят собственную декларацию, однако, предварительно необходимы консультации с участниками лондонского Югославского комитета."
 yugoslavian_angry_in_AUH.2.a: "Нельзя потерять инициативу в объединении славян"
 
 
 yugoslavian_angry_in_AUH.3.t: "Подготовка Корфской декларации"
 yugoslavian_angry_in_AUH.3.desc: "После провозглашения в австрийском Рейхсрате резолюции «югославского клуба» стало очевидно, что вопрос послевоенного устройства сербо-хорватских земель в Габсбургской монархии нельзя пускать на самотёк. В противном случае его перехватят местные имперские политики-«югославы». Для противодействия этим течениям правительством Сербии решено провести переговоры с Югославским комитетом в Риме.\nОднако до сих пор наши позиции серьезно расходились. Югославский комитет, составленный из бывших австро-венгерских политиков славянского происхождения, которые примкнули к Антанте в первые годы войны, выступает за создание федеративного государства. Позиция Николы Пашича, а вслед за ним и сербского правительства, заключается в планомерном построении Великой Сербии с безусловной сербской доминацией.\nВ этой обстановке обе стороны вынуждены учитывать агрессивные претензии Италии на Далмацию. Перед лицом одной из Великих держав югославы необходимо вынуждены проявить сплоченность, но противопоставить одной силе можно только другую, равную. Пашичу необходимо продемонстировать поддержку Петербурга (если это ещё возможно), иначе Югославский комитет резолюцию «Великой Сербии» не подпишет."
 yugoslavian_angry_in_AUH.3.a: "Россия поддержит претензии Великой Сербии"
 yugoslavian_angry_in_AUH.3.b: "Сейчас возможен лишь компромисс"
 yugoslavian_angry_in_AUH.3.c: "Сербы обойдутся без «комитетов»"
 
 yugoslavian_angry_in_AUH.4.t: "Давление на ГСХС"
 yugoslavian_angry_in_AUH.4.desc: "Война с Австрией завершилась нашей победой. Земли южных славян теперь свободны. Однако в Загребе уже возникло новое правительство — [CRO.GetNameDef]. По сути это группа политиков-славян бывшей Габсбургской монархии. Сейчас в соответствии с положениями Корфской декларации настал момент для полного объединения южных славян под предводительством сербской нации, и «югославы» должны это признать."
 yugoslavian_angry_in_AUH.4.a: "Загреб должен подчиниться"
 
 yugoslavian_angry_in_AUH.5.t: "Требования сербов"
 yugoslavian_angry_in_AUH.5.desc: "Сербское правительство выдвинуло требование о вхождении наших земель с состав «Великой Сербии» на основе положений Корфской декларации. Откровенно говоря заключенный под давлением со стороны сербских националистов и России документ по мнению многих наших политиков дискриминирует хорватов и словенцев. Вместо равноправного представительства и федерализма нам предлагается просто войти в состав Сербии и признать себя сербами. Тем не менее, в случае отказа единство хорватских и словенских земель окажется под вопросом — с одной стороны Италия способно продолжить интервенцию и забрать часть территорий нашего непризнанного правительства, с другой — сербское правительство открыто заявляет, что в случае отказа они ограничатся присвоением чисто сербских территорий, оставив Загреб без всякой дипломатической и военной помощи."
 yugoslavian_angry_in_AUH.5.a: "У нас нет выхода"
 yugoslavian_angry_in_AUH.5.b: "Эти условия неприемлемы, договора не будет"
 
 yugoslavian_angry_in_AUH.6.t: "Отказ Загреба"
 yugoslavian_angry_in_AUH.6.desc: "Правительство ГСХС в Загребе отказалось от вхождения в состав Сербии. Такое решение означает одновременно две вещи: первое — Корфская декларация de facto нарушена, второе — сербские войска продолжат наступление. Этнически сербские территории вернуться в единое государство."
 yugoslavian_angry_in_AUH.6.a: "Вперёд, в Боснию"
 
 yugoslavian_angry_in_AUH.7.t: "Подтверждение Корфской декларации"
 yugoslavian_angry_in_AUH.7.desc: "После падения Австро-Венгрии в Загребе сформировано новое правительство из представителей местных славянских партий. Ранее мы смогли заключить Корфскую декларацию с представителями Югославского комитета в Риме, а теперь она должна стать основной для объединения двух правительств. Необходимо установить связь с представителями ГСХС."
 yugoslavian_angry_in_AUH.7.a: "Пришло время объединяться"
 
 yugoslavian_angry_in_AUH.8.t: "Вопрос объединения"
 yugoslavian_angry_in_AUH.8.desc: "Не секрет что наше временное правительство находится под угрозой со стороны Италии и единственным гарантом сохранения единства хорватских и словенских земель является Сербия. В тоже время у Югославского комитета, который во время войны заседал в Риме, есть договор — так называемая Корфская декларация, по которой предусмотрено объединение югославянских земель под руководством Сербии на условиях создания нового государства с национальным паритетом. По сути, это единственный справедливый выход из ситуации без потери территорий."
 yugoslavian_angry_in_AUH.8.a: "Главное чтоб не стало хуже"
 
 yugoslavian_angry_in_AUH.9.t: "Продолжить наступление"
 yugoslavian_angry_in_AUH.9.desc: "Сербия одержала победу, но это ещё не всё. Территории с сербским населением, такие как Босния и Банат, всё ещё находятся под властью враждебных сил. В Загребе сформировано новое правительство, представляющее местное славянское население. Однако его лидеры — это либо политики Австро-Венгрии, либо участники различных комитетов. Мы не признаём это правительство и не пойдём с ним на соглашение. Наступление на север продолжается."
 yugoslavian_angry_in_AUH.9.a: "Вперёд, на Загреб"
 
 yugoslavian_angry_in_AUH.11.t: "Загребская резолюция"
 yugoslavian_angry_in_AUH.11.desc: "На днях в Загребе состоялась конференция участников «югославянских» партий. Главной её целью было укрепление взаимодействия политических сил южных славян Империи по программе Югославского клуба. На второй день встречи участники конференции приняли «Загребскую резолюцию».\nВ её преамбуле говорится, что словенцы, хорваты и сербы едины и что это единство должно оставаться неделимым и безусловным. Резолюция ссылается на право на самоопределение и призывала к международным гарантиям соблюдения этого права. В первом пункте резолюции содержится требование независимости, объединения и свободы в едином национальном государстве, где будут сохранены особенности словенцев, хорватов и сербов. В резолюции эти три народа упомянуты как «три племени одного народа».\nВо втором пункте резолюции находится требование о передаче «всей территории, на которой непрерывно проживает народ», без дополнительных уточнений, за исключением того, что территория включает берега, порты и острова северной и восточной частей Адриатического моря. В пункте также предполагаются гарантии культурной автономии для меньшинств. В резолюции не упомянута Австро-Венгрия как заранее определённая основа для создания требуемого государства или Габсбурги как его правители.\nТретий пункт Загребской резолюции призывает к созданию государства, основанного на принципах полной гражданской свободы и демократического самоуправления, правового и социального равенства, обеспечивающего экономическое процветание и всестороннее культурное и социальное развитие всех граждан. Четвёртый и последний пункт резолюции требует гарантировать словенцам, хорватам и сербам участие в будущей мирной конференции.\nНаконец, депутатами назначен комитет, которому поручено создать Национальный совет словенцев, хорватов и сербов, и назначена следующая конференция в Загребе."
 yugoslavian_angry_in_AUH.11.a: "«Югославский клуб» действует всё решительней"
 
 news_auh.1.t: "Югославская декларация в Рейхсрате"
 news_auh.1.desc: "В Австрийском парламенте Цислейтании группа югославянских депутатов внесла декларацию о создании собственной автономной единицы. 30 представителей Рейхсрата, а также представители внутренних словенских и хорватских партий поддержали данное заявление, адресованное правительству Империи и Габсбургскому дому.\n\nВряд ли Австро-Венгрия будет реформирована во время войны, тем не менее, теперь сербское правительство и Югославский комитет получили альтернативу своим послевоенным планам как по созданию Великой Сербии, так и по объединению хорват и сербов вне рамок Империи."
 news_auh.1.a: "Разобраться в ситуации очень сложно"
 
 news_auh.2.t: "Декларация Великой Сербии"
 news_auh.2.desc: "Сербское правительство и Югославский комитет выпустили декларацию по итогам переговоров прошедших на острове Корфу. В декларации сообщается о необходимости бороться за Великую Сербию и добиваться её создания после поражения Австро-Венгерской монархии.\n\nДекларация утверждает наличие триединого народа сербов-хорватов-словенцев. Эта общность выделена на основе единого, как считают сербы, языка. Несмотря на такую концепцию, главную роль в новом государстве будут играть сербы и династия Карагеоргиевичей. Такое решение оказалось возможным только благодаря сохранению протекции царской России. В свою очередь члены Югославского комитета по некоторым сведением оказались недовольны итогом, но вынуждены идти на уступки перед лицом угрозы итальянской оккупации Далмации."
 news_auh.2.a: "Разобраться в ситуации очень сложно"
 
 news_auh.3.t: "Корфская декларация"
 news_auh.3.desc: "Сербское правительство и Югославский комитет подписали соглашение. Суть документа в декларации поддержки идеи создания единого югославского государства после поражения Австро-Венгрии. Новое государство должно получить название Королевство Сербов Хорватов и Словенцев. Все три народности признаются частями единого народа. Сербы получают большинство, а их король станет единым монархом при конституционном строе.\n\nНесмотря на ряд подобных смелых заявлений, многие «югославы» скептически оценивают возможность объединения с Сербией из-за великосербских настроений среди военных и правительственных кругов этой страны. В то же время Италия настороженно следит за действиями союзников и одновременно конкурентов в борьбе за побережье Далмации."
 news_auh.3.a: "Разобраться в ситуации очень сложно"
 
 news_versailles.1.t: "Конференция в Петрограде"
 news_versailles.1.desc: "На днях представители Антанты прибыли в Петроград для обсуждения дальнейших усилий, направленных на победу в войне. В столице России сейчас находятся делегаты из Англии, Франции, Италии и Румынии. Они были приняты лично императором Николаем II, после чего провели встречи со многими видными политиками России.\n\nНесмотря на мирное предложение Германии, выдвинутое в декабре 1916 года, страны Антанты вовсе не намерены идти на условия Берлина, утверждая, что после трёх лет войны силы Центральных держав на исходе. По некоторым сведениям союзники готовят всеобщее наступление, которое завершит войну уже этим летом."
 news_versailles.1.a: "Антанта готовится к бою"



 versailles.101.t: "Болгарская проблема"
 versailles.101.d: "Согласившись на простое заключение перемирия с болгарами мы смогли извлечь все возможные выгоды, однако теперь эта страна не представляет собой ничего особенного. И на Балканах, и в Европе её помнят как одну из поджигательниц войны. А перспективы приобрести такого союзника путём его защиты перед мировым сообществом мало привлекательны."
 versailles.101.a: "Эти соглашения должны быть пересмотрены"
 versailles.101.b: "Мы не станем нарушать обязательств"
 
 versailles.102.t: "Благоприятная обстановка"
 versailles.102.d: "На наш запрос в дипмиссии стран Антанты мы с удовлетворением смогли получить уверения о невозможности пересмотра ранее заключенных соглашений."
 versailles.102.a: "Можно преступать к демобилизации"
 
 versailles.103.t: "Тревожная обстановка"
 versailles.103.d: "По дипломатическим каналам до нас доходят известия о намерении западных лидеров пересмотреть заключенные ранее соглашения, в пользу своих балканских сателлитов. Никто в Болгарии не хочет войны, однако подобные выходки великих держав способны вновь разжечь пламя войны и революции на Балаканах."
 versailles.103.a: "Следует подготовиться к любому развитию событий"
 
 versailles.104.t: "Добруджанский вопрос"
 versailles.104.d: "По условиям мира 1913 года Болгария лишилась южной части Добруджи. Великая война позволила болгарам вернуться, однако теперь она окончена. И болгары и румыны считают весь полуостров своей исконной землей. Между тем распределение этнического элемента действительно изменяется с севера на юг."
 versailles.104.a: "Вся Добруджа должна быть румынской"
 versailles.104.b: "Следует исходить из единственно справедливого этнического принципа"
 
 versailles.105.t: "Добруджанский кризис"
 versailles.105.d: "Великие державы приступили к открытому диктату. Правительство получило предписание очистить от войск Добруджанский полуостров, в противном случае сконцентрированные войска Антанты перейдут в наступление при поддержки флота. Естественно, что продолжение войны со всем миром попросту невозможно и предписание будет выполнено. Однако внутри Болгарии это вызовет неминуемый раскол и возможно правительственный кризис."
 versailles.105.a: "Ничего хорошего ждать не приходится"
 
 versailles.106.t: "Греческие претензии на восточную Фракию"
 versailles.106.d: "Восточная Фракия долгое время считается спорной территорией и сейчас греки вновь нашли необходимым поднять вопрос о её статусе. Греческий премьер утверждает о доминировании греческого элемента в регионе, к тому же он готов заключить соглашение об обмене населением с болгарской стороной. Болгары же возражают, что греческого элемента нет никакого вовсе, но также готовы заключит соглашение об обмене. Также болгары требуют провести референдум среди самих жителей и указывают, что простая передача Фракии грекам лишит их страну выходу к морю и подорвет и без того пострадавшую болгарскую экономику."
 versailles.106.a: "Позиция Греции выглядит убедительнее"
 versailles.106.b: "Пусть население само решает свою судьбу"
 
 versailles.107.t: "Итоги референдума во Фракии"
 versailles.107.d: "По инициативе Великих держав в болгарской Фракии был проведен плебисцит по вопросу о государственной принадлежности данного региона. Граждане уверенно проголосовали в пользу Болгарии и её суверенитет здесь был сохранён."
 versailles.107.a: "Благоразумие возобладало"
 versailles.107.b: "Фракийские греки слишком сильно оболгарены..."
 
 versailles.108.t: "Македонский вопрос"
 versailles.108.d: "Македония представляет собой обширный регион на пересечении интересов трех соседей – Болгарии, Сербии и Греции. При преобладающем славянском населении ешё по Сан-Стефанскому миру Вардарская Македония была передана Болгарии, однако последующие перипетии войны и дипломатии перенесли её под суверенитет Сербии. Греция также имеет здесь претензии, впрочем очень слабые, даже для этого горделивого народа.\nСтоит учитывать и фактор действия в Македонии революционной организации, отчасти проболгарской, отчасти абсолютно сепаратистской. Среди местных жителей идея суверенитета Македонии имеет определённую поддержку. Её также считают компромиссной правительственные круги в Софии, они полагают что выделение Македонии приведёт к победе болгарского элемента и создаст известное препятствие для соединения греков и сербов."
 versailles.108.a: "Единство Сербии не может быть нарушено"
 versailles.108.b: "Суверенная Македония явится приемлемым компромиссом"
 versailles.108.c: "После референдума сербам нечего будет возразить"
 
 versailles.109.t: "Македония"
 versailles.109.d: "Союзное командование вместо передачи Македонии Сербии решило провести референдум, по результатам которого Македония остаётся в Болгарии."
 versailles.109.a: "Благоразумие возобладало"
 versailles.109.b: "Предательство"
 
 versailles.110.t: "Стратегические притязания Сербии"
 versailles.110.d: "Сербское правительство составило проект сдвижения границы с Болгарией на восток. Претензии невелики, но при том сербский генералитет считает их стратегически необходимым условием умиротворения Болгарии впредь. Население регионов чисто болгарское."
 versailles.110.a: "После катастрофы 1915 года сербы в полном праве поступать как угодно"
 versailles.110.b: "Объясните сербам, что две деревни не спасут их армию через 20 лет"
 
