POL_rpk: "Русский политический комитет"
POL_rpk_desc: "Русский политический комитет в Польше — антибольшевистская политическая организация. Что была организована в Варшаве Б. В. Савинковым во время советско-польской войны. От имени РПК будут формироваться русские войска для участие в войне на польской стороне."
POL_polsky_nationalism: "Польский национализм"
POL_polsky_nationalism_desc: "На руинах трёх империй Польша стремилась стать новым региональным гегемоном, распространяя свои владения далеко за пределы земель, населённых этнически польским населением. После завершения первых крупных войн польские силы и ресурсы могли бы быть направлены на утверждение своей политики на присоединённых территориях."
POL_polsky_mrshdmorsje: "Идея великого союза"
POL_polsky_mrshdmorsje_desc: "На руинах трёх империй Польша стремилась стать новым региональным гегемоном. Основой этого стремления стала идея о создании союза «от моря до моря», который бы объединял страны и народы под владычеством Польши. После войны Польша могла бы построить этот великий бастион, гарантируя безопасность полякам как с востока, так и с запада."
POL_Anti_ukr: "Соперничество с Украинцами в Галиции"
POL_Anti_ukr_desc: "Галиция всегда была неоднородным регионом, на которой проживало немало народностей, но двумя крупными можно считать украинцев и поляков. Никто из нас не желает видеть свою землю под сапогом чужого государства, из-за чего, после присоединения земли, украинские националисты начали полномасштабную подпольную борьбу."
POL_prometeism: "Концепт прометеизма"
POL_prometeism_desc: "Прометеизм — это политическая концепция и движение, направленное на освобождение нерусских народов от господства Российской империи и большевиков, а также ставящее своей конечной целью содействие распаду этих многонациональных государств."
POL_political_polonisation: "Политика полонизации"
POL_political_polonisation_desc: "Ополячивание, или политика полонизации — это заимствование или навязывание польской культуры, особенно польского языка, на землях с непольским населением, которые контролируются нашим государством или находятся под сильным пропольским культурным влиянием, а также в странах и правительствам, находящихся под нашим влиянием."
POL_apostol_polonizatii: "Католическая ассимиляция"
POL_apostol_polonizatii_desc: "Поддержка католичества приведёт к расширению влияния польской католической курии на западных территориях нашей страны и к росту популярности этого вероучения, что содействует ускорению асимиляции и ополячиванию данных территорий."
POL_separ_Anti_pol: "Национальные волнения"
POL_separ_Anti_pol_desc: "Польская политика проводимая в сторону национализации полонизации присоединенных земель, не оказалась безответной, особо радикальные и сепаратистские группы начали повсеместную борьбу с нашим правительством, развивая бандитизм в городах, хаус в деревнях, и панику в польском обществе."
POL_dogovor_s_ukr: "Договор с Украинцами в Галиции"
POL_dogovor_s_ukr_desc: "Галиция всегда была неоднородным регионом, на которой проживало немало народностей, но двумя крупными можно считать украинцев и поляков. И вот наконец, Польские и Украинские власти смогли договориться насчет принадлежности Галиции, путем разделения её, и  присвоение особых прав и свобод обеим сторонам."
POL_borb_s_ukr: "Соперничество с Украинцами в Галиции"
POL_borb_s_ukr_desc: "Галиция всегда была неоднородным регионом, на которой проживало немало народностей, но двумя крупными можно считать украинцев и поляков. Не придя к мирному урегулированию, Польская сторона решилась на радикальные меры по борьбе с Украинским национализмом, путем репрессий и насилия."
POL_separ_Anti_pol_1: "Подавление национальных волнений"
POL_separ_Anti_pol_1_desc: "Польская политика проводимая в сторону национализации полонизации присоединенных земель, не оказалась безответной, особо радикальные и сепаратистские группы начали повсеместную борьбу с нашим правительством, развивая бандитизм в городах, хаус в деревнях, и панику в польском обществе. В ответ польское руководство решилось идти на такие же, крайние меры по борьбе. И в данный момент, мы вынуждены сдерживать националистов, от возможной повторной борьбы."
POL_support_prav_jewish: "Поддержка еврейского населения"
POL_support_prav_jewish_desc: "Польские евреи создали свою собственную богатую культуру. Наряду с богатой литературой расцвело изобразительное искусство и кинематография. И отношения к ним перешли на новый уровень, уровень сотрудничества и общего развития, с гарантией прав и свобод."
POL_prav_jewish: "Аапатичность к евреям"
POL_prav_jewish_desc: "Польские евреи создали свою собственную богатую культуру. Наряду с богатой литературой расцвело изобразительное искусство и кинематография. Но отношения к ним остались безразличны, конечно антисемитские презираются и не поощряются официально, но отношения к ним остаются без симпатии."
POL_prav_jewish_02: "Гонения евреев"
POL_prav_jewish_02_desc: "От момента воссоздания независимого польского государства еврейское население было вынуждено бороться за свое равенство. Усилившийся антисемитизм, пропагандируемый националистическими партиями, не мог остаться без следа. Стремился к принятию закона об экономическом ограничении евреев и их массовой эмиграции все таки вошел в силу, и стал одной из основной проводимой политикой нынешнего правительства Польши."